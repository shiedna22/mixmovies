<!DOCTYPE html>
<html>
<head>
<title>Favorites</title>
<style>
body{background:#0b0b0b;color:white;font-family:Arial;}
.container{display:flex;flex-wrap:wrap;}
img{width:140px;margin:10px;border-radius:10px;}
button{position:absolute;background:red;color:white;border:none;}
</style>
</head>
<body>

<h2>❤️ Favorites</h2>
<a href="index.html">⬅ Back</a>

<div class="container" id="favorites"></div>

<script>
const IMG_URL="https://image.tmdb.org/t/p/w500";

for(let i=0;i<localStorage.length;i++){
  const item=JSON.parse(localStorage.getItem(localStorage.key(i)));
  if(!item.poster_path) continue;

  const img=document.createElement("img");
  img.src=IMG_URL+item.poster_path;

  img.onclick=()=>{
    const type=item.title?"movie":"tv";
    window.open(`https://vidsrc.cc/v2/embed/${type}/${item.id}`);
  };

  document.getElementById("favorites").appendChild(img);
}
</script>

</body>
</html>
