<!DOCTYPE html>
<html>
<head>
  <title>ShiedFlix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background:#0b0b0b;
  color:white;
  font-family:Arial;
  margin:0;
}

/* NAVBAR */
.navbar {
  position:sticky;
  top:0;
  background:black;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo { color:red; font-weight:bold; }

/* BANNER */
#banner {
  height:220px;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(to bottom,#111,black);
}

#watchBtn {
  background:red;
  padding:12px 25px;
  border:none;
  border-radius:8px;
  color:white;
  font-size:16px;
}

/* TITLES */
h2 {
  margin:15px;
}

/* LIST FIX 🔥 */
.list {
  display:flex;
  overflow-x:auto;
  padding:10px;
  gap:10px;
}

.list img {
  width:120px;
  border-radius:10px;
  transition:0.3s;
}

.list img:hover {
  transform:scale(1.1);
}

/* MODAL PLAYER PRO 🔥 */
#modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

iframe {
  width:95%;
  height:220px;
  border:none;
  border-radius:10px;
}

/* CLOSE */
.close {
  position:absolute;
  top:15px;
  right:20px;
  font-size:25px;
}

/* MOBILE FIX */
@media(min-width:768px){
  iframe {
    height:500px;
  }
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">🎬 ShiedFlix</div>
</div>

<!-- BANNER -->
<div id="banner">
  <button id="watchBtn">▶ Watch Full Movie</button>
</div>

<h2>🔥 Movies</h2>
<div id="movies-list" class="list"></div>

<h2>📺 TV Shows</h2>
<div id="tvshows-list" class="list"></div>

<h2>🎌 Anime</h2>
<div id="anime-list" class="list"></div>

<!-- MODAL -->
<div id="modal">
  <span class="close" onclick="closeModal()">✖</span>

  <h2 id="modal-title"></h2>

  <button id="playNow" style="background:red;padding:10px;color:white;border:none;border-radius:6px;">
    ▶ Play Now
  </button>

  <iframe id="modal-video" style="display:none;"></iframe>
</div>

<script src="home.js"></script>

</body>
</html>
