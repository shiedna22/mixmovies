<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix Ultimate+</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:white;font-family:Arial}
html{scroll-behavior:smooth}

/* NAV */
.navbar{
position:fixed;width:100%;top:0;
padding:15px;
display:flex;justify-content:space-between;
background:rgba(0,0,0,0.9);
z-index:1000;
}
.logo{color:red;font-weight:bold}
#search{background:#222;border:none;color:white;padding:8px 15px;border-radius:20px}

/* HERO */
#hero{
height:55vh;
display:flex;
align-items:flex-end;
padding:20px;
margin-top:60px;
position:relative;
background:black;
overflow:hidden;
}

#hero iframe{
position:absolute;
top:50%;left:50%;
width:177.77vh;height:100vh;
transform:translate(-50%,-50%);
opacity:0.4;
pointer-events:none;
}

#hero::after{
content:"";
position:absolute;
bottom:0;width:100%;height:150px;
background:linear-gradient(to top,#000,transparent);
}

.hero-content{z-index:2}

/* ROW */
.row{margin-top:15px}
.row h2{padding-left:10px}
.row-posters{
display:flex;overflow-x:auto;
gap:10px;padding:10px;
}

/* CARD */
.card{min-width:130px;cursor:pointer}
.card img{
width:130px;height:190px;
object-fit:cover;border-radius:8px;
transition:0.3s;
}
.card img:hover{
transform:scale(1.08);
box-shadow:0 0 15px rgba(255,0,0,0.7);
}
.card div{
font-size:12px;margin-top:5px;
}

/* MODAL PREVIEW */
#preview{
display:none;
position:fixed;top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.95);
z-index:9999;
padding:20px;
overflow:auto;
}
.preview-box{
max-width:800px;margin:auto;
}
.preview-box iframe{
width:100%;height:300px;
}
.preview-btns button{
margin:10px 5px;
padding:10px 15px;
border:none;
background:red;color:white;
cursor:pointer;
}

/* PLAYER */
#player{
display:none;
position:fixed;
width:100%;height:100%;
top:0;background:black;
z-index:99999;
}
#player iframe{
width:100%;height:80%;
}
.controls{
display:flex;
justify-content:center;
gap:10px;
padding:10px;
}
.controls button{
padding:10px;
background:#222;
color:white;
border:none;
cursor:pointer;
}

.close{
position:absolute;
right:20px;top:10px;
font-size:30px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">ShiedFlix+</div>
<input id="search" placeholder="Search...">
</div>

<!-- HERO -->
<div id="hero">
<iframe id="heroVideo"></iframe>
<div class="hero-content">
<h1 id="hero-title"></h1>
<p id="hero-desc"></p>
<button id="playHero">▶ Play</button>
</div>
</div>

<!-- ROWS -->
<div class="row"><h2>🔥 Trending</h2><div id="trending" class="row-posters"></div></div>
<div class="row"><h2>🎬 Movies</h2><div id="movies" class="row-posters"></div></div>
<div class="row"><h2>📺 TV Shows</h2><div id="tv" class="row-posters"></div></div>

<!-- PREVIEW -->
<div id="preview">
<span class="close" onclick="closePreview()">✖</span>
<div class="preview-box">
<iframe id="previewTrailer"></iframe>
<h2 id="previewTitle"></h2>
<p id="previewDesc"></p>
<div id="episodeList"></div>

<div class="preview-btns">
<button onclick="playNow()">▶ Play</button>
<button onclick="toggleMyList()">❤️ My List</button>
</div>
</div>
</div>

<!-- PLAYER -->
<div id="player">
<span class="close" onclick="closePlayer()">✖</span>
<iframe id="full"></iframe>

<div class="controls">
<button onclick="seek(-10)">⏪ 10s</button>
<button onclick="seek(10)">⏩ 10s</button>
<button onclick="fullscreen()">⛶ Fullscreen</button>
</div>
</div>

<script>
const API="https://api.themoviedb.org/3";
const KEY="43c2413701b5c752d07b62acf8e57736";
const IMG="https://image.tmdb.org/t/p/w500";

let current=null;
let currentType="movie";
let season=1,episode=1;

/* YEAR */
function getYear(i){
return (i.release_date||i.first_air_date||"").slice(0,4);
}

/* CARD */
function createCard(i,type){
const card=document.createElement("div");
card.className="card";

const img=document.createElement("img");
img.src=i.poster_path?IMG+i.poster_path:"";

const label=document.createElement("div");
label.innerText = `${i.title||i.name} (${getYear(i)})`;

card.onclick=()=>openPreview(i,type);

card.appendChild(img);
card.appendChild(label);

return card;
}

/* PREVIEW */
async function openPreview(i,type){
current=i;
currentType=type;

document.getElementById("preview").style.display="block";
document.getElementById("previewTitle").innerText=i.title||i.name;
document.getElementById("previewDesc").innerText=i.overview;

const res=await fetch(`${API}/${type}/${i.id}/videos?api_key=${KEY}`);
const data=await res.json();
const t=data.results.find(v=>v.site==="YouTube");

document.getElementById("previewTrailer").src =
t?`https://www.youtube.com/embed/${t.key}`:"";

/* EPISODES */
if(type==="tv"){
let html="<h3>Episodes</h3>";
for(let e=1;e<=10;e++){
html+=`<button onclick="setEpisode(${e})">Ep ${e}</button>`;
}
document.getElementById("episodeList").innerHTML=html;
}else{
document.getElementById("episodeList").innerHTML="";
}
}

function closePreview(){
document.getElementById("preview").style.display="none";
}

/* PLAY */
function playNow(){
openPlayer(current);
}

function openPlayer(i){
const iframe=document.getElementById("full");

iframe.src = currentType==="movie"
?`https://vidsrc.cc/v2/embed/movie/${i.id}`
:`https://vidsrc.cc/v2/embed/tv/${i.id}/${season}/${episode}`;

document.getElementById("player").style.display="block";
closePreview();
}

function closePlayer(){
document.getElementById("player").style.display="none";
document.getElementById("full").src="";
}

/* SEEK (visual only) */
function seek(sec){
alert("Forward/Backward depends on video provider");
}

/* FULLSCREEN */
function fullscreen(){
document.getElementById("full").requestFullscreen();
}

/* EPISODE */
function setEpisode(e){
episode=e;
alert("Episode "+e+" selected");
}

/* FETCH */
async function fetchData(url){
const res=await fetch(url);
return (await res.json()).results;
}

function show(list,id,type){
const box=document.getElementById(id);
box.innerHTML="";
list.forEach(i=>{
if(!i.poster_path)return;
box.appendChild(createCard(i,type));
});
}

/* INIT */
async function init(){
const trending=await fetchData(`${API}/trending/all/week?api_key=${KEY}`);
const movies=await fetchData(`${API}/movie/popular?api_key=${KEY}`);
const tv=await fetchData(`${API}/tv/popular?api_key=${KEY}`);

show(trending,"trending","movie");
show(movies,"movies","movie");
show(tv,"tv","tv");
}
init();
</script>

</body>
</html>
