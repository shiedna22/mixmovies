<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix Fixed</title>

<style>
body{margin:0;background:#000;color:white;font-family:Arial}

/* NAV */
.navbar{
position:fixed;width:100%;top:0;
padding:15px;
display:flex;justify-content:space-between;
background:linear-gradient(to bottom,#000,transparent);
z-index:1000;
}
.logo{color:red;font-weight:bold}

/* PLAYER */
#player{
display:none;
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
background:black;
z-index:99999;
}

/* VIDEO */
#player iframe{
width:100%;
height:100%;
border:none;
pointer-events:auto !important;
}

/* TOP BAR */
.player-top{
position:absolute;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:10px;
z-index:100000;
}

/* BUTTONS */
.btn{
background:rgba(0,0,0,0.6);
color:white;
border:none;
padding:8px 12px;
font-size:16px;
border-radius:5px;
}

/* FULLSCREEN BUTTON */
.full-btn{
position:absolute;
bottom:20px;
right:20px;
z-index:100000;
}
</style>
</head>

<body>

<!-- PLAYER -->
<div id="player">

<div class="player-top">
<button class="btn" onclick="exitPlayer()">← Back</button>
<button class="btn" onclick="exitFullscreen()">⤢ Exit</button>
</div>

<iframe 
id="full"
allow="autoplay; fullscreen; picture-in-picture"
allowfullscreen
webkitallowfullscreen
mozallowfullscreen>
</iframe>

<button class="btn full-btn" onclick="goFull()">⛶ Fullscreen</button>

</div>

<script>
let current = { id: 550 }; // sample

/* ▶ PLAY */
function play(){
document.getElementById("player").style.display="block";

/* 🔥 SOUND FIX (user interaction) */
const src = `https://vidsrc.cc/v2/embed/movie/${current.id}?autoplay=1`;

document.getElementById("full").src = src;
}

/* 🔥 FULLSCREEN + LANDSCAPE */
function goFull(){
const player = document.getElementById("player");

if(player.requestFullscreen){
player.requestFullscreen();
}else if(player.webkitRequestFullscreen){
player.webkitRequestFullscreen();
}

/* 🔥 ROTATE MOBILE */
if(screen.orientation){
screen.orientation.lock("landscape").catch(()=>{});
}
}

/* 🔥 EXIT FULLSCREEN */
function exitFullscreen(){
if(document.fullscreenElement){
document.exitFullscreen();
}

/* balik portrait */
if(screen.orientation){
screen.orientation.lock("portrait").catch(()=>{});
}
}

/* 🔥 EXIT PLAYER */
function exitPlayer(){
exitFullscreen();
document.getElementById("player").style.display="none";
document.getElementById("full").src="";
}
</script>

<!-- TEST BUTTON -->
<button onclick="play()" style="margin-top:100px">▶ Test Play</button>

</body>
</html>
