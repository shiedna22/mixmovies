<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix Premium</title>

<style>
body{margin:0;background:#0b0b0b;color:white;font-family:Arial;}

/* NAV */
.navbar{
position:fixed;width:100%;top:0;
background:rgba(0,0,0,0.9);
padding:15px;display:flex;justify-content:space-between;
z-index:1000;
}
.logo{color:red;font-weight:bold;}
#searchInput{padding:6px;border-radius:20px;border:none;}

/* BANNER */
#banner{
margin-top:60px;height:260px;
background-size:cover;
display:flex;align-items:flex-end;padding:20px;
position:relative;
}
#banner::after{
content:"";
position:absolute;bottom:0;width:100%;height:60%;
background:linear-gradient(to top,#0b0b0b,transparent);
}

/* LIST */
.list{display:flex;overflow-x:auto;gap:10px;padding:10px;}
.card{
min-width:130px;
position:relative;
transition:0.3s;
cursor:pointer;
}
.card img{width:100%;border-radius:10px;}

.card:hover{
transform:scale(1.15);
z-index:10;
}

/* PLAY ICON */
.card::after{
content:"▶";
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
font-size:30px;
opacity:0;
transition:0.3s;
}
.card:hover::after{opacity:1;}

/* OVERLAY */
.overlay{
position:absolute;bottom:0;width:100%;
background:linear-gradient(to top,black,transparent);
padding:5px;
}
.title{font-size:12px;}
.desc{font-size:10px;color:gray;}
.rating{font-size:11px;color:gold;}

/* FAVORITE */
.fav{
position:absolute;
top:5px;
right:5px;
font-size:18px;
cursor:pointer;
}

/* MODALS */
#modal,#detailsModal{
display:none;
position:fixed;width:100%;height:100%;
top:0;left:0;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

/* CLOSE */
.close{
position:absolute;
top:20px;
right:20px;
font-size:30px;
cursor:pointer;
}

/* BUTTON */
button{
background:red;
border:none;
padding:10px 20px;
color:white;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">🎬 ShiedFlix</div>
<input id="searchInput" placeholder="Search...">
</div>

<div id="banner">
<div>
<h2 id="banner-title">Loading...</h2>
<button id="watchBtn">▶ Watch</button>
</div>
</div>

<h2>🔥 Movies <span onclick="viewAll()" style="float:right;color:red;">View All</span></h2>
<div id="movies-list" class="list"></div>

<h2>▶ Continue Watching</h2>
<div id="continue-list" class="list"></div>

<h2>📺 TV Shows</h2>
<div id="tvshows-list" class="list"></div>

<h2>🎌 Anime</h2>
<div id="anime-list" class="list"></div>

<h2>❤️ Favorites</h2>
<div id="favorites-list" class="list"></div>

<!-- PLAYER -->
<div id="modal">
<span class="close" onclick="closeModal()">✖</span>
<h3 id="modal-title"></h3>
<iframe id="modal-video" style="width:95%;height:250px;"></iframe>
</div>

<!-- DETAILS -->
<div id="detailsModal">
<span class="close" onclick="closeDetails()">✖</span>

<div style="width:95%;max-width:500px;">
<iframe id="trailerFrame" style="width:100%;height:220px;border:none;"></iframe>

<h2 id="detailTitle"></h2>
<p id="detailDesc"></p>

<button id="playBtn">▶ Play Full Movie</button>
</div>
</div>

<script>
const API="https://api.themoviedb.org/3";
const KEY="43c2413701b5c752d07b62acf8e57736";
const IMG="https://image.tmdb.org/t/p/w500";

let movies=[],tv=[],anime=[];
let isViewAll=false;

// FETCH
async function get(type){
const res=await fetch(`${API}/trending/${type}/week?api_key=${KEY}`);
const data=await res.json();
return data.results||[];
}

// TRAILER
async function getTrailer(id,type="movie"){
try{
const res=await fetch(`${API}/${type}/${id}/videos?api_key=${KEY}`);
const data=await res.json();
const t=data.results.find(v=>v.type==="Trailer");
if(t)return `https://www.youtube.com/embed/${t.key}?autoplay=1&mute=1`;
}catch{}
return "";
}

// CONTINUE
function saveContinue(item,video){
let list=JSON.parse(localStorage.getItem("continue"))||[];
list=list.filter(x=>x.id!==item.id);
list.unshift({id:item.id,title:item.title,image:IMG+item.poster_path,video});
list=list.slice(0,10);
localStorage.setItem("continue",JSON.stringify(list));
}

function loadContinue(){
const list=JSON.parse(localStorage.getItem("continue"))||[];
const box=document.getElementById("continue-list");
box.innerHTML="";
list.forEach(i=>{
const img=document.createElement("img");
img.src=i.image;
img.style.width="120px";
img.onclick=()=>{
document.getElementById("modal").style.display="flex";
document.getElementById("modal-video").src=i.video;
};
box.appendChild(img);
});
}

// FAVORITES TOGGLE
function toggleFav(item){
let favs=JSON.parse(localStorage.getItem("favs"))||[];

if(favs.find(x=>x.id===item.id)){
favs=favs.filter(x=>x.id!==item.id);
}else{
favs.push(item);
}

localStorage.setItem("favs",JSON.stringify(favs));
loadFav();
}

function loadFav(){
const favs=JSON.parse(localStorage.getItem("favs"))||[];
show(favs,"favorites-list");
}

// CARD
function createCard(item){
const card=document.createElement("div");
card.className="card";

const img=document.createElement("img");
img.src=IMG+item.poster_path;

const fav=document.createElement("div");
fav.className="fav";
fav.innerText="❤️";
fav.onclick=(e)=>{
e.stopPropagation();
toggleFav(item);
};

const overlay=document.createElement("div");
overlay.className="overlay";

const title=document.createElement("div");
title.className="title";
title.innerText=item.title||item.name;

const rating=document.createElement("div");
rating.className="rating";
rating.innerText="⭐ "+item.vote_average;

const desc=document.createElement("div");
desc.className="desc";
desc.innerText=item.overview?.slice(0,40)+"...";

overlay.append(title,rating,desc);

card.append(img,overlay,fav);

// LONG PRESS = TRAILER
let timer;
card.addEventListener("touchstart",async ()=>{
timer=setTimeout(async ()=>{
const trailer=await getTrailer(item.id,item.title?"movie":"tv");
if(trailer){
img.style.display="none";
const iframe=document.createElement("iframe");
iframe.src=trailer;
iframe.style.width="100%";
iframe.style.height="180px";
card.appendChild(iframe);
}
},600);
});

card.addEventListener("touchend",()=>clearTimeout(timer));

card.onclick=()=>openDetails(item);

return card;
}

// SHOW
function show(list,id){
const box=document.getElementById(id);
box.innerHTML="";
list.forEach(i=>{
if(i.poster_path) box.appendChild(createCard(i));
});
}

// DETAILS
async function openDetails(item){
document.getElementById("detailsModal").style.display="flex";
document.getElementById("detailTitle").innerText=item.title||item.name;
document.getElementById("detailDesc").innerText=item.overview;

const trailer=await getTrailer(item.id,item.title?"movie":"tv");
document.getElementById("trailerFrame").src=trailer;

document.getElementById("playBtn").onclick=()=>{
closeDetails();
openPlayer(item);
};
}

// PLAYER
function openPlayer(i){
document.getElementById("modal").style.display="flex";
document.getElementById("modal-title").innerText=i.title||i.name;

const src=i.title
?`https://vidsrc.cc/v2/embed/movie/${i.id}`
:`https://vidsrc.cc/v2/embed/tv/${i.id}/1/1`;

document.getElementById("modal-video").src=src;

saveContinue(i,src);
loadContinue();
}

// CLOSE
function closeModal(){
document.getElementById("modal").style.display="none";
document.getElementById("modal-video").src="";
}

function closeDetails(){
document.getElementById("detailsModal").style.display="none";
document.getElementById("trailerFrame").src="";
}

// BANNER
function banner(){
const valid=movies.filter(m=>m.backdrop_path);

setInterval(()=>{
const m=valid[Math.floor(Math.random()*valid.length)];
document.getElementById("banner").style.backgroundImage=
`url(https://image.tmdb.org/t/p/original${m.backdrop_path})`;
document.getElementById("banner-title").innerText=m.title;
document.getElementById("watchBtn").onclick=()=>openPlayer(m);
},3000);
}

// VIEW ALL
function viewAll(){
const box=document.getElementById("movies-list");

if(isViewAll){
isViewAll=false;
box.style.flexWrap="nowrap";
}else{
isViewAll=true;
box.style.flexWrap="wrap";
}
}

// SEARCH
document.getElementById("searchInput").addEventListener("input",async e=>{
const q=e.target.value;

if(!q){
show(movies,"movies-list");
return;
}

const res=await fetch(`${API}/search/multi?api_key=${KEY}&query=${q}`);
const data=await res.json();

show(data.results,"movies-list");
});

// INIT
async function init(){
movies=await get("movie");
tv=await get("tv");
anime=tv.filter(x=>x.original_language==="ja");

show(movies,"movies-list");
show(tv,"tvshows-list");
show(anime,"anime-list");

loadFav();
loadContinue();
banner();
}
init();
</script>

</body>
</html>
