<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix Ultra FINAL</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:white;font-family:Arial}

/* NAV */
.navbar{
position:fixed;width:100%;top:0;
padding:15px;display:flex;justify-content:space-between;
background:rgba(0,0,0,0.9);z-index:1000;
}
.logo{color:red;font-weight:bold}

/* SEARCH */
#search{
background:#222;border:none;color:white;
padding:8px 15px;border-radius:20px;
width:120px;transition:0.3s;
}
#search:focus{
width:200px;background:#111;outline:none;
}

/* HERO */
#hero{
height:55vh;
display:flex;
align-items:flex-end;
padding:20px;
margin-top:60px;
position:relative;
overflow:hidden;
}

#hero iframe{
position:absolute;
top:50%;left:50%;
width:177.77vh;height:100vh;
transform:translate(-50%, -50%);
opacity:0.4;
pointer-events:none;
z-index:0;
}

#hero::after{
content:"";
position:absolute;
bottom:0;
width:100%;
height:150px;
background:linear-gradient(to top,#000,transparent);
z-index:1;
}

.hero-content{z-index:2;max-width:600px;}

.hero-buttons{display:flex;gap:10px;margin-top:10px}
.play-btn{background:white;color:black;padding:8px 15px;border:none;border-radius:5px}
.trailer-btn{background:red;color:white;padding:8px 15px;border:none;border-radius:5px}
.list-btn{background:#333;color:white;padding:8px 15px;border:none;border-radius:5px}

/* ROW */
.row{margin-top:15px}
.row h2{padding-left:10px}

/* SMOOTH SCROLL */
.row-posters{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
scroll-snap-type:x mandatory;
}
.row-posters::-webkit-scrollbar{display:none}

/* CARD */
.card{
min-width:130px;
transition:0.3s;
cursor:pointer;
scroll-snap-align:start;
}
.card img{width:130px;height:190px;border-radius:8px}
.card div{font-size:12px;color:#ccc;margin-top:5px}
.card:hover{transform:scale(1.08)}

/* PLAYER */
#player{
display:none;
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:black;
z-index:9999;
overflow:hidden;
}

#player iframe{
position:absolute;
top:50%;
left:50%;
width:177.77vh;   /* magic ratio */
height:100vh;
transform:translate(-50%,-50%);
border:none;
}
.close{
position:absolute;right:20px;top:10px;
font-size:30px;cursor:pointer;
}

/* PREVIEW */
#previewModal{
display:none;
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:black;
z-index:9998;
overflow-y:auto;
padding:0;
}
#previewVideo{
width:100%;
height:220px;
border-radius:0;
object-fit:cover;
}
.preview-btn{
margin-top:10px;
padding:10px;
border:none;
border-radius:5px;
background:red;
color:white;
}
.close-btn{
position:fixed;
top:15px;
right:15px;
font-size:28px;
z-index:9999;
cursor:pointer;
}
body{
background:#000;
overflow-x:hidden;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">ShiedFlix</div>
<input id="search" placeholder="Search...">
</div>

<!-- HERO -->
<div id="hero">
<iframe id="heroVideo"></iframe>

<div class="hero-content">
<h1 id="hero-title"></h1>
<p id="hero-desc"></p>

<div class="hero-buttons">
<button class="play-btn" id="playHero">▶ Play</button>
<button class="trailer-btn" id="watchTrailer">🎬 Trailer</button>
<button class="list-btn" onclick="toggleMyList()">❤️ My List</button>
</div>
</div>
</div>

<!-- CONTINUE -->
<div class="row">
<h2>▶ Continue Watching</h2>
<div id="continue" class="row-posters"></div>
</div>

<!-- MY LIST -->
<div class="row">
<h2>❤️ My List</h2>
<div id="mylist" class="row-posters"></div>
</div>

<!-- SEARCH -->
<div class="row" id="searchRow" style="display:none;">
<h2>🔎 Search Results</h2>
<div id="searchResults" class="row-posters"></div>
</div>

<!-- ROWS -->
<div class="row"><h2>🔥 Trending</h2><div id="trending" class="row-posters"></div></div>
<div class="row"><h2>🎬 Movies</h2><div id="movies" class="row-posters"></div></div>
<div class="row"><h2>📺 TV Shows</h2><div id="tv" class="row-posters"></div></div>

<!-- PLAYER -->
<div id="player">
<span class="close" onclick="closePlayer()">✖</span>
<iframe id="full" allowfullscreen></iframe>
</div>

<!-- PREVIEW -->
<div id="previewModal">
<span onclick="closePreview()" class="close-btn">✖</span>
<iframe id="previewVideo"></iframe>
<h2 id="previewTitle"></h2>
<p id="previewDesc"></p>
<button class="preview-btn" onclick="playFromPreview()">▶ Play</button>
<button class="preview-btn" id="myListBtn"></button>
</div>

<script>
const API="https://api.themoviedb.org/3";
const KEY="43c2413701b5c752d07b62acf8e57736";
const IMG="https://image.tmdb.org/t/p/w500";

let previewItem=null,currentType="movie";
let continueList=JSON.parse(localStorage.getItem("continue"))||[];
let myList=JSON.parse(localStorage.getItem("myList"))||[];

/* FETCH */
async function fetchData(url){
const res=await fetch(url);
return (await res.json()).results;
}

/* TRAILER */
async function getTrailer(id,type){
try{
const res=await fetch(`${API}/${type}/${id}/videos?api_key=${KEY}`);
const data=await res.json();

if(!data.results || data.results.length===0) return "";

let t=data.results.find(v=>v.type==="Trailer" && v.site==="YouTube");
if(!t){t=data.results.find(v=>v.site==="YouTube");}

return t?`https://www.youtube.com/embed/${t.key}`:"";
}catch{return "";}
}

function title(i){
let name=i.title||i.name;
let year=(i.release_date||i.first_air_date||"").slice(0,4);
return year?`${name} (${year})`:name;
}

/* CARD */
function createCard(i,type){
const card=document.createElement("div");
card.className="card";
card.innerHTML=`<img src="${IMG+i.poster_path}"><div>${title(i)}</div>`;
card.onclick=()=>openPreview(i,type);
return card;
}

/* PREVIEW */
async function openPreview(i,type){
previewItem=i;
currentType=type;

document.getElementById("previewModal").style.display="block";
document.getElementById("previewTitle").innerText=title(i);
document.getElementById("previewDesc").innerText=i.overview||"";

let t=await getTrailer(i.id,type);
document.getElementById("previewVideo").src=t+"?autoplay=1&mute=1";

let exist=myList.find(m=>m.id===i.id);
let btn=document.getElementById("myListBtn");
btn.innerText = exist ? "💔 Remove from My List" : "❤️ Add to My List";

btn.onclick=()=>{
toggleMyList();
openPreview(i,type);
};
}

function closePreview(){
document.getElementById("previewModal").style.display="none";
document.getElementById("previewVideo").src="";
}

function playFromPreview(){
closePreview();
openPlayer(previewItem);
}

/* PLAYER */
function openPlayer(i){
document.getElementById("player").style.display="block";
if(i.title){
document.getElementById("full").src=
`https://vidsrc.me/embed/movie/${i.id}?autoplay=1&rel=0`;
}else{
document.getElementById("full").src=
`https://vidsrc.me/embed/tv/${i.id}/1/1?autoplay=1`;
}
saveContinue(i);
}

function closePlayer(){
document.getElementById("player").style.display="none";
document.getElementById("full").src="";
}

/* CONTINUE */
function saveContinue(m){
continueList=continueList.filter(x=>x.id!==m.id);
continueList.unshift(m);
localStorage.setItem("continue",JSON.stringify(continueList));
renderContinue();
}
function renderContinue(){
const section = document.querySelector("#continue").parentElement;
const box = document.getElementById("continue");

if(continueList.length === 0){
section.style.display = "none";
return;
}

section.style.display = "block";
box.innerHTML="";
continueList.forEach(m=>{
box.appendChild(createCard(m,"movie"));
});
}

/* MY LIST */
function toggleMyList(){
let exist=myList.find(m=>m.id===previewItem.id);
if(exist){myList=myList.filter(m=>m.id!==previewItem.id);}
else{myList.push(previewItem);}
localStorage.setItem("myList",JSON.stringify(myList));
renderMyList();
}
function renderMyList(){
const box = document.getElementById("mylist");
const section = box.parentElement;

if(myList.length === 0){
section.style.display="none";
return;
}

section.style.display="block";
box.innerHTML="";
myList.forEach(m=>{
box.appendChild(createCard(m,"movie"));
});
}

/* HERO */
async function setHero(m){
currentType=m.title?"movie":"tv";

document.getElementById("hero-title").innerText=title(m);
document.getElementById("hero-desc").innerText=m.overview||"";

let t=await getTrailer(m.id,currentType);

if(!t){
document.getElementById("heroVideo").style.display="none";
document.getElementById("hero").style.background=
`url(${IMG+m.backdrop_path}) center/cover`;
}else{
document.getElementById("heroVideo").style.display="block";
document.getElementById("heroVideo").src=t+"?autoplay=1&mute=1&controls=0&loop=1";
}

document.getElementById("playHero").onclick=()=>openPlayer(m);
document.getElementById("watchTrailer").onclick=()=>{
document.getElementById("player").style.display="block";
document.getElementById("full").src=t;
};
}

/* SEARCH */
let debounce;
document.getElementById("search").addEventListener("input",(e)=>{
clearTimeout(debounce);

debounce=setTimeout(async()=>{
const v=e.target.value.trim();
const row=document.getElementById("searchRow");
const box=document.getElementById("searchResults");

if(!v){
row.style.display="none";
return;
}

const res=await fetch(`${API}/search/multi?api_key=${KEY}&query=${v}`);
const data=await res.json();

box.innerHTML="";

// 🔥 FIXED SEARCH (no empty results)
let valid = data.results.filter(i=>i.poster_path);

if(valid.length === 0){
row.style.display="none";
return;
}

row.style.display="block";

valid.forEach(i=>{
box.appendChild(createCard(i,i.media_type));
});

},400);
});

/* INIT */
async function init(){
const trending=await fetchData(`${API}/trending/all/week?api_key=${KEY}`);
const movies=await fetchData(`${API}/movie/popular?api_key=${KEY}`);
const tv=await fetchData(`${API}/tv/popular?api_key=${KEY}`);

const clean=trending.filter(i=>i.media_type==="movie"||i.media_type==="tv");

clean.forEach(i=>document.getElementById("trending").appendChild(createCard(i,i.media_type)));
movies.forEach(i=>document.getElementById("movies").appendChild(createCard(i,"movie")));
tv.forEach(i=>document.getElementById("tv").appendChild(createCard(i,"tv")));

setHero(clean[0]);

renderContinue();
renderMyList();
}

init();
</script>

</body>
</html>
