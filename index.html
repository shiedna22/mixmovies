<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix Ultimate</title>

<style>
body{
  margin:0;
  background:#000;
  color:white;
  font-family:Arial;
}

/* NAVBAR */
.navbar{
  position:fixed;
  width:100%;
  top:0;
  padding:15px;
  display:flex;
  justify-content:space-between;
  background:linear-gradient(to bottom,rgba(0,0,0,0.9),transparent);
  z-index:1000;
}
.logo{color:red;font-size:20px;font-weight:bold;}
#search{
  padding:6px 12px;
  border-radius:20px;
  border:none;
  background:#222;
  color:white;
}

/* HERO */
#hero{
  height:70vh;
  display:flex;
  align-items:flex-end;
  padding:20px;
  background-size:cover;
  position:relative;
}
#hero::after{
  content:"";
  position:absolute;
  bottom:0;
  width:100%;
  height:70%;
  background:linear-gradient(to top,#000,transparent);
}

.hero-content{
  z-index:2;
}
.hero-title{font-size:30px;}
.hero-buttons button{
  margin-right:10px;
  padding:10px 20px;
  border:none;
  border-radius:5px;
}
.play{background:white;color:black;}
.info{background:gray;color:white;}

/* ROWS */
.row{
  margin-top:10px;
}
.row h2{
  margin-left:10px;
}
.row-posters{
  display:flex;
  overflow-x:auto;
  padding:10px;
  gap:10px;
}
.row-posters img{
  width:140px;
  border-radius:5px;
  cursor:pointer;
  transition:0.3s;
}
.row-posters img:hover{
  transform:scale(1.2);
}

/* DETAILS */
#details{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  top:0;
  z-index:9999;
}
#details iframe{
  width:100%;
  height:250px;
}
.details-content{
  padding:15px;
}
.close{
  position:absolute;
  right:20px;
  top:10px;
  font-size:30px;
}

/* PLAYER */
#player{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  background:black;
  z-index:99999;
}
#player iframe{
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">ShiedFlix</div>
  <input id="search" placeholder="Search...">
</div>

<div id="hero">
  <div class="hero-content">
    <h1 id="hero-title">Loading...</h1>
    <div class="hero-buttons">
      <button class="play" id="playHero">▶ Play</button>
      <button class="info" id="infoHero">ℹ Info</button>
    </div>
  </div>
</div>

<div class="row">
  <h2>🔥 Trending</h2>
  <div id="trending" class="row-posters"></div>
</div>

<div class="row">
  <h2>🎬 Movies</h2>
  <div id="movies" class="row-posters"></div>
</div>

<div class="row">
  <h2>📺 TV Shows</h2>
  <div id="tv" class="row-posters"></div>
</div>

<!-- DETAILS -->
<div id="details">
<span class="close" onclick="closeDetails()">✖</span>
<iframe id="trailer"></iframe>

<div class="details-content">
<h2 id="title"></h2>
<p id="desc"></p>
<button onclick="play()">▶ Play Full Movie</button>
</div>
</div>

<!-- PLAYER -->
<div id="player">
<span class="close" onclick="closePlayer()">✖</span>
<iframe id="full"></iframe>
</div>

<script>
const API="https://api.themoviedb.org/3";
const KEY="43c2413701b5c752d07b62acf8e57736";
const IMG="https://image.tmdb.org/t/p/w500";

let current=null;

/* FETCH */
async function fetchData(url){
const res=await fetch(url);
return (await res.json()).results;
}

/* TRAILER */
async function getTrailer(id,type){
const res=await fetch(`${API}/${type}/${id}/videos?api_key=${KEY}`);
const data=await res.json();
const t=data.results.find(v=>v.type==="Trailer");
return t?`https://www.youtube.com/embed/${t.key}?autoplay=1&mute=1`:"";
}

/* SHOW */
function show(list,id,type){
const box=document.getElementById(id);
box.innerHTML="";
list.forEach(i=>{
if(!i.poster_path)return;

const img=document.createElement("img");
img.src=IMG+i.poster_path;

img.onclick=async()=>{
current=i;

document.getElementById("details").style.display="block";
document.getElementById("title").innerText=i.title||i.name;
document.getElementById("desc").innerText=i.overview;

document.getElementById("trailer").src=
await getTrailer(i.id,type);
};

box.appendChild(img);
});
}

/* PLAYER */
function play(){
document.getElementById("details").style.display="none";
document.getElementById("player").style.display="block";

const src=current.title
?`https://vidsrc.cc/v2/embed/movie/${current.id}`
:`https://vidsrc.cc/v2/embed/tv/${current.id}/1/1`;

document.getElementById("full").src=src;
}

function closeDetails(){
document.getElementById("details").style.display="none";
document.getElementById("trailer").src="";
}

function closePlayer(){
document.getElementById("player").style.display="none";
document.getElementById("full").src="";
}

/* HERO */
function setHero(movie){
document.getElementById("hero").style.backgroundImage=
`url(https://image.tmdb.org/t/p/original${movie.backdrop_path})`;
document.getElementById("hero-title").innerText=movie.title;

document.getElementById("playHero").onclick=()=>{
current=movie;
play();
};

document.getElementById("infoHero").onclick=()=>{
current=movie;
document.getElementById("details").style.display="block";
document.getElementById("title").innerText=movie.title;
document.getElementById("desc").innerText=movie.overview;
};
}

/* INIT */
async function init(){
const trending=await fetchData(`${API}/trending/all/week?api_key=${KEY}`);
const movies=await fetchData(`${API}/movie/popular?api_key=${KEY}`);
const tv=await fetchData(`${API}/tv/popular?api_key=${KEY}`);

show(trending,"trending","movie");
show(movies,"movies","movie");
show(tv,"tv","tv");

setHero(trending[0]);
}
init();
</script>

</body>
</html>
