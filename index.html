<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix ULTRA FINAL</title>

<style>
body{margin:0;background:#000;color:white;font-family:Arial}

/* NAV */
.navbar{
position:fixed;width:100%;top:0;
padding:15px;
display:flex;justify-content:space-between;
background:linear-gradient(to bottom,#000,transparent);
z-index:1000;
}
.logo{color:red;font-weight:bold;font-size:18px}
#search{
background:#222;border:none;color:white;
padding:8px 15px;border-radius:20px;
}

/* HERO */
#hero{
height:70vh;
display:flex;
align-items:flex-end;
padding:20px;
position:relative;
overflow:hidden;
transition:transform 0.4s, opacity 0.3s;
}
#hero iframe{
position:absolute;width:100%;height:100%;
top:0;left:0;
pointer-events:none;
filter:brightness(0.4);
}
.hero-content{z-index:2}

/* ROW */
.row{margin-top:10px}
.row h2{margin-left:10px}
.row-posters{
display:flex;overflow-x:auto;
gap:10px;padding:10px;
}
.row-posters img{
width:140px;border-radius:6px;
cursor:pointer;
}

/* DETAILS */
#details{
display:none;
position:fixed;width:100%;height:100%;
top:0;background:black;z-index:9999;
}
#details iframe{width:100%;height:220px}

/* PLAYER */
#player{
display:none;
position:fixed;width:100%;height:100%;
top:0;background:black;z-index:99999;
}
#player iframe{width:100%;height:100%}

.close{
position:absolute;
right:20px;
top:10px;
font-size:30px;
cursor:pointer;
z-index:100000;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">ShiedFlix</div>
<input id="search" placeholder="Search...">
</div>

<!-- HERO -->
<div id="hero">
<iframe id="heroVideo"></iframe>
<div class="hero-content">
<h1 id="hero-title"></h1>
<p id="hero-desc"></p>
<button id="playHero">▶ Play</button>
<button id="infoHero">ℹ Info</button>
</div>
</div>

<!-- ROW -->
<div class="row">
<h2>🔥 Movies</h2>
<div id="movies" class="row-posters"></div>
</div>

<!-- DETAILS -->
<div id="details">
<span class="close" onclick="closeDetails()">✖</span>
<iframe id="trailer"></iframe>
<h2 id="title"></h2>
<p id="desc"></p>
<button onclick="play()">▶ Play</button>
</div>

<!-- PLAYER -->
<div id="player">
<span class="close" onclick="closePlayer()">✖</span>
<iframe id="full"></iframe>
</div>

<script>
const API="https://api.themoviedb.org/3";
const KEY="43c2413701b5c752d07b62acf8e57736";
const IMG="https://image.tmdb.org/t/p/w500";

let current=null;
let heroList=[];
let heroIndex=0;
let heroInterval;

/* FETCH */
async function getMovies(){
const res=await fetch(`${API}/movie/popular?api_key=${KEY}`);
return (await res.json()).results;
}

/* TRAILER */
async function getTrailer(id){
try{
const res=await fetch(`${API}/movie/${id}/videos?api_key=${KEY}`);
const data=await res.json();

const t=data.results.find(v=>v.type==="Trailer" && v.site==="YouTube");

return t?`https://www.youtube.com/embed/${t.key}?autoplay=1&mute=1`:"";
}catch{return "";}
}

/* SHOW */
function show(list){
const box=document.getElementById("movies");
box.innerHTML="";

list.forEach(i=>{
if(!i.poster_path)return;

const img=document.createElement("img");
img.src=IMG+i.poster_path;

img.onclick=()=>{
current=i;
openDetails();
};

box.appendChild(img);
});
}

/* HERO */
async function setHero(movie){
current=movie;

const hero=document.getElementById("hero");

hero.style.opacity=0;

setTimeout(async()=>{
document.getElementById("hero-title").innerText=movie.title;
document.getElementById("hero-desc").innerText=movie.overview;

document.getElementById("heroVideo").src=
await getTrailer(movie.id);

hero.style.opacity=1;
},200);

document.getElementById("playHero").onclick=()=>play();
document.getElementById("infoHero").onclick=()=>openDetails();
}

/* AUTO SLIDE */
function startHero(){
clearInterval(heroInterval);

heroInterval=setInterval(()=>{
heroIndex++;
if(heroIndex>=heroList.length) heroIndex=0;
setHero(heroList[heroIndex]);
},5000);
}

/* SWIPE */
let startX=0;
const hero=document.getElementById("hero");

hero.addEventListener("touchstart",(e)=>{
startX=e.touches[0].clientX;
clearInterval(heroInterval);
});

hero.addEventListener("touchend",(e)=>{
let diff=e.changedTouches[0].clientX-startX;

if(diff>80){
heroIndex--;
if(heroIndex<0) heroIndex=heroList.length-1;
setHero(heroList[heroIndex]);
}
else if(diff<-80){
heroIndex++;
if(heroIndex>=heroList.length) heroIndex=0;
setHero(heroList[heroIndex]);
}

setTimeout(()=>startHero(),4000);
});

/* DETAILS */
function openDetails(){
document.getElementById("details").style.display="block";
document.getElementById("title").innerText=current.title;
document.getElementById("desc").innerText=current.overview;
document.getElementById("trailer").src=
`https://www.youtube.com/embed?autoplay=1`;
}

function closeDetails(){
document.getElementById("details").style.display="none";
document.getElementById("trailer").src="";
}

/* PLAYER */
function play(){
document.getElementById("details").style.display="none";
document.getElementById("player").style.display="block";

document.getElementById("full").src=
`https://vidsrc.cc/v2/embed/movie/${current.id}?autoplay=1`;

document.getElementById("player").requestFullscreen?.();
}

/* CLOSE */
function closePlayer(){
document.getElementById("player").style.display="none";
document.getElementById("full").src="";
document.exitFullscreen?.();
}

/* INIT */
async function init(){
const movies=await getMovies();

show(movies);

heroList=movies.slice(0,10);
setHero(heroList[0]);
startHero();
}
init();
</script>

</body>
</html>
