<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix Ultimate</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:white;font-family:Arial}
html{scroll-behavior:smooth}

/* NAV */
.navbar{
position:fixed;width:100%;top:0;
padding:15px;
display:flex;justify-content:space-between;
background:rgba(0,0,0,0.9);
z-index:1000;
}
.logo{color:red;font-weight:bold}
#search{background:#222;border:none;color:white;padding:8px 15px;border-radius:20px}

/* HERO */
#hero{
height:55vh;
display:flex;
align-items:flex-end;
padding:20px;
margin-top:60px;
position:relative;
overflow:hidden;
}
#hero iframe{
position:absolute;
top:50%;left:50%;
width:177.77vh;height:100vh;
transform:translate(-50%,-50%);
opacity:0.4;
pointer-events:none;
}
#hero::after{
content:"";
position:absolute;
bottom:0;
width:100%;height:150px;
background:linear-gradient(to top,#000,transparent);
}
.hero-content{z-index:2}

/* ROW */
.row{margin-top:10px}
.row h2{padding-left:10px}
.row-posters{
display:flex;overflow-x:auto;
gap:10px;padding:10px;
}

/* CARD */
.card{
min-width:130px;
display:flex;
flex-direction:column;
position:relative;
}
.card img{
width:130px;height:190px;
object-fit:cover;
border-radius:8px;
transition:0.3s;
}
.card:hover img{transform:scale(1.08)}
.play-btn{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
font-size:28px;
opacity:0;
}
.card:hover .play-btn{opacity:1}

.progress{
height:3px;
background:red;
position:absolute;
bottom:0;
left:0;
}

/* PLAYER */
#player{
display:none;
position:fixed;
top:0;left:0;
width:100vw;height:100vh;
background:black;
z-index:99999;
}
#player iframe{width:100%;height:100%}
.close{
position:absolute;
right:20px;
top:10px;
font-size:30px;
z-index:3;
cursor:pointer;
}
#playerInfo{
position:absolute;
top:20px;
left:20px;
z-index:3;
max-width:70%;
}
#controls{
position:absolute;
bottom:20px;
left:20px;
z-index:3;
}
</style></head><body><div class="navbar">
<div class="logo">ShiedFlix</div>
<input id="search" placeholder="Search...">
</div><!-- HERO --><div id="hero">
<iframe id="heroVideo"></iframe>
<div class="hero-content">
<h1 id="hero-title"></h1>
<p id="hero-desc"></p>
<button id="playHero">▶ Play</button>
</div>
</div><!-- CONTINUE --><div class="row"><h2>▶ Continue Watching</h2><div id="continue" class="row-posters"></div></div><!-- SEARCH --><div class="row" id="searchRow" style="display:none;">
<h2>🔎 Results</h2>
<div id="searchResults" class="row-posters"></div>
</div><!-- ROWS --><div class="row"><h2>🔥 Trending</h2><div id="trending" class="row-posters"></div></div>
<div class="row"><h2>🎬 Movies</h2><div id="movies" class="row-posters"></div></div>
<div class="row"><h2>📺 TV Shows</h2><div id="tv" class="row-posters"></div></div>
<div class="row"><h2>🍥 Anime</h2><div id="anime" class="row-posters"></div></div><!-- PLAYER --><div id="player">
<span class="close" onclick="closePlayer()">✖</span><div id="playerInfo">
<h2 id="playerTitle"></h2>
<p id="playerDesc"></p>
</div><iframe id="full"></iframe><div id="controls">
<button onclick="nextEpisode()">⏭ Next</button>
</div>
</div><script>
const API="https://api.themoviedb.org/3";
const KEY="43c2413701b5c752d07b62acf8e57736";
const IMG="https://image.tmdb.org/t/p/w500";

let current=null,currentType="movie";
let continueList=JSON.parse(localStorage.getItem("continue"))||[];
let heroList=[],heroIndex=0;
let currentEpisode=1;

/* FETCH */
async function fetchData(url){
const res=await fetch(url);
return (await res.json()).results;
}

/* TRAILER */
async function getTrailer(id,type){
try{
const res=await fetch(`${API}/${type}/${id}/videos?api_key=${KEY}`);
const data=await res.json();
const t=data.results.find(v=>v.site==="YouTube");
return t?`https://www.youtube.com/embed/${t.key}?autoplay=1&mute=1`:"";
}catch{return "";}
}

function title(i){return i.title||i.name||"No Title"}

/* CARD */
function createCard(i,type){
const card=document.createElement("div");
card.className="card";

const img=document.createElement("img");
img.src=IMG+i.poster_path;

const play=document.createElement("div");
play.className="play-btn";
play.innerText="▶";

const label=document.createElement("div");
label.innerText=title(i);

let saved = continueList.find(x=>x.id===i.id);
if(saved){
const progress=document.createElement("div");
progress.className="progress";
progress.style.width=saved.progress;
card.appendChild(progress);
}

card.onclick=()=>openPlayer(i,type);

card.appendChild(img);
card.appendChild(play);
card.appendChild(label);

return card;
}

/* SHOW */
function show(list,id,type){
const box=document.getElementById(id);
box.innerHTML="";
list.forEach(i=>{
if(!i.poster_path)return;
box.appendChild(createCard(i,type));
});
}

/* PLAYER */
function openPlayer(i,type){
current=i;
currentType=type;
currentEpisode=1;

document.getElementById("player").style.display="block";

document.getElementById("full").src=
type==="movie"
?`https://vidsrc.cc/v2/embed/movie/${i.id}`
:`https://vidsrc.cc/v2/embed/tv/${i.id}/1/${currentEpisode}`;

document.getElementById("playerTitle").innerText=title(i);
document.getElementById("playerDesc").innerText=i.overview||"";

setInterval(saveProgress,5000);
}

/* CLOSE */
function closePlayer(){
document.getElementById("player").style.display="none";
document.getElementById("full").src="";
}

/* SAVE PROGRESS */
function saveProgress(){
if(!current)return;

let progress=Math.floor(Math.random()*100)+"%";

continueList=continueList.filter(x=>x.id!==current.id);

continueList.unshift({
...current,
progress:progress
});

localStorage.setItem("continue",JSON.stringify(continueList));
renderContinue();
}

/* CONTINUE */
function renderContinue(){
const box=document.getElementById("continue");
box.innerHTML="";
continueList.forEach(m=>{
box.appendChild(createCard(m,"movie"));
});
}

/* NEXT EPISODE */
function nextEpisode(){
currentEpisode++;
document.getElementById("full").src=
`https://vidsrc.cc/v2/embed/tv/${current.id}/1/${currentEpisode}`;
}

/* HERO */
async function setHero(m){
document.getElementById("hero-title").innerText=title(m);
document.getElementById("hero-desc").innerText=(m.overview||"").slice(0,100)+"...";

const trailer=await getTrailer(m.id,m.title?"movie":"tv");
if(trailer){
document.getElementById("heroVideo").src=trailer;
}else{
document.getElementById("heroVideo").src="";
}
document.getElementById("playHero").onclick=()=>openPlayer(m,"movie");
}

/* SLIDER */
function startSlider(){
setInterval(()=>{
heroIndex++;
if(heroIndex>=heroList.length) heroIndex=0;
setHero(heroList[heroIndex]);
},5000);
}

/* SEARCH */
let debounce;
document.getElementById("search").addEventListener("input",(e)=>{
clearTimeout(debounce);
debounce=setTimeout(async()=>{
const v=e.target.value;
const row=document.getElementById("searchRow");
const box=document.getElementById("searchResults");

if(!v){row.style.display="none";return;}

const res=await fetch(`${API}/search/multi?api_key=${KEY}&query=${v}`);
const data=await res.json();

row.style.display="block";
box.innerHTML="";
data.results.slice(0,20).forEach(i=>{
if(!i.poster_path)return;
box.appendChild(createCard(i,i.media_type));
});
},400);
});

/* INIT */
async function init(){
const trending=await fetchData(`${API}/trending/all/week?api_key=${KEY}`);
const movies=await fetchData(`${API}/movie/popular?api_key=${KEY}`);
const tv=await fetchData(`${API}/tv/popular?api_key=${KEY}`);
const anime=await fetchData(`${API}/discover/tv?api_key=${KEY}&with_genres=16`);

show(trending,"trending","movie");
show(movies,"movies","movie");
show(tv,"tv","tv");
show(anime,"anime","tv");

heroList=trending;
setHero(trending[0]);
startSlider();

renderContinue();
}
init();
</script></body>
</html>
