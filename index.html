<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix FINAL BOSS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:white;font-family:Arial}

/* NAV */
.navbar{
position:fixed;width:100%;top:0;
padding:15px;
display:flex;justify-content:space-between;
background:rgba(0,0,0,0.9);
z-index:1000;
}
.logo{color:red;font-weight:bold}
#search{background:#222;border:none;color:white;padding:8px 15px;border-radius:20px}

/* HERO */
#hero{
height:55vh;
display:flex;
align-items:flex-end;
padding:20px;
margin-top:60px;
position:relative;
overflow:hidden;
cursor:pointer;
}

#hero iframe{
position:absolute;
top:50%;
left:50%;
width:177.77vh;
height:100vh;
transform:translate(-50%,-50%);
opacity:0;
transition:0.5s;
pointer-events:none;
}
#hero iframe.active{opacity:0.5}

.hero-content{z-index:2}
#heroLoader{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
display:none;
}

/* ROW */
.row{margin-top:15px}
.row h2{padding-left:10px}
.row-posters{display:flex;overflow-x:auto;gap:10px;padding:10px}

/* CARD */
.card{min-width:130px;cursor:pointer;position:relative}
.card img{
width:130px;height:190px;
border-radius:8px;
transition:0.3s;
}
.card:hover img{
transform:scale(1.1);
box-shadow:0 0 15px red;
}
.card video{
position:absolute;
top:0;left:0;
width:100%;height:100%;
object-fit:cover;
display:none;
border-radius:8px;
}
.card:hover video{display:block}
.card div{font-size:12px;margin-top:5px}

/* PLAYER */
#player{
display:none;
position:fixed;
top:0;width:100%;height:100%;
background:black;
z-index:99999;
}
#player iframe{width:100%;height:100%}
.close{
position:absolute;right:20px;top:10px;
font-size:30px;cursor:pointer;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">ShiedFlix</div>
<input id="search" placeholder="Search...">
</div>

<!-- HERO -->
<div id="hero">
<div id="heroLoader">Loading...</div>
<iframe id="heroVideo" allow="autoplay; fullscreen"></iframe>

<div class="hero-content">
<h1 id="hero-title"></h1>
<p id="hero-desc"></p>
<button id="playHero">▶ Play</button>
</div>
</div>

<!-- CONTINUE -->
<div class="row"><h2>▶ Continue Watching</h2><div id="continue" class="row-posters"></div></div>

<!-- MY LIST -->
<div class="row"><h2>❤️ My List</h2><div id="mylist" class="row-posters"></div></div>

<!-- SEARCH -->
<div class="row" id="searchRow" style="display:none;">
<h2>🔎 Search Results</h2>
<div id="searchResults" class="row-posters"></div>
</div>

<!-- ROWS -->
<div class="row"><h2>🔥 Trending</h2><div id="trending" class="row-posters"></div></div>
<div class="row"><h2>🎬 Movies</h2><div id="movies" class="row-posters"></div></div>
<div class="row"><h2>📺 TV Shows</h2><div id="tv" class="row-posters"></div></div>
<div class="row"><h2>🍥 Anime</h2><div id="anime" class="row-posters"></div></div>

<!-- PLAYER -->
<div id="player">
<span class="close" onclick="closePlayer()">✖</span>
<iframe id="full"></iframe>
</div>

<script>
const API="https://api.themoviedb.org/3";
const KEY="43c2413701b5c752d07b62acf8e57736";
const IMG="https://image.tmdb.org/t/p/w500";

let current=null,currentType="movie";
let heroList=[],heroIndex=0;
let isInteractive=false;

/* FETCH */
async function fetchData(url){
const res=await fetch(url);
return (await res.json()).results;
}

/* TRAILER */
async function getTrailer(id,type){
try{
const res=await fetch(`${API}/${type}/${id}/videos?api_key=${KEY}`);
const data=await res.json();
const t=data.results.find(v=>v.site==="YouTube");
return t?`https://www.youtube.com/embed/${t.key}?autoplay=1&mute=1&controls=0`:"";
}catch{return "";}
}

function title(i){return i.title||i.name||"No Title"}

/* HERO */
async function setHero(m){
current=m;
currentType=m.title?"movie":"tv";
isInteractive=false;

document.getElementById("hero-title").innerText=title(m);
document.getElementById("hero-desc").innerText=(m.overview||"").slice(0,100)+"...";

const hero=document.getElementById("heroVideo");
const loader=document.getElementById("heroLoader");

hero.style.pointerEvents="none";
loader.style.display="block";

const trailer=await getTrailer(m.id,currentType);

if(trailer){
hero.src=trailer;
hero.onload=()=>{
loader.style.display="none";
hero.classList.add("active");
};
}else{
hero.style.display="none";
}
}

/* CLICK HERO */
document.getElementById("hero").onclick=()=>{
const hero=document.getElementById("heroVideo");

if(!isInteractive){
isInteractive=true;
hero.style.pointerEvents="auto";
hero.src=hero.src.replace("mute=1","mute=0").replace("controls=0","controls=1");
}
};

/* PLAYER */
function openPlayer(i){
const iframe=document.getElementById("full");
iframe.src=i.title
?`https://vidsrc.cc/v2/embed/movie/${i.id}`
:`https://vidsrc.cc/v2/embed/tv/${i.id}/1/1`;

document.getElementById("player").style.display="block";
}
function closePlayer(){
document.getElementById("player").style.display="none";
document.getElementById("full").src="";
}

/* SHOW + HOVER PREVIEW */
function show(list,id,type){
const box=document.getElementById(id);
box.innerHTML="";

list.forEach(i=>{
if(!i.poster_path)return;

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${IMG+i.poster_path}">
<video muted loop></video>
<div>${title(i)}</div>
`;

card.onclick=()=>openPlayer(i);

/* hover preview */
card.onmouseenter=async()=>{
const vid=card.querySelector("video");
const trailer=await getTrailer(i.id,type);
if(trailer){
vid.src=trailer.replace("embed","embed").replace("autoplay=1","autoplay=1");
vid.style.display="block";
vid.play();
}
};
card.onmouseleave=()=>{
const vid=card.querySelector("video");
vid.pause();
vid.style.display="none";
};

box.appendChild(card);
});
}

/* INIT */
async function init(){
const trending=await fetchData(`${API}/trending/all/week?api_key=${KEY}`);
const movies=await fetchData(`${API}/movie/popular?api_key=${KEY}`);
const tv=await fetchData(`${API}/tv/popular?api_key=${KEY}`);
const anime=await fetchData(`${API}/discover/tv?api_key=${KEY}&with_genres=16`);

show(trending,"trending","movie");
show(movies,"movies","movie");
show(tv,"tv","tv");
show(anime,"anime","tv");

heroList=trending;
setHero(trending[0]);

setInterval(()=>{
heroIndex=(heroIndex+1)%heroList.length;
setHero(heroList[heroIndex]);
},5000);
}

init();
</script>

</body>
</html>
