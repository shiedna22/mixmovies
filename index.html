<!DOCTYPE html>
<html>
<head>
  <title>ShiedFlix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background:#0b0b0b;
  color:white;
  font-family:Arial;
  margin:0;
}

/* NAVBAR */
.navbar {
  position:sticky;
  top:0;
  background:black;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo { color:red; font-weight:bold; }

.menu { display:flex; align-items:center; }

.menu a {
  color:white;
  margin-left:10px;
  text-decoration:none;
}

.menu a:hover { color:red; }

#searchInput {
  margin-left:10px;
  padding:6px;
  border-radius:20px;
  border:none;
}

/* BANNER */
#banner {
  height:250px;
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:flex-end;
  padding:20px;
}

#watchBtn {
  background:red;
  border:none;
  padding:10px;
  color:white;
  border-radius:5px;
}

/* HEADER SECTION */
.section-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 15px;
}

.view-btn {
  background:none;
  color:red;
  border:none;
  cursor:pointer;
}

/* LIST */
.list {
  display:flex;
  overflow-x:auto;
  padding:10px;
  gap:10px;
}

.list::-webkit-scrollbar {
  display:none;
}

img {
  width:120px;
  border-radius:10px;
}

/* CONTINUE */
.continue-card { position:relative; }

.play-icon {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:30px;
}

/* MODAL */
#modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  top:0;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#modal-video {
  width:95%;
  height:250px;
}

#modal-video.portrait {
  width:60%;
  height:70vh;
  max-width:300px;
}

.close {
  position:absolute;
  top:20px;
  right:20px;
  font-size:25px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">🎬 ShiedFlix</div>

  <div class="menu">
    <a href="#">Home</a>
    <a href="#movies">Movies</a>
    <a href="#tv">TV</a>
    <a href="#anime">Anime</a>
    <a href="#drama">Drama</a>
    <input id="searchInput" placeholder="Search...">
  </div>
</div>

<!-- BANNER -->
<div id="banner">
  <div>
    <h2 id="banner-title">Loading...</h2>
    <button id="watchBtn">▶ Watch</button>
  </div>
</div>

<!-- MOVIES -->
<div class="section-header">
  <h2 id="movies">🔥 Movies</h2>
  <button id="viewBtn" onclick="viewAll('movies')" class="view-btn">View All</button>
</div>
<div id="movies-list" class="list"></div>

<!-- CONTINUE -->
<h2 style="padding-left:15px;">▶ Continue Watching</h2>
<div id="continue-list" class="list"></div>

<!-- TV -->
<h2 id="tv" style="padding-left:15px;">📺 TV Shows</h2>
<div id="tvshows-list" class="list"></div>

<!-- ANIME -->
<h2 id="anime" style="padding-left:15px;">🎌 Anime</h2>
<div id="anime-list" class="list"></div>

<!-- DRAMA -->
<h2 id="drama" style="padding-left:15px;">🎭 Drama Series</h2>
<div id="drama-list" class="list"></div>

<!-- FAVORITES -->
<h2 style="padding-left:15px;">❤️ Favorites</h2>
<div id="favorites-list" class="list"></div>

<!-- MODAL -->
<div id="modal">
  <span class="close" onclick="closeModal()">✖</span>
  <h3 id="modal-title"></h3>
  <iframe id="modal-video" allow="autoplay; fullscreen" allowfullscreen></iframe>
</div>

<script src="home.js"></script>

</body>
</html>
