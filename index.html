<!DOCTYPE html>
<html>
<head>
  <title>My Movie Site</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
    }

    h2 {
      margin-left: 10px;
    }

    .list {
      display: flex;
      flex-wrap: wrap;
    }

    img {
      width: 150px;
      margin: 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    img:hover {
      transform: scale(1.05);
    }

    #modal {
      display: none;
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      padding:10px;
    }

    iframe {
      width: 100%;
      max-width: 600px;
      height: 300px;
    }

    .close {
      color:red;
      font-size:30px;
      cursor:pointer;
      align-self:flex-end;
      margin-right:20px;
    }
  </style>
</head>

<body>

<h2>🔥 Trending Movies</h2>
<div id="movies-list" class="list"></div>

<h2>📺 Trending TV Shows</h2>
<div id="tvshows-list" class="list"></div>

<h2>🎌 Anime</h2>
<div id="anime-list" class="list"></div>

<!-- MODAL -->
<div id="modal">
  <span class="close" onclick="closeModal()">✖</span>
  <h2 id="modal-title"></h2>
  <iframe id="modal-video" frameborder="0" allowfullscreen></iframe>
</div>

<script src="home.js"></script>

</body>
</html>
