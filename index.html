<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix ULTRA FINAL</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:Arial}

/* NAV */
.navbar{
position:fixed;top:0;width:100%;
display:flex;justify-content:space-between;
padding:15px;background:rgba(0,0,0,0.9);
z-index:1000;
}
.logo{color:red;font-weight:bold}
#search{
background:#222;border:none;color:white;
padding:8px 15px;border-radius:20px;
}

/* HERO */
#hero{
height:60vh;
display:flex;
align-items:flex-end;
padding:20px;
margin-top:60px;
background-size:cover;
background-position:center;
position:relative;
}
#hero::after{
content:"";
position:absolute;
bottom:0;width:100%;height:200px;
background:linear-gradient(to top,#000,transparent);
}
.hero-content{z-index:2}

/* ROW */
.row{margin-top:15px}
.row h2{padding-left:10px}
.row-posters{
display:flex;overflow-x:auto;
gap:10px;padding:10px;
}

/* CARD */
.card{min-width:130px;cursor:pointer}
.card img{
width:130px;height:190px;
border-radius:8px;
transition:.3s;
}
.card img:hover{
transform:scale(1.08);
box-shadow:0 0 10px red;
}
.card div{font-size:12px}

/* PREVIEW */
#preview{
display:none;
position:fixed;top:0;width:100%;height:100%;
background:rgba(0,0,0,0.95);
z-index:9998;padding:20px;
overflow:auto;
}
#preview iframe{width:100%;height:250px}

/* PLAYER */
#player{
display:none;
position:fixed;top:0;width:100%;height:100%;
background:black;z-index:9999;
}
#player iframe{width:100%;height:70%}

/* CONTROLS */
.controls{
display:flex;justify-content:center;
gap:10px;padding:10px;
}
.controls button{
padding:10px;background:#222;color:white;border:none;
}

/* EPISODES */
#episodes{
max-height:30%;overflow:auto;padding:10px;
}
.ep{
padding:10px;background:#111;margin:5px 0;
border-radius:5px;cursor:pointer;
}
.ep:hover{background:red}

.close{
position:absolute;top:10px;right:20px;
font-size:30px;cursor:pointer;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">ShiedFlix+</div>
<input id="search" placeholder="Search...">
</div>

<!-- HERO -->
<div id="hero">
<div class="hero-content">
<h1 id="hero-title"></h1>
<p id="hero-desc"></p>
<button id="playHero">▶ Play</button>
</div>
</div>

<!-- CONTINUE -->
<div class="row">
<h2>▶ Continue Watching</h2>
<div id="continue" class="row-posters"></div>
</div>

<!-- SEARCH -->
<div class="row" id="searchRow" style="display:none">
<h2>🔎 Search</h2>
<div id="searchResults" class="row-posters"></div>
</div>

<!-- ROWS -->
<div class="row"><h2>🔥 Trending</h2><div id="trending" class="row-posters"></div></div>
<div class="row"><h2>🎬 Movies</h2><div id="movies" class="row-posters"></div></div>
<div class="row"><h2>📺 TV</h2><div id="tv" class="row-posters"></div></div>

<!-- PREVIEW -->
<div id="preview">
<span class="close" onclick="closePreview()">✖</span>
<iframe id="previewTrailer"></iframe>
<h2 id="previewTitle"></h2>
<p id="previewDesc"></p>
<button onclick="playNow()">▶ Play</button>
</div>

<!-- PLAYER -->
<div id="player">
<span class="close" onclick="closePlayer()">✖</span>
<iframe id="full"></iframe>

<div class="controls">
<button onclick="goFull()">⛶ Fullscreen</button>
</div>

<div id="episodes"></div>
</div>

<script>
const API="https://api.themoviedb.org/3";
const KEY="43c2413701b5c752d07b62acf8e57736";
const IMG="https://image.tmdb.org/t/p/w500";

let current=null,currentType="movie";
let continueList=JSON.parse(localStorage.getItem("continue"))||[];
let nextEp={id:null,s:1,e:1};

/* CARD */
function createCard(i,type){
const c=document.createElement("div");
c.className="card";
c.innerHTML=`
<img src="${IMG+i.poster_path}">
<div>${i.title||i.name} (${(i.release_date||i.first_air_date||"").slice(0,4)})</div>
`;
c.onclick=()=>openPreview(i,type);
return c;
}

/* SHOW */
function show(list,id,type){
const box=document.getElementById(id);
box.innerHTML="";
list.forEach(i=>{
if(!i.poster_path)return;
box.appendChild(createCard(i,type));
});
}

/* HERO */
function setHero(m){
document.getElementById("hero-title").innerText=m.title||m.name;
document.getElementById("hero-desc").innerText=m.overview;
document.getElementById("hero").style.backgroundImage=
`url(https://image.tmdb.org/t/p/original${m.backdrop_path})`;
document.getElementById("playHero").onclick=()=>openPlayer(m);
}

/* PREVIEW */
async function openPreview(i,type){
current=i;currentType=type;
preview.style.display="block";

previewTitle.innerText=i.title||i.name;
previewDesc.innerText=i.overview;

const res=await fetch(`${API}/${type}/${i.id}/videos?api_key=${KEY}`);
const data=await res.json();
const t=data.results.find(v=>v.site==="YouTube");
previewTrailer.src=t?`https://www.youtube.com/embed/${t.key}`:"";
}

function closePreview(){preview.style.display="none";}

/* PLAY */
function playNow(){openPlayer(current);closePreview();}

/* PLAYER */
async function openPlayer(i){
full.src=currentType==="movie"
?`https://vidsrc.cc/v2/embed/movie/${i.id}`
:`https://vidsrc.cc/v2/embed/tv/${i.id}/1/1`;

player.style.display="block";

/* SAVE */
continueList.unshift(i);
localStorage.setItem("continue",JSON.stringify(continueList));
renderContinue();

/* EPISODES */
if(currentType==="tv"){
const res=await fetch(`${API}/tv/${i.id}?api_key=${KEY}`);
const data=await res.json();

let html="";
data.seasons.forEach(s=>{
if(s.season_number===0)return;
html+=`<h4>Season ${s.season_number}</h4>`;
for(let e=1;e<=s.episode_count;e++){
html+=`<div class="ep" onclick="playEpisode(${i.id},${s.season_number},${e})">
Episode ${e}
</div>`;
}
});
episodes.innerHTML=html;
}else episodes.innerHTML="";
}

/* PLAY EP */
function playEpisode(id,s,e){
full.src=`https://vidsrc.cc/v2/embed/tv/${id}/${s}/${e}`;

/* AUTO NEXT */
nextEp={id:id,s:s,e:e+1};
}

/* AUTO NEXT SIMULATION */
setInterval(()=>{
if(nextEp.id){
console.log("Ready next episode:",nextEp);
}
},5000);

/* FULLSCREEN */
function goFull(){
if(full.requestFullscreen) full.requestFullscreen();
}

/* CLOSE */
function closePlayer(){
player.style.display="none";
full.src="";
}

/* CONTINUE */
function renderContinue(){
continue.innerHTML="";
continueList.slice(0,10).forEach(i=>{
continue.appendChild(createCard(i,"movie"));
});
}

/* SEARCH */
let d;
search.oninput=e=>{
clearTimeout(d);
d=setTimeout(async()=>{
const v=e.target.value;
if(!v){searchRow.style.display="none";return;}

const res=await fetch(`${API}/search/multi?api_key=${KEY}&query=${v}`);
const data=await res.json();

searchRow.style.display="block";
searchResults.innerHTML="";
data.results.forEach(i=>{
if(!i.poster_path)return;
searchResults.appendChild(createCard(i,i.media_type));
});
},400);
};

/* INIT */
async function init(){
const t=await fetch(`${API}/trending/all/week?api_key=${KEY}`).then(r=>r.json());
const m=await fetch(`${API}/movie/popular?api_key=${KEY}`).then(r=>r.json());
const tv=await fetch(`${API}/tv/popular?api_key=${KEY}`).then(r=>r.json());

show(t.results,"trending","movie");
show(m.results,"movies","movie");
show(tv.results,"tv","tv");

setHero(t.results[0]);
renderContinue();
}
init();
</script>

</body>
</html>
