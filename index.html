<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix Ultra FINAL</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:white;font-family:Arial;overflow-x:hidden}

/* NAV */
.navbar{
position:fixed;width:100%;top:0;
padding:15px;display:flex;justify-content:space-between;
background:rgba(0,0,0,0.9);z-index:1000;
}
.logo{color:red;font-weight:bold}

/* SEARCH */
#search{
background:#222;border:none;color:white;
padding:8px 15px;border-radius:20px;
width:120px;transition:0.3s;
}
#search:focus{width:200px;background:#111;outline:none}

/* HERO */
#hero{
height:55vh;
display:flex;
align-items:flex-end;
padding:20px;
margin-top:60px;
position:relative;
overflow:hidden;
}

#hero iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
opacity:0.4;
pointer-events:none;
z-index:0;
}

#hero::before{
content:"";
position:absolute;
top:50%;
left:50%;
width:30px;height:30px;
border:3px solid #fff;
border-top:3px solid transparent;
border-radius:50%;
animation:spin 1s linear infinite;
transform:translate(-50%,-50%);
z-index:2;
}

#hero.loaded::before{display:none;}

#hero::after{
content:"";
position:absolute;
bottom:0;width:100%;height:150px;
background:linear-gradient(to top,#000,transparent);
z-index:1;
}

.hero-content{
z-index:2;
max-width:600px;
width:90%;
}

.hero-content p{
max-height:80px;
overflow:hidden;
}

.hero-buttons{display:flex;gap:10px;margin-top:10px}
.play-btn{background:white;color:black;padding:8px 15px;border:none;border-radius:5px}
.trailer-btn{background:red;color:white;padding:8px 15px;border:none;border-radius:5px}
.list-btn{background:#333;color:white;padding:8px 15px;border:none;border-radius:5px}

/* ROW */
.row{margin-top:15px}
.row h2{padding-left:10px}

.row-posters{
display:flex;overflow-x:auto;gap:10px;padding:10px;
}
.row-posters::-webkit-scrollbar{display:none}

.card{min-width:130px;cursor:pointer}
.card img{width:130px;height:190px;border-radius:8px}

/* PLAYER */
#player{
display:none;
position:fixed;
top:0;
left:0;
width:100vw;
height:100dvh;
background:black;
z-index:9999;
}

#player iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100dvh; /* 🔥 important */
border:none;
}
.close-btn{
position:fixed;
top:15px;right:15px;
font-size:28px;
z-index:9999;
cursor:pointer;
}

/* CONTROLS */
#serverControls{
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
z-index:10000;
}

#episodeControls{
position:fixed;
top:60px;
left:0;
width:100%;
z-index:10000;
}
#episodeControls::-webkit-scrollbar{display:none}

/* PREVIEW */
#previewModal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:black;
z-index:9998;
overflow-y:auto;
}

#previewVideo{
width:100%;
height:220px;
border:none;
}

.preview-btn{
margin-top:10px;
padding:10px;
border:none;
background:red;
color:white;
}

@keyframes spin{
to{transform:translate(-50%,-50%) rotate(360deg);}
}
html, body{
margin:0;
padding:0;
overflow-x:hidden;
}
body.player-open{
overflow:hidden;
height:100dvh;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">ShiedFlix</div>
<input id="search" placeholder="Search...">
</div>

<!-- HERO -->
<div id="hero">
<iframe id="heroVideo"></iframe>

<div class="hero-content">
<h1 id="hero-title"></h1>
<p id="hero-desc"></p>

<div class="hero-buttons">
<button class="play-btn" id="playHero">▶ Play</button>
<button class="trailer-btn" id="watchTrailer">🎬 Trailer</button>
<button class="list-btn" onclick="toggleMyList()">❤️ My List</button>
</div>
</div>
</div>

<!-- CONTINUE -->
<div class="row">
<h2>▶ Continue Watching</h2>
<div id="continue" class="row-posters"></div>
</div>

<!-- MY LIST -->
<div class="row">
<h2>❤️ My List</h2>
<div id="mylist" class="row-posters"></div>
</div>

<!-- SEARCH -->
<div class="row" id="searchRow" style="display:none;">
<h2>🔎 Search Results</h2>
<div id="searchResults" class="row-posters"></div>
</div>

<!-- ROWS -->
<div class="row"><h2>🔥 Trending</h2><div id="trending" class="row-posters"></div></div>
<div class="row"><h2>🎬 Movies</h2><div id="movies" class="row-posters"></div></div>
<div class="row"><h2>📺 TV Shows</h2><div id="tv" class="row-posters"></div></div>

<!-- PLAYER -->
<div id="player">
<span class="close-btn" onclick="closePlayer()">✖</span>
<div id="serverControls"></div>
<div id="episodeControls"></div>
<iframe id="full" allowfullscreen allow="autoplay"></iframe>
</div>
<button id="nextEpisodeBtn" style="
position:fixed;
bottom:80px;
right:20px;
padding:12px 15px;
background:red;
color:white;
border:none;
border-radius:5px;
z-index:10000;
display:none;
">
▶ Next Episode
</button>

</div>

<!-- PREVIEW -->
<div id="previewModal">
<span onclick="closePreview()" class="close-btn">✖</span>
<iframe id="previewVideo"></iframe>
<h2 id="previewTitle"></h2>
<p id="previewDesc"></p>
<button class="preview-btn" onclick="playFromPreview()">▶ Play</button>
<button class="preview-btn" id="myListBtn"></button>
</div>

<script>
const API="https://api.themoviedb.org/3";
const KEY="43c2413701b5c752d07b62acf8e57736";
const IMG="https://image.tmdb.org/t/p/w500";

let previewItem=null,currentType="movie";
let continueList=JSON.parse(localStorage.getItem("continue"))||[];
let myList=JSON.parse(localStorage.getItem("myList"))||[];
let servers = [];
let currentEpisode = 1;
let currentShowId = null;
  
function nextEpisode(){
currentEpisode++;

if(currentEpisode > 10) return;

servers = [
{name:"Server 1", url:`https://vidsrc.me/embed/tv/${currentShowId}/1/${currentEpisode}`},
{name:"Server 2", url:`https://vidsrc.xyz/embed/tv/${currentShowId}/1/${currentEpisode}`}
];

renderEpisodes({id:currentShowId});
renderServers();
loadServer(0);
}

/* FETCH */
async function fetchData(url){
const res=await fetch(url);
return (await res.json()).results;
}

/* TRAILER */
async function getTrailer(id,type){
try{
const res=await fetch(`${API}/${type}/${id}/videos?api_key=${KEY}`);
const data=await res.json();
let t=data.results?.find(v=>v.site==="YouTube");
return t?`https://www.youtube.com/embed/${t.key}`:null;
}catch{return null;}
}

/* CARD */
function createCard(i,type){
const card=document.createElement("div");
card.className="card";
card.innerHTML=`<img src="${IMG+i.poster_path}"><div>${i.title||i.name}</div>`;
card.onclick=()=>openPreview(i,type);
return card;
}

/* PREVIEW */
function openPreview(i,type){
previewItem=i;
currentType=type;

document.getElementById("previewTitle").innerText=i.title||i.name;
document.getElementById("previewDesc").innerText=i.overview||"";

document.getElementById("previewModal").style.display="block";

getTrailer(i.id,type).then(t=>{
if(t) document.getElementById("previewVideo").src=t+"?autoplay=1&mute=1";
});
}

function closePreview(){
document.getElementById("previewModal").style.display="none";
document.getElementById("previewVideo").src="";
}

function playFromPreview(){
closePreview();
openPlayer(previewItem);
}

/* PLAYER */
function openPlayer(i){
document.getElementById("player").style.display="block";
document.body.classList.add("player-open");

let isMovie = !!i.title;

// 🎬 MOVIE SERVERS
if(isMovie){
currentShowId = null;
document.getElementById("episodeControls").innerHTML="";
document.getElementById("episodeControls").style.display="none";
document.getElementById("nextEpisodeBtn").style.display="none";
servers = [
{name:"Server 1", url:`https://vidsrc.me/embed/movie/${i.id}`},
{name:"Server 2", url:`https://vidsrc.xyz/embed/movie/${i.id}`},
{name:"Server 3", url:`https://vidlink.pro/movie/${i.id}`},
{name:"Server 4", url:`https://multiembed.mov/?video_id=${i.id}&tmdb=1`},
{name:"Server 5", url:`https://2embed.cc/embed/${i.id}`}
];

// 📺 TV SERVERS
}else{
document.getElementById("episodeControls").style.display="flex";
currentEpisode = 1;
currentShowId = i.id;

document.getElementById("nextEpisodeBtn").style.display="block";
renderEpisodes(i);

servers = [
{name:"Server 1", url:`https://vidsrc.me/embed/tv/${i.id}/1/1`},
{name:"Server 2", url:`https://vidsrc.xyz/embed/tv/${i.id}/1/1`},
{name:"Server 3", url:`https://vidlink.pro/tv/${i.id}/1/1`},
{name:"Server 4", url:`https://multiembed.mov/?video_id=${i.id}&tmdb=1&s=1&e=1`},
{name:"Server 5", url:`https://2embed.cc/embedtv/${i.id}&s=1&e=1`}
];
}

renderServers();
loadServer(0);
saveContinue(i);
}


function renderServers(){
const box=document.getElementById("serverControls");
box.innerHTML="";
servers.forEach((s,i)=>{
let b=document.createElement("button");
b.innerText=s.name;
b.onclick=()=>loadServer(i);
box.appendChild(b);
});
}
function loadServer(i){
const iframe = document.getElementById("full");

// reset
iframe.src = "";

// load
setTimeout(()=>{
iframe.src = servers[i].url;
},200);

// show next button only if TV
if(currentShowId){
document.getElementById("nextEpisodeBtn").style.display = "block";
}

// auto next
clearTimeout(window.autoNextTimer);
window.autoNextTimer = setTimeout(()=>{
nextEpisode();
}, 1000 * 60 * 20);

// 🔥 highlight active
const buttons = document.querySelectorAll("#serverControls button");
buttons.forEach(btn=>btn.style.background="#222");
if(buttons[i]) buttons[i].style.background="red";
}
function closePlayer(){
document.getElementById("player").style.display="none";
document.getElementById("full").src="";
document.body.classList.remove("player-open");
document.getElementById("episodeControls").innerHTML="";
clearTimeout(window.autoNextTimer);
}

/* EPISODES */
function renderEpisodes(i){
if(i.title) return;

currentShowId = i.id;

const box = document.getElementById("episodeControls");
box.innerHTML="";

for(let e=1;e<=10;e++){
let btn=document.createElement("button");
btn.innerText="Ep "+e;

btn.style.padding="8px";
btn.style.border="none";
btn.style.borderRadius="5px";

// 🔥 highlight current
if(e === currentEpisode){
btn.style.background="red";
btn.style.color="white";
}else{
btn.style.background="#222";
btn.style.color="white";
}

btn.onclick=()=>{
currentEpisode = e;

// update servers
servers = [
{name:"Server 1", url:`https://vidsrc.me/embed/tv/${i.id}/1/${e}`},
{name:"Server 2", url:`https://vidsrc.xyz/embed/tv/${i.id}/1/${e}`},
{name:"Server 3", url:`https://vidlink.pro/tv/${i.id}/1/${e}`}
];

renderEpisodes(i); // refresh highlight
renderServers();
loadServer(0);
};

box.appendChild(btn);
}
}

/* CONTINUE */
function saveContinue(m){
continueList=continueList.filter(x=>x.id!==m.id);
continueList.unshift(m);
localStorage.setItem("continue",JSON.stringify(continueList));
renderContinue();
}

function renderContinue(){
const box=document.getElementById("continue");
box.innerHTML="";
continueList.forEach(m=>box.appendChild(createCard(m,"movie")));
}

/* MY LIST */
function toggleMyList(){
let exist=myList.find(m=>m.id===previewItem.id);
if(exist){myList=myList.filter(m=>m.id!==previewItem.id);}
else{myList.push(previewItem);}
localStorage.setItem("myList",JSON.stringify(myList));
renderMyList();
}

function renderMyList(){
const box=document.getElementById("mylist");
box.innerHTML="";
myList.forEach(m=>box.appendChild(createCard(m,"movie")));
}

/* HERO */
async function setHero(m){
closePreview();

const hero=document.getElementById("hero");
const video=document.getElementById("heroVideo");

video.src="";
video.style.display="none";

document.getElementById("hero-title").innerText=m.title||m.name;
document.getElementById("hero-desc").innerText=m.overview||"";

if(m.backdrop_path){
hero.style.background=`url(${IMG+m.backdrop_path}) center/cover`;
}

let t=await getTrailer(m.id,"movie");

if(t){
video.style.display="block";
setTimeout(()=>video.src=t+"?autoplay=1&mute=1",200);
}

hero.classList.add("loaded");

document.getElementById("playHero").onclick=()=>openPlayer(m);
}

/* SEARCH */
let debounce;
document.getElementById("search").addEventListener("input",(e)=>{
clearTimeout(debounce);
debounce=setTimeout(async()=>{
const v=e.target.value.trim();
const row=document.getElementById("searchRow");
const box=document.getElementById("searchResults");

if(!v){row.style.display="none";return;}

const res=await fetch(`${API}/search/multi?api_key=${KEY}&query=${v}`);
const data=await res.json();

box.innerHTML="";
let valid=data.results.filter(i=>i.poster_path);

if(valid.length===0){row.style.display="none";return;}

row.style.display="block";
valid.forEach(i=>box.appendChild(createCard(i,i.media_type)));
},400);
});

/* INIT */
async function init(){
const trending=await fetchData(`${API}/trending/all/week?api_key=${KEY}`);
const movies=await fetchData(`${API}/movie/popular?api_key=${KEY}`);
const tv=await fetchData(`${API}/tv/popular?api_key=${KEY}`);

trending.forEach(i=>document.getElementById("trending").appendChild(createCard(i,i.media_type)));
movies.forEach(i=>document.getElementById("movies").appendChild(createCard(i,"movie")));
tv.forEach(i=>document.getElementById("tv").appendChild(createCard(i,"tv")));

if(trending.length>0) setHero(trending[0]);

renderContinue();
renderMyList();
}

init();
document.getElementById("nextEpisodeBtn").onclick = nextEpisode;
</script>

</body>
</html>
