<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix PRO</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
}

/* NAV */
.nav{
position:fixed;
top:0;
width:100%;
padding:15px;
background:linear-gradient(to bottom,#000,transparent);
z-index:100;
}
.logo{color:red;font-weight:bold}

/* HERO */
.hero{
height:70vh;
background-size:cover;
display:flex;
align-items:flex-end;
padding:20px;
}
.hero h1{margin:0}
.hero button{
background:red;
border:none;
padding:10px 20px;
color:#fff;
margin-top:10px;
}

/* ROW */
.row{
padding:20px;
}
.posters{
display:flex;
overflow-x:auto;
gap:10px;
}
.posters img{
width:140px;
border-radius:6px;
cursor:pointer;
}

/* PLAYER */
.player{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:9999;
}

video{
width:100%;
height:100%;
object-fit:contain;
background:black;
}

/* CONTROLS */
.controls{
position:absolute;
bottom:0;
width:100%;
background:linear-gradient(to top,black,transparent);
padding:10px;
}

.progress{
width:100%;
}

.btn{
background:none;
border:none;
color:white;
font-size:18px;
margin-right:10px;
}

/* CLOSE */
.close{
position:absolute;
top:10px;
right:20px;
font-size:30px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="nav">
<div class="logo">ShiedFlix</div>
</div>

<div class="hero" id="hero">
<div>
<h1 id="heroTitle"></h1>
<button onclick="playVideo()">▶ Play</button>
</div>
</div>

<div class="row">
<h2>🔥 Movies</h2>
<div class="posters" id="movies"></div>
</div>

<!-- PLAYER -->
<div class="player" id="player">
<span class="close" onclick="closePlayer()">✖</span>

<video id="video"></video>

<div class="controls">
<button class="btn" onclick="togglePlay()">⏯</button>
<button class="btn" onclick="mute()">🔊</button>
<button class="btn" onclick="fullscreen()">⛶</button>

<input type="range" id="progress" class="progress">
</div>

</div>

<script>
const IMG="https://image.tmdb.org/t/p/w500";
const API="https://api.themoviedb.org/3";
const KEY="43c2413701b5c752d07b62acf8e57736";

/* 🔥 SAMPLE VIDEO (PALITAN MO ITO) */
const SAMPLE_VIDEO="https://www.w3schools.com/html/mov_bbb.mp4";

let currentVideo=SAMPLE_VIDEO;

/* FETCH */
async function getMovies(){
const res=await fetch(`${API}/movie/popular?api_key=${KEY}`);
return (await res.json()).results;
}

/* SHOW */
function show(list){
const box=document.getElementById("movies");

list.forEach(m=>{
if(!m.poster_path)return;

const img=document.createElement("img");
img.src=IMG+m.poster_path;

img.onclick=()=>{
currentVideo=SAMPLE_VIDEO; // 🔥 PALITAN MO PER MOVIE
playVideo();
};

box.appendChild(img);
});
}

/* HERO */
function setHero(movie){
document.getElementById("hero").style.backgroundImage=
`url(${IMG+movie.backdrop_path})`;

document.getElementById("heroTitle").innerText=movie.title;
}

/* PLAYER */
function playVideo(){
const player=document.getElementById("player");
const video=document.getElementById("video");

player.style.display="block";
video.src=currentVideo;
video.play();
}

/* CONTROLS */
function togglePlay(){
const v=document.getElementById("video");
if(v.paused) v.play(); else v.pause();
}

function mute(){
const v=document.getElementById("video");
v.muted=!v.muted;
}

function fullscreen(){
const v=document.getElementById("video");
if(v.requestFullscreen) v.requestFullscreen();
}

/* PROGRESS */
const video=document.getElementById("video");
const progress=document.getElementById("progress");

video.ontimeupdate=()=>{
progress.value=(video.currentTime/video.duration)*100;
};

progress.oninput=()=>{
video.currentTime=(progress.value/100)*video.duration;
};

/* CLOSE */
function closePlayer(){
const player=document.getElementById("player");
const video=document.getElementById("video");

player.style.display="none";
video.pause();
video.src="";
}

/* INIT */
async function init(){
const movies=await getMovies();
show(movies);
setHero(movies[0]);
}

init();
</script>

</body>
</html>
