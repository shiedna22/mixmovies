<!DOCTYPE html>
<html>
<head>
  <title>ShiedFlix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <style>
html {
  scroll-behavior: smooth;
}

body {
  background: #0b0b0b;
  color: white;
  font-family: Arial;
  margin:0;
}

/* NAVBAR */
.navbar {
  position: sticky;
  top: 0;
  background: black;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
}

.logo {
  color: red;
  font-size: 22px;
  font-weight: bold;
}

.menu a {
  color: white;
  margin-left: 15px;
  text-decoration: none;
}

.menu a:hover {
  color: red;
}

#searchInput {
  margin-left: 15px;
  padding: 5px;
  border-radius: 5px;
  border: none;
}

/* 🎬 BANNER */
#banner {
  position: relative; /* IMPORTANT */
  height: 300px;
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: flex-end;
  padding: 20px;
}

/* 🔥 GRADIENT OVERLAY */
#banner::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(to right, rgba(0,0,0,0.85), transparent);
  z-index: 1;
}

/* CONTENT SA TAAS NG OVERLAY */
.banner-content {
  position: relative;
  z-index: 2;
  background: rgba(0,0,0,0.6);
  padding: 15px;
  border-radius: 10px;
}

#banner-title {
  margin: 0;
}

#watchBtn {
  margin-top: 10px;
  padding: 8px 15px;
  border: none;
  background: red;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}

/* LIST */
h2 {
  margin: 20px;
}

.list {
  display: flex;
  overflow-x: auto;
  padding: 10px;
}

#search-results {
  display: flex;
  flex-wrap: wrap;
  padding: 10px;
}

/* IMAGES */
img {
  width: 140px;
  margin-right: 10px;
  border-radius: 10px;
  transition: 0.3s;
}

img:hover {
  transform: scale(1.1);
}

/* MODAL */
#modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

iframe {
  width:90%;
  height:300px;
}

.close {
  position:absolute;
  right:20px;
  top:20px;
  font-size:30px;
  cursor:pointer;
}
  </style>


</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">🎬 ShiedFlix</div>

  <div class="menu">
    <a href="#">Home</a>
    <a href="#movies">Movies</a>
    <a href="#tv">TV Shows</a>
    <a href="#anime">Anime</a>
    <input type="text" placeholder="Search..." id="searchInput">
  </div>
</div>

<!-- 🎬 BANNER (FIXED POSITION) -->
<div id="banner">
  <div class="banner-content">
    <h1 id="banner-title">Loading...</h1>
    <button id="watchBtn">▶ Watch Now</button>
  </div>
</div>

<!-- 🔍 SEARCH -->
<div id="search-results"></div>

<!-- MOVIES -->
<h2 id="movies">🔥 Trending Movies</h2>
<div id="movies-list" class="list"></div>

<!-- ADS -->
<div style="text-align:center;margin:20px;">
  <!-- ADS CODE HERE -->
</div>

<!-- TV -->
<h2 id="tv">📺 Trending TV Shows</h2>
<div id="tvshows-list" class="list"></div>

<!-- ANIME -->
<h2 id="anime">🎌 Anime</h2>
<div id="anime-list" class="list"></div>

<!-- MODAL -->
<div id="modal">
  <span class="close" onclick="closeModal()">✖</span>
  <h2 id="modal-title"></h2>
  <iframe id="modal-video" frameborder="0" allowfullscreen></iframe>
</div>

<script src="home.js"></script>

</body>
</html>
