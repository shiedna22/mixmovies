<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix Ultra FINAL</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:white;font-family:Arial}

/* NAV */
.navbar{
position:fixed;width:100%;top:0;
padding:15px;display:flex;justify-content:space-between;
background:rgba(0,0,0,0.9);z-index:1000;
}
.logo{color:red;font-weight:bold}

/* SEARCH */
#search{
background:#222;border:none;color:white;
padding:8px 15px;border-radius:20px;
width:120px;
}
#search:focus{width:200px}

/* HERO */
#hero{
height:45vh;
min-height:260px;
max-height:420px;
margin-top:60px;
position:relative;
overflow:hidden;
}
#hero iframe{
position:absolute;
top:50%;left:50%;
width:177.77vh;height:100vh;
transform:translate(-50%,-50%);
opacity:0.4;
pointer-events:none;
}
#hero::before{
content:"";
position:absolute;
width:100%;height:100%;
background:linear-gradient(to top,#000,transparent);
}
.hero-content{
position:absolute;
bottom:20px;
left:15px;
z-index:2;
max-width:90%;
}
.hero-content h1{font-size:16px}
.hero-content p{font-size:11px;max-height:50px;overflow:hidden}

/* BUTTONS */
.hero-buttons{margin-top:10px;display:flex;gap:8px}
.play-btn{background:white;color:black;padding:8px 12px;border:none;border-radius:5px}
.trailer-btn{background:red;color:white;padding:8px 12px;border:none;border-radius:5px}
.list-btn{background:#333;color:white;padding:8px 12px;border:none;border-radius:5px}

/* ROW */
.row{margin-top:10px}
.row h2{font-size:14px;padding-left:10px}
.row-posters{display:flex;overflow-x:auto;gap:10px;padding:10px}
.row-posters::-webkit-scrollbar{display:none}

.card{cursor:pointer}
.card img{width:110px;height:160px;border-radius:6px}

/* PLAYER */
#player{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:black;
z-index:9999;
}

#player iframe{
position:absolute;
top:0;left:0;
width:100%;height:100%;
border:none;
z-index:1;
pointer-events:auto;
}

/* SHIELD */
#clickShield{
position:absolute;
top:0;left:0;
width:100%;height:100%;
z-index:2;
}

/* CONTROLS */
.close-btn{
position:fixed;
top:10px;
right:10px;
z-index:999999;
font-size:26px;
background:black;
padding:8px;
border-radius:50%;
cursor:pointer;
}

#serverControls,
#episodeControls{
position:fixed;
left:0;width:100%;
display:flex;gap:6px;
overflow-x:auto;
padding:8px;
z-index:99998;
}
#serverControls{top:10px}
#episodeControls{top:55px}

#episodeControls button{
background:#1a1a1a;
color:#ccc;
border:none;
padding:6px 12px;
border-radius:20px;
font-size:12px;
}
#episodeControls button.active{
background:#e50914;
color:white;
box-shadow:0 0 8px rgba(229,9,20,0.7);
}

/* PREVIEW */
#previewModal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:black;
z-index:9998;
padding:10px;
}
#previewVideo{width:100%;height:200px}

@media(min-width:768px){
#hero{height:60vh;}
.hero-content h1{font-size:22px}
.hero-content p{font-size:14px}
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">ShiedFlix</div>
<input id="search" placeholder="Search...">
</div>

<!-- HERO -->
<div id="hero">
<iframe id="heroVideo"></iframe>
<div class="hero-content">
<h1 id="hero-title"></h1>
<p id="hero-desc"></p>
<div class="hero-buttons">
<button class="play-btn" id="playHero">▶ Play</button>
<button class="trailer-btn">🎬 Trailer</button>
<button class="list-btn" onclick="toggleMyList()">❤️ My List</button>
</div>
</div>
</div>

<!-- ROWS -->
<div class="row"><h2>▶ Continue Watching</h2><div id="continue" class="row-posters"></div></div>
<div class="row"><h2>❤️ My List</h2><div id="mylist" class="row-posters"></div></div>
<div class="row"><h2>🔥 Trending</h2><div id="trending" class="row-posters"></div></div>
<div class="row"><h2>🎬 Movies</h2><div id="movies" class="row-posters"></div></div>
<div class="row"><h2>📺 TV Shows</h2><div id="tv" class="row-posters"></div></div>

<!-- PLAYER -->
<div id="player">
<div id="clickShield"></div>
<span class="close-btn" onclick="closePlayer()">✖</span>
<div id="serverControls"></div>
<div id="episodeControls"></div>
<iframe id="full"></iframe>
</div>

<!-- PREVIEW -->
<div id="previewModal">
<span class="close-btn" onclick="closePreview()">✖</span>
<iframe id="previewVideo"></iframe>
<h2 id="previewTitle"></h2>
<p id="previewDesc"></p>
<button onclick="playFromPreview()">▶ Play</button>
</div>

<script>
const API="https://api.themoviedb.org/3";
const KEY="43c2413701b5c752d07b62acf8e57736";
const IMG="https://image.tmdb.org/t/p/w500";

let previewItem=null;
let continueList=JSON.parse(localStorage.getItem("continue"))||[];
let myList=JSON.parse(localStorage.getItem("myList"))||[];

let servers=[];
let currentEpisode=1;
let heroList=[];
let heroIndex=0;

/* FETCH */
async function fetchData(url){
const res=await fetch(url);
return (await res.json()).results;
}

/* TRAILER */
async function getTrailer(id,type){
const res=await fetch(`${API}/${type}/${id}/videos?api_key=${KEY}`);
const data=await res.json();
let t=data.results?.find(v=>v.site==="YouTube");
return t?`https://www.youtube.com/embed/${t.key}`:null;
}

/* CARD */
function createCard(i,type){
const c=document.createElement("div");
c.className="card";
c.innerHTML=`<img src="${IMG+i.poster_path}">`;
c.onclick=()=>openPreview(i,type);
return c;
}

/* PREVIEW */
function openPreview(i,type){
previewItem=i;
document.getElementById("previewModal").style.display="block";

let year=(i.release_date||i.first_air_date||"").slice(0,4);
document.getElementById("previewTitle").innerText=(i.title||i.name)+" ("+year+")";
document.getElementById("previewDesc").innerText=i.overview||"";

getTrailer(i.id,type).then(t=>{
if(t) document.getElementById("previewVideo").src=t;
});
}

function closePreview(){
document.getElementById("previewModal").style.display="none";
document.getElementById("previewVideo").src="";
}

function playFromPreview(){
closePreview();
openPlayer(previewItem);
}

/* PLAYER */
function openPlayer(i){
document.getElementById("player").style.display="block";
document.getElementById("clickShield").style.display="block";

if(i.title){
servers=[
{name:"S1",url:`https://vidlink.pro/movie/${i.id}`},
{name:"S2",url:`https://multiembed.mov/?video_id=${i.id}&tmdb=1`}
];
document.getElementById("episodeControls").innerHTML="";
}else{
servers=[
{name:"S1",url:`https://vidlink.pro/tv/${i.id}/1/1`}
];
renderEpisodes(i);
}

renderServers();
loadServer(0);
saveContinue(i);
}

function renderServers(){
let box=document.getElementById("serverControls");
box.innerHTML="";
servers.forEach((s,i)=>{
let b=document.createElement("button");
b.innerText=s.name;
b.onclick=()=>loadServer(i);
box.appendChild(b);
});
}

function loadServer(i){
let f=document.getElementById("full");
f.src="";
setTimeout(()=>f.src=servers[i].url,150);
}

/* EPISODES */
function renderEpisodes(i){
let box=document.getElementById("episodeControls");
box.innerHTML="";
for(let e=1;e<=10;e++){
let b=document.createElement("button");
b.innerText="Ep "+e;

if(e===currentEpisode) b.classList.add("active");

b.onclick=()=>{
currentEpisode=e;
servers=[
{name:"S1",url:`https://vidlink.pro/tv/${i.id}/1/${e}`}
];
renderEpisodes(i);
loadServer(0);
};

box.appendChild(b);
}
}

/* CONTINUE */
function saveContinue(m){
continueList=continueList.filter(x=>x.id!==m.id);
continueList.unshift(m);
localStorage.setItem("continue",JSON.stringify(continueList));
renderContinue();
}

function renderContinue(){
let box=document.getElementById("continue");
box.innerHTML="";
continueList.forEach(m=>box.appendChild(createCard(m,"movie")));
}

/* MY LIST */
function toggleMyList(){
let exist=myList.find(m=>m.id===previewItem.id);
if(exist){myList=myList.filter(m=>m.id!==previewItem.id);}
else{myList.push(previewItem);}
localStorage.setItem("myList",JSON.stringify(myList));
renderMyList();
}

function renderMyList(){
let box=document.getElementById("mylist");
box.innerHTML="";
myList.forEach(m=>box.appendChild(createCard(m,"movie")));
}

/* HERO */
async function init(){
heroList=await fetchData(`${API}/trending/all/week?api_key=${KEY}`);
const movies=await fetchData(`${API}/movie/popular?api_key=${KEY}`);
const tv=await fetchData(`${API}/tv/popular?api_key=${KEY}`);

heroList.forEach(i=>document.getElementById("trending").appendChild(createCard(i,i.media_type)));
movies.forEach(i=>document.getElementById("movies").appendChild(createCard(i,"movie")));
tv.forEach(i=>document.getElementById("tv").appendChild(createCard(i,"tv")));

setHero(heroList[0]);

setInterval(()=>{
heroIndex=(heroIndex+1)%heroList.length;
setHero(heroList[heroIndex]);
},5000);

renderContinue();
renderMyList();
}

async function setHero(m){
let year=(m.release_date||m.first_air_date||"").slice(0,4);
document.getElementById("hero-title").innerText=(m.title||m.name)+" ("+year+")";
document.getElementById("hero-desc").innerText=m.overview||"";

let t=await getTrailer(m.id,m.title?"movie":"tv");
if(t){
document.getElementById("heroVideo").src=t+"?autoplay=1&mute=1";
}else{
document.getElementById("heroVideo").src="";
}

document.getElementById("playHero").onclick=()=>openPlayer(m);
}

init();

/* CLOSE */
function closePlayer(){
document.getElementById("player").style.display="none";
document.getElementById("full").src="";
document.getElementById("clickShield").style.display="block";
}

/* SHIELD CLICK */
document.getElementById("clickShield").onclick=function(e){
this.style.display="none";
e.stopPropagation();
};

/* BLOCK POPUPS */
window.open = function(){ return null; };
</script>

</body>
</html>
