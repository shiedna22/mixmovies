<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix Ultimate</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:white;font-family:Arial}

/* NAV */
.navbar{
position:fixed;width:100%;top:0;
padding:15px;
display:flex;gap:10px;align-items:center;
background:rgba(0,0,0,0.9);
z-index:1000;
}
.logo{color:red;font-weight:bold}
#search{
flex:1;
background:#222;border:none;color:white;
padding:8px 15px;border-radius:20px;
}

/* SUGGESTIONS */
#suggestions{
position:absolute;
top:60px;
right:15px;
background:#111;
border-radius:10px;
width:220px;
display:none;
z-index:999;
}
#suggestions div{
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
}
#suggestions div:hover{background:#222}
mark{color:red}

/* HERO */
#hero{
height:70vh;
display:flex;
align-items:flex-end;
padding:20px;
position:relative;
}
#hero iframe{
position:absolute;width:100%;height:100%;
top:0;left:0;
pointer-events:none;
filter:brightness(0.4);
}
.hero-content{z-index:2}

/* ROW */
.row{margin-top:25px}
.row h2{padding-left:10px}
.row-posters{
display:flex;overflow-x:auto;
gap:10px;padding:10px;
}
.row-posters img{
width:150px;height:220px;
border-radius:8px;
object-fit:cover;
cursor:pointer;
}

/* DETAILS */
#details{
display:none;
position:fixed;
width:100%;height:100%;
top:0;background:black;
z-index:9999;
overflow:auto;
}
#details iframe{width:100%;height:220px}

/* PLAYER */
#player{
display:none;
position:fixed;
width:100%;height:100%;
top:0;background:black;
z-index:99999;
}
#player iframe{width:100%;height:100%}

.close{
position:absolute;
right:20px;
top:10px;
font-size:30px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">ShiedFlix</div>
<input id="search" placeholder="Search...">
<button onclick="startVoice()">🎤</button>
<div id="suggestions"></div>
</div>

<!-- HERO -->
<div id="hero">
<iframe id="heroVideo"></iframe>
<div class="hero-content">
<h1 id="hero-title"></h1>
<p id="hero-desc"></p>
<button id="playHero">▶ Play</button>
<button id="infoHero">ℹ Info</button>
</div>
</div>

<!-- CONTINUE -->
<div class="row">
<h2>▶ Continue Watching</h2>
<div id="continue" class="row-posters"></div>
</div>

<!-- MY LIST -->
<div class="row">
<h2>❤️ My List</h2>
<div id="mylist" class="row-posters"></div>
</div>

<!-- SEARCH -->
<div class="row" id="searchRow" style="display:none;">
<h2>🔎 Search Results</h2>
<div id="searchResults" class="row-posters"></div>
</div>

<!-- ROWS -->
<div class="row"><h2>🔥 Trending</h2><div id="trending" class="row-posters"></div></div>
<div class="row"><h2>🎬 Movies</h2><div id="movies" class="row-posters"></div></div>
<div class="row"><h2>📺 TV Shows</h2><div id="tv" class="row-posters"></div></div>
<div class="row"><h2>🍥 Anime</h2><div id="anime" class="row-posters"></div></div>

<!-- DETAILS -->
<div id="details">
<span class="close" onclick="closeDetails()">✖</span>
<iframe id="trailer"></iframe>
<h2 id="title"></h2>
<p id="desc"></p>
<button onclick="play()">▶ Play</button>
<button onclick="toggleMyList()">❤️ My List</button>
</div>

<!-- PLAYER -->
<div id="player">
<span class="close" onclick="closePlayer()">✖</span>
<iframe id="full"></iframe>
</div>

<script>
const API="https://api.themoviedb.org/3";
const KEY="43c2413701b5c752d07b62acf8e57736";
const IMG="https://image.tmdb.org/t/p/w500";

let current=null,currentType="movie";
let heroList=[],heroIndex=0;
let allMovies=[];
let continueList=JSON.parse(localStorage.getItem("continue"))||[];
let myList=JSON.parse(localStorage.getItem("myList"))||[];

/* FETCH */
async function fetchData(url){
const res=await fetch(url);
return (await res.json()).results;
}

function title(i){return i.title||i.name||""}

/* SHOW */
function show(list,id,type){
const box=document.getElementById(id);
box.innerHTML="";
list.forEach(i=>{
if(!i.poster_path)return;
const img=document.createElement("img");
img.src=IMG+i.poster_path;
img.onclick=()=>{current=i;currentType=type;openDetails(i,type);}
box.appendChild(img);
});
allMovies=[...allMovies,...list];
}

/* HERO */
async function setHero(m){
current=m;
currentType=m.title?"movie":"tv";

document.getElementById("hero-title").innerText=title(m);
document.getElementById("hero-desc").innerText=(m.overview||"").slice(0,120);

document.getElementById("heroVideo").src=
await getTrailer(m.id,currentType);

document.getElementById("playHero").onclick=()=>play();
document.getElementById("infoHero").onclick=()=>openDetails(m,currentType);
}

/* TRAILER */
async function getTrailer(id,type){
try{
const res=await fetch(`${API}/${type}/${id}/videos?api_key=${KEY}`);
const data=await res.json();
const t=data.results.find(v=>v.site==="YouTube");
return t?`https://www.youtube.com/embed/${t.key}?autoplay=1&mute=1`:"";
}catch{return "";}
}

/* SEARCH + SUGGESTIONS */
search.oninput=(e)=>{
const val=e.target.value.toLowerCase();
if(!val){searchRow.style.display="none";suggestions.style.display="none";return;}

const results=allMovies.filter(m=>title(m).toLowerCase().includes(val));

searchRow.style.display="block";
searchResults.innerHTML="";

/* posters */
results.slice(0,20).forEach(i=>{
let img=document.createElement("img");
img.src=IMG+i.poster_path;
img.onclick=()=>openDetails(i,i.title?"movie":"tv");
searchResults.appendChild(img);
});

/* suggestions */
suggestions.innerHTML="";
suggestions.style.display="block";

results.slice(0,5).forEach(i=>{
let t=title(i);
let d=document.createElement("div");

d.innerHTML=t.replace(new RegExp(val,"gi"),m=>`<mark>${m}</mark>`);

d.onclick=()=>{
search.value=t;
suggestions.style.display="none";
};

suggestions.appendChild(d);
});
};

/* VOICE */
function startVoice(){
if(!('webkitSpeechRecognition' in window)) return;
let rec=new webkitSpeechRecognition();
rec.onresult=(e)=>{
search.value=e.results[0][0].transcript;
search.dispatchEvent(new Event("input"));
};
rec.start();
}

/* DETAILS */
async function openDetails(i,type){
document.getElementById("details").style.display="block";
document.getElementById("title").innerText=title(i);
document.getElementById("desc").innerText=i.overview||"";
document.getElementById("trailer").src=await getTrailer(i.id,type);
}

/* PLAYER */
function play(){
document.getElementById("player").style.display="block";
document.getElementById("full").src=currentType==="movie"
?`https://vidsrc.cc/v2/embed/movie/${current.id}`
:`https://vidsrc.cc/v2/embed/tv/${current.id}/1/1`;

saveContinue(current);
}

/* CONTINUE */
function saveContinue(m){
continueList=continueList.filter(x=>x.id!==m.id);
continueList.unshift(m);
localStorage.setItem("continue",JSON.stringify(continueList));
renderContinue();
}
function renderContinue(){
continue.innerHTML="";
continueList.forEach(m=>{
let img=document.createElement("img");
img.src=IMG+m.poster_path;
img.onclick=()=>openDetails(m,"movie");
continue.appendChild(img);
});
}

/* MY LIST */
function toggleMyList(){
if(myList.find(m=>m.id===current.id)){
myList=myList.filter(m=>m.id!==current.id);
}else{
myList.push(current);
}
localStorage.setItem("myList",JSON.stringify(myList));
renderMyList();
}
function renderMyList(){
mylist.innerHTML="";
myList.forEach(m=>{
let img=document.createElement("img");
img.src=IMG+m.poster_path;
img.onclick=()=>openDetails(m,"movie");
mylist.appendChild(img);
});
}

/* CLOSE */
function closeDetails(){details.style.display="none";trailer.src=""}
function closePlayer(){player.style.display="none";full.src=""}

/* INIT */
async function init(){
const trending=await fetchData(`${API}/trending/all/week?api_key=${KEY}`);
const movies=await fetchData(`${API}/movie/popular?api_key=${KEY}`);
const tv=await fetchData(`${API}/tv/popular?api_key=${KEY}`);
const anime=await fetchData(`${API}/discover/tv?api_key=${KEY}&with_genres=16`);

show(trending,"trending","movie");
show(movies,"movies","movie");
show(tv,"tv","tv");
show(anime,"anime","tv");

heroList=trending.slice(0,10);
setHero(heroList[0]);

renderContinue();
renderMyList();
}
init();
</script>

</body>
</html>
