<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix Ultimate</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:white;font-family:Arial}

/* NAV */
.navbar{
position:fixed;width:100%;top:0;
padding:15px;
display:flex;justify-content:space-between;
background:rgba(0,0,0,0.9);
z-index:1000;
}
.logo{color:red;font-weight:bold}
#search{background:#222;border:none;color:white;padding:8px 15px;border-radius:20px}

/* HERO */
#hero{
height:55vh;
display:flex;
align-items:flex-end;
padding:20px;
margin-top:60px;
position:relative;
overflow:hidden;
}
#hero iframe{
position:absolute;
top:50%;left:50%;
width:177.77vh;height:100vh;
transform:translate(-50%,-50%);
opacity:0.4;
pointer-events:none;
}
#hero::after{
content:"";
position:absolute;
bottom:0;
width:100%;height:150px;
background:linear-gradient(to top,#000,transparent);
}

/* ROW */
.row{margin-top:10px}
.row h2{padding-left:10px}
.row-posters{
display:flex;overflow-x:auto;
gap:10px;padding:10px;
}

/* CARD */
.card{
min-width:130px;
display:flex;
flex-direction:column;
position:relative;
}
.card img{
width:130px;height:190px;
object-fit:cover;
border-radius:8px;
transition:0.3s;
}
.card:hover img{transform:scale(1.08)}
.play-btn{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
font-size:25px;
opacity:0;
}
.card:hover .play-btn{opacity:1}

/* PLAYER */
#player{
display:none;
position:fixed;
top:0;left:0;
width:100vw;height:100vh;
background:black;
z-index:99999;
}
#player iframe{
position:absolute;
top:0;left:0;
width:100vw;height:100vh;
border:none;
}
.close{
position:absolute;
right:20px;
top:10px;
font-size:30px;
z-index:3;
cursor:pointer;
}
#playerInfo{
position:absolute;
bottom:80px;
left:20px;
z-index:3;
max-width:80%;
text-shadow:0 0 10px black;
}

/* PREVIEW */
#preview{
display:none;
position:fixed;
top:0;left:0;
width:100vw;height:100vh;
z-index:99998;
overflow:hidden;
}
.preview-bg{
position:absolute;
width:100%;height:100%;
background-size:cover;
background-position:center;
transform:scale(1.1);
filter:brightness(0.5) blur(5px);
}
#preview iframe{
position:absolute;
width:100%;
height:100%;
opacity:0.3;
pointer-events:none;
}
#preview::after{
content:"";
position:absolute;
bottom:0;
width:100%;
height:200px;
background:linear-gradient(to top,rgba(0,0,0,0.9),transparent);
}

/* CENTER PLAY */
.preview-center{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
z-index:2;
}
.play-big{
font-size:50px;
padding:20px 30px;
border-radius:50%;
border:none;
background:rgba(0,0,0,0.6);
color:white;
}

/* INFO */
.preview-info{
position:absolute;
bottom:40px;
left:20px;
z-index:2;
max-width:90%;
}
.preview-info h2{font-size:22px}
.preview-info p{font-size:13px;opacity:0.9}
.preview-buttons button{
margin-right:10px;
margin-top:10px;
padding:10px 15px;
border:none;
background:red;
color:white;
}

/* MOBILE */
@media(max-width:768px){
.play-big{font-size:35px}
.preview-info h2{font-size:18px}
.preview-info p{font-size:12px}
}
</style></head><body><div class="navbar">
<div class="logo">ShiedFlix</div>
<input id="search" placeholder="Search...">
</div><div id="hero">
<iframe id="heroVideo"></iframe>
<div>
<h1 id="hero-title"></h1>
<p id="hero-desc"></p>
<button id="playHero">▶ Play</button>
</div>
</div><div class="row"><h2>🔥 Trending</h2><div id="trending" class="row-posters"></div></div><!-- PREVIEW --><div id="preview">
<div class="preview-bg" id="previewBg"></div>
<iframe id="previewVideo"></iframe><div class="preview-center">
<button class="play-big" onclick="startPlay()">▶</button>
</div><div class="preview-info">
<h2 id="previewTitle"></h2>
<p id="previewDesc"></p>
<p id="previewRating"></p><div class="preview-buttons">
<button onclick="startPlay()">▶ Play</button>
<button onclick="closePreview()">✖ Close</button>
</div>
</div>
</div><!-- PLAYER --><div id="player">
<span class="close" onclick="closePlayer()">✖</span><div id="playerInfo">
<h2 id="playerTitle"></h2>
<p id="playerDesc"></p>
</div><iframe id="full"></iframe>
</div><script>
const API="https://api.themoviedb.org/3";
const KEY="43c2413701b5c752d07b62acf8e57736";
const IMG="https://image.tmdb.org/t/p/w500";

let current=null,currentType="movie";

/* FETCH */
async function fetchData(url){
const res=await fetch(url);
return (await res.json()).results;
}

/* TRAILER */
async function getTrailer(id,type){
try{
const res=await fetch(`${API}/${type}/${id}/videos?api_key=${KEY}`);
const data=await res.json();
const t=data.results.find(v=>v.site==="YouTube");
return t?`https://www.youtube.com/embed/${t.key}?autoplay=1&mute=1`:"";
}catch{return "";}
}

function title(i){return i.title||i.name}

/* CARD */
function createCard(i,type){
const card=document.createElement("div");
card.className="card";

const img=document.createElement("img");
img.src=IMG+i.poster_path;

const play=document.createElement("div");
play.className="play-btn";
play.innerText="▶";

card.onclick=()=>openPreview(i,type);

card.appendChild(img);
card.appendChild(play);

return card;
}

/* SHOW */
function show(list,id,type){
const box=document.getElementById(id);
box.innerHTML="";
list.forEach(i=>{
if(!i.poster_path)return;
box.appendChild(createCard(i,type));
});
}

/* PREVIEW */
async function openPreview(i,type){
current=i;
currentType=type;

document.getElementById("preview").style.display="block";

document.getElementById("previewTitle").innerText=title(i);
document.getElementById("previewDesc").innerText=i.overview||"No description";
document.getElementById("previewRating").innerText="⭐ "+(i.vote_average||"N/A");

document.getElementById("previewBg").style.backgroundImage=
`url(https://image.tmdb.org/t/p/original${i.backdrop_path})`;

let trailer=await getTrailer(i.id,type);
document.getElementById("previewVideo").src=trailer;
}

function closePreview(){
document.getElementById("preview").style.display="none";
document.getElementById("previewVideo").src="";
}

function startPlay(){
closePreview();
openPlayer(current,currentType);
}

/* PLAYER */
function openPlayer(i,type){
document.getElementById("player").style.display="block";

document.getElementById("full").src=
type==="movie"
?`https://vidsrc.cc/v2/embed/movie/${i.id}`
:`https://vidsrc.cc/v2/embed/tv/${i.id}/1/1`;

document.getElementById("playerTitle").innerText=title(i);
document.getElementById("playerDesc").innerText=i.overview||"";
}
function closePlayer(){
document.getElementById("player").style.display="none";
document.getElementById("full").src="";
}

/* HERO */
async function init(){
const trending=await fetchData(`${API}/trending/all/week?api_key=${KEY}`);

show(trending,"trending","movie");

document.getElementById("hero-title").innerText=title(trending[0]);
document.getElementById("hero-desc").innerText=trending[0].overview;
document.getElementById("playHero").onclick=()=>openPreview(trending[0],"movie");
}
init();
</script></body>
</html>
