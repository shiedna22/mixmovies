<!DOCTYPE html>
<html>
<head>
  <title>ShiedFlix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { background:#0b0b0b; color:white; font-family:Arial; margin:0; }

.navbar {
  position:sticky;
  top:0;
  background:black;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo { color:red; font-weight:bold; }

.menu { display:flex; align-items:center; }

.menu a { color:white; margin-left:10px; text-decoration:none; }
.menu a:hover { color:red; }

#searchInput {
  margin-left:10px;
  padding:6px;
  border-radius:20px;
  border:none;
}

/* BANNER */
#banner {
  height:250px;
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:flex-end;
  padding:20px;
}

#watchBtn {
  background:red;
  border:none;
  padding:10px;
  color:white;
  border-radius:5px;
}

/* LIST */
h2 { margin:15px; }

.list {
  display:flex;
  overflow-x:auto;
  padding:10px;
  gap:10px;
}

.list::-webkit-scrollbar { display:none; }

img {
  width:120px;
  border-radius:10px;
  transition:0.3s;
}

img:hover {
  transform:scale(1.1);
  box-shadow:0 0 10px red;
}

/* MODAL */
#modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  top:0;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#modal-video {
  width:95%;
  height:250px;
}

#modal-video.portrait {
  width:60%;
  height:70vh;
  max-width:300px;
}

.close {
  position:absolute;
  top:20px;
  right:20px;
  font-size:25px;
  cursor:pointer;
}

/* CONTINUE CARD */
.continue-card { position:relative; }
.continue-card p { font-size:12px; margin-top:5px; }

.play-icon {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:30px;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">🎬 ShiedFlix</div>

  <div class="menu">
    <a href="#">Home</a>
    <a href="#movies">Movies</a>
    <a href="#tv">TV</a>
    <a href="#anime">Anime</a>
    <a href="#drama">Drama</a>
    <input id="searchInput" placeholder="Search...">
  </div>
</div>

<div id="banner">
  <div>
    <h2 id="banner-title">Loading...</h2>
    <button id="watchBtn">▶ Watch</button>
  </div>
</div>

<h2 id="movies">🔥 Movies</h2>
<div id="movies-list" class="list"></div>

<h2>▶ Continue Watching</h2>
<div id="continue-list" class="list"></div>

<h2 id="tv">📺 TV Shows</h2>
<div id="tvshows-list" class="list"></div>

<h2 id="anime">🎌 Anime</h2>
<div id="anime-list" class="list"></div>

<h2 id="drama">🎭 Drama Series</h2>
<div id="drama-list" class="list"></div>

<h2>❤️ Favorites</h2>
<div id="favorites-list" class="list"></div>

<div id="modal">
  <span class="close" onclick="closeModal()">✖</span>
  <h3 id="modal-title"></h3>
  <iframe id="modal-video" allow="autoplay; fullscreen" allowfullscreen></iframe>
</div>

<script src="home.js"></script>
</body>
</html>
