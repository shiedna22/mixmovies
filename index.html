<!DOCTYPE html>
<html>
<head>
  <title>ShiedFlix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html { scroll-behavior:smooth; }

body {
  background:#0b0b0b;
  color:white;
  font-family:Arial;
  margin:0;
}

/* NAVBAR */
.navbar {
  position:sticky;
  top:0;
  background:black;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:1000;
}

.logo { color:red; font-size:22px; font-weight:bold; }

.menu a {
  color:white;
  margin-left:15px;
  text-decoration:none;
}

.menu a:hover { color:red; }

#searchInput {
  margin-left:15px;
  padding:6px;
  border-radius:5px;
  border:none;
}

/* BANNER */
#banner {
  height:320px;
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:flex-end;
  padding:20px;
  position:relative;
}

#banner::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(to right, rgba(0,0,0,0.8), transparent);
}

.banner-content {
  position:relative;
  z-index:2;
  background:rgba(0,0,0,0.6);
  padding:15px;
  border-radius:10px;
}

#watchBtn {
  background:red;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  color:white;
}

/* LIST */
h2 { margin:20px; }

.list {
  display:flex;
  overflow-x:auto;
  padding:10px;
}

img {
  width:140px;
  margin-right:10px;
  border-radius:10px;
  transition:0.3s;
}

img:hover {
  transform:scale(1.1);
  box-shadow:0 0 15px red;
}

/* SEARCH */
#search-results {
  display:flex;
  flex-wrap:wrap;
  padding:10px;
}

/* MODAL */
#modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

iframe { width:90%; height:300px; }

.close {
  position:absolute;
  right:20px;
  top:20px;
  font-size:30px;
  cursor:pointer;
}

/* SEASONS */
#season-container button {
  margin:5px;
  padding:6px 12px;
  background:#111;
  color:white;
  border:1px solid red;
  border-radius:5px;
}

#season-container button:hover {
  background:red;
}

/* EPISODES */
#episodes {
  display:flex;
  flex-wrap:wrap;
}

#episodes button {
  margin:5px;
  padding:6px;
  background:#222;
  color:white;
  border-radius:5px;
}

#episodes button:hover {
  background:red;
}

/* MOBILE */
@media(max-width:600px){
  img { width:110px; }
  iframe { height:220px; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">🎬 ShiedFlix</div>

  <div class="menu">
    <a href="#">Home</a>
    <a href="#movies">Movies</a>
    <a href="#tv">TV</a>
    <a href="#anime">Anime</a>
    <input id="searchInput" placeholder="Search...">
  </div>
</div>

<!-- BANNER -->
<div id="banner">
  <div class="banner-content">
    <h1 id="banner-title">Loading...</h1>
    <button id="watchBtn">▶ Watch</button>
  </div>
</div>

<!-- SEARCH -->
<div id="search-results"></div>

<!-- MOVIES -->
<h2 id="movies">🔥 Movies</h2>
<div id="movies-list" class="list"></div>

<!-- TV -->
<h2 id="tv">📺 TV Shows</h2>
<div id="tvshows-list" class="list"></div>

<!-- ANIME -->
<h2 id="anime">🎌 Anime</h2>
<div id="anime-list" class="list"></div>

<!-- MODAL -->
<div id="modal">
  <span class="close" onclick="closeModal()">✖</span>
  <h2 id="modal-title"></h2>
  <iframe id="modal-video" allowfullscreen></iframe>

  <div id="season-container"></div>
  <div id="episodes"></div>
</div>

<script src="home.js"></script>

</body>
</html>
