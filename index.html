<!DOCTYPE html>
<html>
<head>
  <title>ShiedFlix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #0b0b0b;
      color: white;
      font-family: Arial;
      margin:0;
    }

    .navbar {
      background:black;
      padding:15px;
      display:flex;
      justify-content:space-between;
    }

    .logo { color:red; font-weight:bold; }

    .menu a {
      color:white;
      margin:10px;
      text-decoration:none;
    }

    .list {
      display:flex;
      overflow-x:auto;
      padding:10px;
    }

    img {
      width:140px;
      margin-right:10px;
      border-radius:10px;
      cursor:pointer;
    }

    h2 { margin:20px; }

    #modal {
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:black;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    iframe {
      width:90%;
      height:250px;
    }

    .close {
      position:absolute;
      top:20px;
      right:20px;
      font-size:25px;
      cursor:pointer;
    }

    #playNow {
      padding:10px;
      background:red;
      border:none;
      color:white;
      margin:10px;
    }
  </style>
</head>

<body>

<div class="navbar">
  <div class="logo">🎬 ShiedFlix</div>
  <div class="menu">
    <a href="#">Home</a>
    <a href="#movies">Movies</a>
    <a href="#drama">Drama</a>
  </div>
</div>

<h2 id="movies">🔥 Movies</h2>
<div id="movies-list" class="list"></div>

<h2 id="drama">🔥 Drama Series</h2>
<div id="drama-list" class="list"></div>

<!-- MODAL -->
<div id="modal">
  <span class="close" onclick="closeModal()">✖</span>
  <h2 id="modal-title"></h2>

  <button id="playNow">▶ Play</button>

  <iframe id="modal-video" style="display:none;"></iframe>
</div>

<script src="home.js"></script>
</body>
</html>
