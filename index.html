<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix Ultimate</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:white;font-family:Arial}

/* NAV */
.navbar{
position:fixed;width:100%;top:0;
padding:15px;
display:flex;justify-content:space-between;
background:rgba(0,0,0,0.9);
z-index:1000;
}
.logo{color:red;font-weight:bold}
#search{background:#222;border:none;color:white;padding:8px 15px;border-radius:20px}

/* HERO */
#hero{
height:55vh;
display:flex;
align-items:flex-end;
padding:20px;
margin-top:60px;
position:relative;
overflow:hidden;
background:#000;
background-size:cover;
background-position:center;
}
#hero iframe{
position:absolute;
top:50%;left:50%;
width:177.77vh;height:100vh;
transform:translate(-50%,-50%);
opacity:0.4;
pointer-events:none;
}
#hero::after{
content:"";
position:absolute;
bottom:0;
width:100%;height:150px;
background:linear-gradient(to top,#000,transparent);
}

/* ROW */
.row{margin-top:10px}
.row h2{padding-left:10px}
.row-posters{
display:flex;overflow-x:auto;
gap:10px;padding:10px;
}

/* CARD */
.card{
min-width:130px;
display:flex;
flex-direction:column;
cursor:pointer;
}
.card img{
width:130px;height:190px;
object-fit:cover;
border-radius:8px;
}

/* PREVIEW */
#preview{
display:none;
position:fixed;
top:0;left:0;
width:100vw;height:100vh;
z-index:99999;
background:black;
}
.preview-bg{
position:absolute;
width:100%;height:100%;
background-size:cover;
background-position:center;
filter:brightness(0.5);
}
.preview-content{
position:absolute;
bottom:40px;
left:20px;
max-width:90%;
}
.preview-content h2{font-size:22px}
.preview-content p{font-size:13px}

.play-big{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
font-size:50px;
padding:20px 30px;
border:none;
border-radius:50%;
background:rgba(0,0,0,0.6);
color:white;
}

/* PLAYER */
#player{
display:none;
position:fixed;
top:0;left:0;
width:100vw;height:100vh;
background:black;
z-index:99999;
}
#player iframe{
width:100%;
height:100%;
border:none;
}
.close{
position:absolute;
right:20px;
top:10px;
font-size:30px;
z-index:3;
cursor:pointer;
}
</style></head><body><div class="navbar">
<div class="logo">ShiedFlix</div>
<input id="search" placeholder="Search...">
</div><!-- HERO --><div id="hero">
<iframe id="heroVideo"></iframe>
<div>
<h1 id="hero-title"></h1>
<p id="hero-desc"></p>
<button id="playHero">▶ Play</button>
</div>
</div><!-- ROW --><div class="row"><h2>🔥 Trending</h2><div id="trending" class="row-posters"></div></div><!-- PREVIEW --><div id="preview">
<div class="preview-bg" id="previewBg"></div><button class="play-big" onclick="startPlay()">▶</button>

<div class="preview-content">
<h2 id="previewTitle"></h2>
<p id="previewDesc"></p>
<button onclick="startPlay()">▶ Play</button>
<button onclick="closePreview()">✖ Close</button>
</div>
</div><!-- PLAYER --><div id="player">
<span class="close" onclick="closePlayer()">✖</span>
<iframe id="full"></iframe>
</div><script>
const API="https://api.themoviedb.org/3";
const KEY="43c2413701b5c752d07b62acf8e57736";
const IMG="https://image.tmdb.org/t/p/w500";

let current=null,currentType="movie";

/* FETCH */
async function fetchData(url){
const res=await fetch(url);
return (await res.json()).results;
}

/* TRAILER */
async function getTrailer(id,type){
try{
const res=await fetch(`${API}/${type}/${id}/videos?api_key=${KEY}`);
const data=await res.json();
const t=data.results.find(v=>v.site==="YouTube");
return t?`https://www.youtube.com/embed/${t.key}?autoplay=1&mute=1`:"";
}catch{return "";}
}

function title(i){return i.title||i.name||"No Title"}

/* CARD */
function createCard(i,type){
const card=document.createElement("div");
card.className="card";

const img=document.createElement("img");
img.src=IMG+i.poster_path;

card.onclick=()=>openPreview(i,type);

card.appendChild(img);
return card;
}

/* SHOW */
function show(list,id,type){
const box=document.getElementById(id);
box.innerHTML="";
list.forEach(i=>{
if(!i.poster_path)return;
box.appendChild(createCard(i,type));
});
}

/* PREVIEW */
function openPreview(i,type){
current=i;
currentType=type;

document.getElementById("preview").style.display="block";
document.getElementById("previewTitle").innerText=title(i);
document.getElementById("previewDesc").innerText=i.overview||"No description";

document.getElementById("previewBg").style.backgroundImage=
`url(https://image.tmdb.org/t/p/original${i.backdrop_path})`;
}
function closePreview(){
document.getElementById("preview").style.display="none";
}

/* PLAYER */
function startPlay(){
closePreview();
openPlayer(current,currentType);
}
function openPlayer(i,type){
document.getElementById("player").style.display="block";

document.getElementById("full").src=
type==="movie"
?`https://vidsrc.cc/v2/embed/movie/${i.id}`
:`https://vidsrc.cc/v2/embed/tv/${i.id}/1/1`;
}
function closePlayer(){
document.getElementById("player").style.display="none";
document.getElementById("full").src="";
}

/* INIT */
async function init(){
const trending=await fetchData(`${API}/trending/all/week?api_key=${KEY}`);

show(trending,"trending","movie");

const hero=trending[0];

document.getElementById("hero-title").innerText=title(hero);
document.getElementById("hero-desc").innerText=hero.overview||"";

document.getElementById("playHero").onclick=()=>openPreview(hero,"movie");

/* FIX HERO (NO BLACK SCREEN) */
const trailer=await getTrailer(hero.id, hero.title?"movie":"tv");

if(trailer){
document.getElementById("heroVideo").src=trailer;
}else{
document.getElementById("heroVideo").style.display="none";
document.getElementById("hero").style.backgroundImage=
`url(https://image.tmdb.org/t/p/original${hero.backdrop_path})`;
}
}
init();
</script></body>
</html>
