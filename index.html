<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix</title>

<style>
body{
  background:#0b0b0b;
  color:white;
  font-family:Arial;
  margin:0;
}

/* NAVBAR */
.navbar{
  position:fixed;
  width:100%;
  top:0;
  background:rgba(0,0,0,0.8);
  backdrop-filter:blur(10px);
  padding:15px;
  display:flex;
  justify-content:space-between;
  z-index:1000;
}

.logo{color:red;font-weight:bold;}

.menu a{
  color:white;
  margin-left:10px;
  text-decoration:none;
}

#searchInput{
  padding:5px;
  border-radius:20px;
  border:none;
}

/* BANNER */
#banner{
  margin-top:60px;
  height:280px;
  background-size:cover;
  display:flex;
  align-items:flex-end;
  padding:20px;
  position:relative;
}

#banner::after{
  content:"";
  position:absolute;
  bottom:0;
  width:100%;
  height:60%;
  background:linear-gradient(to top,#0b0b0b,transparent);
}

#watchBtn{
  background:red;
  border:none;
  padding:10px;
  border-radius:5px;
}

/* SECTION */
.section{
  padding:10px;
}

.section-header{
  display:flex;
  justify-content:space-between;
}

.view-btn{
  color:red;
  background:none;
  border:none;
}

/* LIST */
.list{
  display:flex;
  overflow-x:auto;
  gap:10px;
}

.list::-webkit-scrollbar{display:none;}

/* CARD */
.card{
  min-width:140px;
  position:relative;
  transition:0.3s;
}

.card img{
  width:100%;
  border-radius:10px;
}

.card:hover{
  transform:scale(1.1);
  z-index:10;
}

/* OVERLAY */
.overlay{
  position:absolute;
  bottom:0;
  width:100%;
  background:linear-gradient(to top,black,transparent);
  padding:5px;
  opacity:0;
  transition:0.3s;
}

.card:hover .overlay{
  opacity:1;
}

.title{font-size:12px;}
.desc{font-size:10px;color:gray;}
.rating{color:gold;font-size:11px;}

/* MODAL */
#modal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  top:0;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#modal iframe{
  width:95%;
  height:250px;
}

.close{
  position:absolute;
  top:20px;
  right:20px;
  font-size:25px;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">🎬 ShiedFlix</div>
  <div class="menu">
    <a href="#">Home</a>
    <input id="searchInput" placeholder="Search...">
  </div>
</div>

<div id="banner">
  <div>
    <h2 id="banner-title">Loading...</h2>
    <button id="watchBtn">▶ Watch</button>
  </div>
</div>

<div class="section">
  <div class="section-header">
    <h2>🔥 Movies</h2>
    <button class="view-btn" onclick="viewAll()">View All</button>
  </div>
  <div id="movies" class="list"></div>
</div>

<div id="modal">
  <span class="close" onclick="closeModal()">✖</span>
  <h3 id="modal-title"></h3>
  <iframe id="video"></iframe>
</div>

<script>
const API_KEY="43c2413701b5c752d07b62acf8e57736";
const BASE="https://api.themoviedb.org/3";
const IMG="https://image.tmdb.org/t/p/w500";

let movies=[];
let isAll=false;

// FETCH
async function getMovies(){
  const res=await fetch(`${BASE}/trending/movie/week?api_key=${API_KEY}`);
  const data=await res.json();
  movies=data.results;
  showMovies(movies);
  banner();
}

// SHOW
function showMovies(list){
  const box=document.getElementById("movies");
  box.innerHTML="";

  list.forEach(i=>{
    if(!i.poster_path)return;

    const card=document.createElement("div");
    card.className="card";

    const img=document.createElement("img");
    img.src=IMG+i.poster_path;

    const overlay=document.createElement("div");
    overlay.className="overlay";

    const title=document.createElement("div");
    title.className="title";
    title.innerText=i.title;

    const rating=document.createElement("div");
    rating.className="rating";
    rating.innerText="⭐ "+i.vote_average;

    const desc=document.createElement("div");
    desc.className="desc";
    desc.innerText=i.overview.slice(0,40)+"...";

    overlay.append(title,rating,desc);
    card.append(img,overlay);

    card.onclick=()=>openMovie(i);

    box.appendChild(card);
  });
}

// PLAYER
function openMovie(i){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modal-title").innerText=i.title;
  document.getElementById("video").src=
  `https://vidsrc.cc/v2/embed/movie/${i.id}`;
}

// CLOSE
function closeModal(){
  document.getElementById("modal").style.display="none";
  document.getElementById("video").src="";
}

// BANNER
function banner(){
  setInterval(()=>{
    const m=movies[Math.floor(Math.random()*movies.length)];
    if(!m.backdrop_path)return;

    document.getElementById("banner").style.backgroundImage=
    `url(https://image.tmdb.org/t/p/original${m.backdrop_path})`;

    document.getElementById("banner-title").innerText=m.title;
    document.getElementById("watchBtn").onclick=()=>openMovie(m);
  },3000);
}

// VIEW ALL
function viewAll(){
  const box=document.getElementById("movies");

  if(!isAll){
    box.style.flexWrap="wrap";
    box.style.justifyContent="center";
    isAll=true;
  }else{
    box.style.flexWrap="nowrap";
    isAll=false;
  }
}

// SEARCH
document.getElementById("searchInput").addEventListener("input",async e=>{
  const q=e.target.value;
  if(!q)return showMovies(movies);

  const res=await fetch(`${BASE}/search/movie?api_key=${API_KEY}&query=${q}`);
  const data=await res.json();
  showMovies(data.results);
});

// INIT
getMovies();
</script>

</body>
</html>
