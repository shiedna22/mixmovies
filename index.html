<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:white;font-family:Arial;overflow-x:hidden}

/* NAV */
.navbar{
position:fixed;width:100%;top:0;
padding:15px;display:flex;justify-content:space-between;
background:rgba(0,0,0,0.9);z-index:1000;
}
.logo{color:red;font-weight:bold}

/* SEARCH */
#search{
background:#222;border:none;color:white;
padding:8px 15px;border-radius:20px;
width:120px;transition:0.3s;
}
#search:focus{width:200px;background:#111;outline:none}

/* HERO */
#hero{
height:65vh;
display:flex;
align-items:flex-end;
padding:30px;
margin-top:60px;
position:relative;
overflow:hidden;
}
#hero iframe{
position:absolute;
top:50%;left:50%;
width:177.77vh;height:100vh;
transform:translate(-50%,-50%);
opacity:0.5;
pointer-events:none;
z-index:0;
}
#hero::before{
content:"";
position:absolute;
top:0;left:0;
width:100%;height:100%;
background:linear-gradient(to top,rgba(0,0,0,0.9),rgba(0,0,0,0.3));
z-index:1;
}

.hero-content{z-index:2;max-width:600px;}
.hero-buttons{display:flex;gap:10px;margin-top:15px}

.play-btn{background:white;color:black;padding:10px 18px;border:none;border-radius:6px}
.trailer-btn{background:red;color:white;padding:10px 18px;border:none;border-radius:6px}
.list-btn{background:#333;color:white;padding:10px 18px;border:none;border-radius:6px}

/* ROW */
.row{margin-top:15px}
.row h2{padding-left:10px}
.row-posters{display:flex;overflow-x:auto;gap:10px;padding:10px}
.row-posters::-webkit-scrollbar{display:none}

.card{min-width:130px;cursor:pointer;transition:.3s}
.card:hover{transform:scale(1.08)}
.card img{width:130px;height:190px;border-radius:8px}

/* PLAYER */
#player{
display:none;
position:fixed;
top:0;left:0;
width:100vw;height:100dvh;
background:black;
z-index:9999;
}

#player iframe{
position:absolute;
top:0;left:0;
width:100%;
height:100dvh;
border:none;
z-index:1;
}

/* CLOSE BUTTON FIX */
.close-btn{
position:fixed;
top:15px;
right:15px;
font-size:32px;
z-index:999999;
cursor:pointer;
background:rgba(0,0,0,0.7);
padding:10px 14px;
border-radius:50%;
color:white;
}

/* CONTROLS */
#serverControls{
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
z-index:99999;
display:flex;gap:8px;
}

#episodeControls{
position:fixed;
top:60px;
left:0;
width:100%;
display:flex;
gap:8px;
padding:10px;
overflow-x:auto;
z-index:99999;
}

#serverControls button,
#episodeControls button{
background:#222;color:white;border:none;
padding:8px 12px;border-radius:20px;
}

#serverControls button.active,
#episodeControls button.active{
background:red;
}

/* CLICK SHIELD */
#clickShield{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:2; /* nasa ibabaw ng video */
pointer-events:auto;
}
/* PREVIEW */
#previewModal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:black;
z-index:9998;
overflow-y:auto;
}
#previewVideo{width:100%;height:220px}
#player iframe{
z-index:1;
}

#clickShield{
z-index:2;
}

#serverControls,
#episodeControls{
z-index:99998;
}

.close-btn{
z-index:999999;
}
#player{
pointer-events:auto;
}
#serverControls,
#episodeControls,
.close-btn{
pointer-events:auto;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">ShiedFlix</div>
<input id="search" placeholder="Search...">
</div>

<div id="hero">
<iframe id="heroVideo"></iframe>
<div class="hero-content">
<h1 id="hero-title"></h1>
<p id="hero-desc"></p>
<div class="hero-buttons">
<button class="play-btn" id="playHero">▶ Play</button>
<button class="trailer-btn" id="watchTrailer">🎬 Trailer</button>
<button class="list-btn" onclick="toggleMyList()">❤️ My List</button>
</div>
</div>
</div>

<div class="row"><h2>▶ Continue Watching</h2><div id="continue" class="row-posters"></div></div>
<div class="row"><h2>❤️ My List</h2><div id="mylist" class="row-posters"></div></div>

<div class="row" id="searchRow" style="display:none;">
<h2>🔎 Search Results</h2>
<div id="searchResults" class="row-posters"></div>
</div>

<div class="row"><h2>🔥 Trending</h2><div id="trending" class="row-posters"></div></div>
<div class="row"><h2>🎬 Movies</h2><div id="movies" class="row-posters"></div></div>
<div class="row"><h2>📺 TV Shows</h2><div id="tv" class="row-posters"></div></div>

<div id="player">
<div id="clickShield"></div>
<span class="close-btn" onclick="closePlayer()">✖</span>
<div id="serverControls"></div>
<div id="episodeControls"></div>
<iframe id="full" allow="autoplay; fullscreen"></iframe>
</div>

<div id="previewModal">
<span onclick="closePreview()" class="close-btn">✖</span>
<iframe id="previewVideo"></iframe>
<h2 id="previewTitle"></h2>
<p id="previewDesc"></p>
<button onclick="playFromPreview()">▶ Play</button>
</div>

<script>
const API="https://api.themoviedb.org/3";
const KEY="43c2413701b5c752d07b62acf8e57736";
const IMG="https://image.tmdb.org/t/p/w500";

let previewItem=null;
let continueList=JSON.parse(localStorage.getItem("continue"))||[];
let myList=JSON.parse(localStorage.getItem("myList"))||[];

let servers=[];
let currentEpisode=1;
let currentShowId=null;

/* FETCH */
async function fetchData(url){
const res=await fetch(url);
return (await res.json()).results;
}

/* TRAILER */
async function getTrailer(id,type){
const res=await fetch(`${API}/${type}/${id}/videos?api_key=${KEY}`);
const data=await res.json();
let t=data.results?.find(v=>v.site==="YouTube");
return t?`https://www.youtube.com/embed/${t.key}`:null;
}

/* CARD */
function createCard(i,type){
const c=document.createElement("div");
c.className="card";
c.innerHTML=`<img src="${IMG+i.poster_path}"><div>${i.title||i.name}</div>`;
c.onclick=()=>openPreview(i,type);
return c;
}

/* PREVIEW */
function openPreview(i,type){
previewItem=i;
document.getElementById("previewModal").style.display="block";
document.getElementById("previewTitle").innerText=i.title||i.name;
document.getElementById("previewDesc").innerText=i.overview||"";

getTrailer(i.id,type).then(t=>{
if(t) document.getElementById("previewVideo").src=t;
});
}

function closePreview(){
document.getElementById("previewModal").style.display="none";
document.getElementById("previewVideo").src="";
}

function playFromPreview(){
closePreview();
openPlayer(previewItem);
}

/* PLAYER */
function openPlayer(i){
document.getElementById("player").style.display="block";

let isMovie=!!i.title;

if(isMovie){
currentShowId=null;
servers=[
{name:"Server 1",url:`https://vidsrc.me/embed/movie/${i.id}`},
{name:"Server 2",url:`https://vidlink.pro/movie/${i.id}`},
{name:"Server 3",url:`https://multiembed.mov/?video_id=${i.id}&tmdb=1`}
];
}else{
currentEpisode=1;
currentShowId=i.id;
renderEpisodes(i);

servers=[
{name:"Server 1",url:`https://vidsrc.me/embed/tv/${i.id}/1/1`},
{name:"Server 2",url:`https://vidlink.pro/tv/${i.id}/1/1`},
{name:"Server 3",url:`https://multiembed.mov/?video_id=${i.id}&tmdb=1&s=1&e=1`}
];
}

renderServers();
loadServer(0);
}

/* SERVERS */
function renderServers(){
const box=document.getElementById("serverControls");
box.innerHTML="";
servers.forEach((s,i)=>{
let b=document.createElement("button");
b.innerText=s.name;
b.onclick=()=>{
loadServer(i);
document.querySelectorAll("#serverControls button").forEach(btn=>btn.classList.remove("active"));
b.classList.add("active");
};
if(i===0) b.classList.add("active");
box.appendChild(b);
});
}

/* LOAD */
function loadServer(i){
const iframe=document.getElementById("full");
iframe.src="";
setTimeout(()=>iframe.src=servers[i].url,150);
}

/* EPISODES */
function renderEpisodes(i){
const box=document.getElementById("episodeControls");
box.innerHTML="";

for(let e=1;e<=10;e++){
let b=document.createElement("button");
b.innerText="Ep "+e;

if(e===currentEpisode) b.classList.add("active");

b.onclick=()=>{
currentEpisode=e;

servers=[
{name:"Server 1",url:`https://vidsrc.me/embed/tv/${i.id}/1/${e}`},
{name:"Server 2",url:`https://vidlink.pro/tv/${i.id}/1/${e}`},
{name:"Server 3",url:`https://multiembed.mov/?video_id=${i.id}&tmdb=1&s=1&e=${e}`}
];

renderEpisodes(i);
renderServers();
loadServer(0);
};

box.appendChild(b);
}
}

/* HERO */
async function setHero(m){
let year=(m.release_date||m.first_air_date||"").slice(0,4);
document.getElementById("hero-title").innerText=(m.title||m.name)+(year?` (${year})`:"");
document.getElementById("hero-desc").innerText=m.overview||"";

let type=m.title?"movie":"tv";
let t=await getTrailer(m.id,type);

if(t){
document.getElementById("heroVideo").src=t+"?autoplay=1&mute=1";
}

document.getElementById("playHero").onclick=()=>openPlayer(m);
}

/* INIT */
async function init(){
const trending=await fetchData(`${API}/trending/all/week?api_key=${KEY}`);
const movies=await fetchData(`${API}/movie/popular?api_key=${KEY}`);
const tv=await fetchData(`${API}/tv/popular?api_key=${KEY}`);

trending.forEach(i=>document.getElementById("trending").appendChild(createCard(i,i.media_type)));
movies.forEach(i=>document.getElementById("movies").appendChild(createCard(i,"movie")));
tv.forEach(i=>document.getElementById("tv").appendChild(createCard(i,"tv")));

if(trending.length>0) setHero(trending[0]);
}

init();

/* SHIELD */
setTimeout(()=>{
let shield=document.getElementById("clickShield");
if(shield){
shield.onclick = function(e){
e.stopPropagation();
this.style.display = "none";
};
},500);

document.addEventListener("click", function(e){
if(e.target.tagName === "IFRAME"){
e.preventDefault();
e.stopPropagation();
}
}, true);
</script>

</body>
</html>
