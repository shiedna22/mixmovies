<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:white;font-family:Arial}

/* NAV */
.navbar{
position:fixed;width:100%;top:0;
padding:15px;display:flex;justify-content:space-between;
background:rgba(0,0,0,0.9);z-index:1000;
}
.logo{color:red;font-weight:bold}

/* SEARCH */
#search{
background:#222;border:none;color:white;
padding:8px 15px;border-radius:20px;
width:120px;
}
#search:focus{width:200px}

/* HERO */
#hero{
height:65vh;
display:flex;
align-items:flex-end;
padding:30px;
margin-top:60px;
position:relative;
}
#hero iframe{
position:absolute;
top:50%;left:50%;
width:177.77vh;height:100vh;
transform:translate(-50%,-50%);
opacity:0.4;
pointer-events:none;
}
#hero::before{
content:"";
position:absolute;
width:100%;height:100%;
background:linear-gradient(to top,#000,transparent);
}

.hero-content{z-index:2}

/* ROW */
.row{margin-top:15px}
.row-posters{display:flex;overflow-x:auto;gap:10px;padding:10px}
.card img{width:130px;height:190px;border-radius:8px}

/* PLAYER */
#player{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:black;
z-index:9999;
}

#player iframe{
width:100%;
height:100%;
border:none;
z-index:1;
position:absolute;
}

/* SHIELD */
#clickShield{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:2;
}

/* CONTROLS */
.close-btn{
position:fixed;
top:15px;
right:15px;
z-index:999999;
font-size:30px;
background:black;
padding:8px 12px;
border-radius:50%;
}

#serverControls,
#episodeControls{
position:fixed;
left:0;
width:100%;
z-index:999998;
display:flex;
gap:8px;
padding:10px;
overflow-x:auto;
}

#serverControls{top:10px}
#episodeControls{top:60px}

button{
background:#222;
color:white;
border:none;
padding:8px 12px;
border-radius:20px;
}

button.active{background:red}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">ShiedFlix</div>
<input id="search" placeholder="Search...">
</div>

<div id="hero">
<iframe id="heroVideo"></iframe>
<div class="hero-content">
<h1 id="hero-title"></h1>
<p id="hero-desc"></p>
<button onclick="openPlayer(previewItem)">▶ Play</button>
</div>
</div>

<div class="row"><div id="trending" class="row-posters"></div></div>

<!-- PLAYER -->
<div id="player">
<div id="clickShield"></div>
<span class="close-btn" onclick="closePlayer()">✖</span>
<div id="serverControls"></div>
<div id="episodeControls"></div>
<iframe id="full"></iframe>
</div>

<script>
const API="https://api.themoviedb.org/3";
const KEY="43c2413701b5c752d07b62acf8e57736";
const IMG="https://image.tmdb.org/t/p/w500";

let servers=[], currentEpisode=1, currentShowId=null;

/* FETCH */
async function fetchData(url){
const res=await fetch(url);
return (await res.json()).results;
}

/* CARD */
function createCard(i,type){
const c=document.createElement("div");
c.className="card";
c.innerHTML=`<img src="${IMG+i.poster_path}">`;
c.onclick=()=>openPlayer(i);
return c;
}

/* PLAYER */
function openPlayer(i){
document.getElementById("player").style.display="block";

if(i.title){
servers=[
{name:"S1",url:`https://vidlink.pro/movie/${i.id}`},
{name:"S2",url:`https://multiembed.mov/?video_id=${i.id}&tmdb=1`}
];
}else{
currentShowId=i.id;
servers=[
{name:"S1",url:`https://vidlink.pro/tv/${i.id}/1/1`}
];
renderEpisodes(i);
}

renderServers();
loadServer(0);
}

/* SERVERS */
function renderServers(){
let box=document.getElementById("serverControls");
box.innerHTML="";
servers.forEach((s,i)=>{
let b=document.createElement("button");
b.innerText=s.name;
b.onclick=()=>loadServer(i);
box.appendChild(b);
});
}

/* LOAD */
function loadServer(i){
let f=document.getElementById("full");
f.src="";
setTimeout(()=>f.src=servers[i].url,100);
}

/* EPISODES */
function renderEpisodes(i){
let box=document.getElementById("episodeControls");
box.innerHTML="";
for(let e=1;e<=10;e++){
let b=document.createElement("button");
b.innerText="Ep "+e;
b.onclick=()=>{
servers=[
{name:"S1",url:`https://vidlink.pro/tv/${i.id}/1/${e}`}
];
loadServer(0);
};
box.appendChild(b);
}
}

/* CLOSE */
function closePlayer(){
document.getElementById("player").style.display="none";
document.getElementById("full").src="";
}

/* INIT */
async function init(){
const trending=await fetchData(`${API}/trending/all/week?api_key=${KEY}`);
trending.forEach(i=>document.getElementById("trending").appendChild(createCard(i)));
}
init();

/* 🔥 FIX SHIELD (NO ADS CLICK) */
setTimeout(()=>{
let shield=document.getElementById("clickShield");
if(shield){
shield.onclick=function(e){
e.stopPropagation();
this.style.display="none";
};
}
},300);

/* 🔥 BLOCK IFRAME CLICK REDIRECT */
document.addEventListener("click",function(e){
if(e.target.tagName==="IFRAME"){
e.preventDefault();
e.stopPropagation();
}
},true);
</script>

</body>
</html>
