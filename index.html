<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix Ultimate</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:white;font-family:Arial}

/* NAV */
.navbar{
position:fixed;width:100%;top:0;
padding:15px;
display:flex;justify-content:space-between;
background:rgba(0,0,0,0.85);
z-index:1000;
}
.logo{color:red;font-weight:bold}
#search{
background:#222;border:none;color:white;
padding:8px 15px;border-radius:20px;
outline:none;
}

/* SEARCH SUGGESTIONS */
#suggestions{
position:absolute;
top:60px;
right:15px;
background:#111;
border-radius:10px;
width:200px;
display:none;
z-index:999;
}
#suggestions div{
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
}
#suggestions div:hover{background:#222}

/* HERO */
#hero{height:70vh;display:flex;align-items:flex-end;padding:20px;position:relative}
#hero iframe{position:absolute;width:100%;height:100%;top:0;left:0;pointer-events:none;filter:brightness(0.4)}
#hero::after{content:"";position:absolute;bottom:0;width:100%;height:120px;background:linear-gradient(to top,#000,transparent)}
.hero-content{z-index:2}

/* ROW */
.row{margin-top:25px}
.row h2{padding-left:10px}
.row-posters{display:flex;overflow-x:auto;gap:10px;padding:10px}
.row-posters img{width:150px;height:220px;object-fit:cover;border-radius:8px;cursor:pointer}

/* DETAILS */
#details{display:none;position:fixed;width:100%;height:100%;top:0;background:black;z-index:9999;overflow:auto}
#details iframe{width:100%;height:220px}

/* PLAYER */
#player{display:none;position:fixed;width:100%;height:100%;top:0;background:black;z-index:99999}
#player iframe{width:100%;height:100%}

.close{position:absolute;right:20px;top:10px;font-size:30px;cursor:pointer}

/* HIGHLIGHT */
mark{background:red;color:white;padding:2px}

</style>
</head>

<body>

<div class="navbar">
<div class="logo">ShiedFlix</div>
<input id="search" placeholder="Search...">
<div id="suggestions"></div>
</div>

<!-- HERO -->
<div id="hero">
<iframe id="heroVideo"></iframe>
<div class="hero-content">
<h1 id="hero-title"></h1>
<p id="hero-desc"></p>
<button id="playHero">▶ Play</button>
<button id="infoHero">ℹ Info</button>
</div>
</div>

<!-- SEARCH RESULT -->
<div class="row" id="searchRow" style="display:none;">
<h2>🔎 Results</h2>
<div id="searchResults" class="row-posters"></div>
</div>

<!-- ROWS -->
<div class="row"><h2>🔥 Trending</h2><div id="trending" class="row-posters"></div></div>

<!-- DETAILS -->
<div id="details">
<span class="close" onclick="closeDetails()">✖</span>
<iframe id="trailer"></iframe>
<h2 id="title"></h2>
<p id="desc"></p>
<button onclick="play()">▶ Play</button>
<button onclick="toggleMyList()">❤️ My List</button>
</div>

<!-- PLAYER -->
<div id="player">
<span class="close" onclick="closePlayer()">✖</span>
<iframe id="full"></iframe>
</div>

<script>
const API="https://api.themoviedb.org/3";
const KEY="43c2413701b5c752d07b62acf8e57736";
const IMG="https://image.tmdb.org/t/p/w500";

let allMovies=[];
let current=null;

/* FETCH */
async function fetchData(){
const res=await fetch(`${API}/trending/all/week?api_key=${KEY}`);
const data=await res.json();

allMovies=data.results;

show(data.results);
}

/* SHOW */
function show(list){
const box=document.getElementById("trending");
box.innerHTML="";

list.forEach(i=>{
if(!i.poster_path)return;
const img=document.createElement("img");
img.src=IMG+i.poster_path;
img.onclick=()=>openDetails(i);
box.appendChild(img);
});
}

/* SEARCH (LIVE + SUGGESTIONS) */
const search=document.getElementById("search");
const suggestions=document.getElementById("suggestions");

search.addEventListener("input",(e)=>{
const val=e.target.value.toLowerCase();

if(!val){
document.getElementById("searchRow").style.display="none";
suggestions.style.display="none";
return;
}

const results=allMovies.filter(m=>
(m.title||m.name||"").toLowerCase().includes(val)
);

showResults(results,val);
showSuggestions(results,val);
});

/* RESULTS */
function showResults(results,val){
const row=document.getElementById("searchRow");
row.style.display="block";

const box=document.getElementById("searchResults");
box.innerHTML="";

results.slice(0,20).forEach(i=>{
const img=document.createElement("img");
img.src=IMG+i.poster_path;
img.onclick=()=>openDetails(i);
box.appendChild(img);
});
}

/* SUGGESTIONS */
function showSuggestions(results,val){
suggestions.innerHTML="";
suggestions.style.display="block";

results.slice(0,5).forEach(i=>{
const div=document.createElement("div");

let t=(i.title||i.name);
div.innerHTML=t.replace(new RegExp(val,"gi"),m=>`<mark>${m}</mark>`);

div.onclick=()=>{
search.value=t;
suggestions.style.display="none";
showResults([i],val);
};

suggestions.appendChild(div);
});
}

/* DETAILS */
async function openDetails(i){
current=i;
document.getElementById("details").style.display="block";
document.getElementById("title").innerText=i.title||i.name;
document.getElementById("desc").innerText=i.overview||"";

const res=await fetch(`${API}/movie/${i.id}/videos?api_key=${KEY}`);
const data=await res.json();
const vid=data.results[0];

if(vid){
document.getElementById("trailer").src=
`https://www.youtube.com/embed/${vid.key}`;
}
}

/* PLAYER */
function play(){
document.getElementById("player").style.display="block";
document.getElementById("full").src=
`https://vidsrc.cc/v2/embed/movie/${current.id}`;
}

function closeDetails(){
document.getElementById("details").style.display="none";
}
function closePlayer(){
document.getElementById("player").style.display="none";
}

/* INIT */
fetchData();
</script>

</body>
</html>
