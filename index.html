<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix Final</title>

<style>
body{margin:0;background:#000;color:white;font-family:Arial}

/* NAV */
.navbar{
position:fixed;width:100%;top:0;
padding:15px;
display:flex;justify-content:space-between;
background:linear-gradient(to bottom,#000,transparent);
z-index:1000;
}
.logo{color:red;font-weight:bold}

/* HERO */
#hero{
height:70vh;
display:flex;
align-items:flex-end;
padding:20px;
position:relative;
overflow:hidden;
}
#hero iframe{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
pointer-events:none;
filter:brightness(0.4);
}
.hero-content{z-index:2;max-width:400px}

/* ROW */
.row-posters{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
}
.row-posters img{
width:140px;border-radius:5px;
cursor:pointer;
}

/* DETAILS */
#details{
display:none;
position:fixed;
width:100%;
height:100%;
top:0;
background:black;
z-index:9999;
overflow:auto;
}
#details iframe{
width:100%;
height:220px;
}

/* PLAYER */
#player{
display:none;
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
background:black;
z-index:99999;
}
#player iframe{
width:100%;
height:100%;
border:none;
pointer-events:auto !important;
}

/* CLOSE */
.close{
position:absolute;
right:20px;
top:10px;
font-size:30px;
cursor:pointer;
z-index:100000;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">ShiedFlix</div>
</div>

<!-- HERO -->
<div id="hero">
<iframe id="heroVideo"></iframe>
<div class="hero-content">
<h1 id="hero-title"></h1>
<button onclick="play()">▶ Play</button>
</div>
</div>

<!-- MOVIES -->
<div class="row-posters" id="movies"></div>

<!-- DETAILS -->
<div id="details">
<span class="close" onclick="closeDetails()">✖</span>
<iframe id="trailer" allowfullscreen></iframe>
<h2 id="title"></h2>
<p id="desc"></p>
<button onclick="play()">▶ Play Full Movie</button>
</div>

<!-- PLAYER -->
<div id="player">
<span class="close" onclick="closePlayer()">✖</span>

<iframe 
id="full"
allow="autoplay; fullscreen; encrypted-media"
allowfullscreen>
</iframe>

<button onclick="goFullscreen()" style="position:absolute;bottom:20px;right:20px;">
⛶ Fullscreen
</button>

</div>

<script>
const API="https://api.themoviedb.org/3";
const KEY="43c2413701b5c752d07b62acf8e57736";
const IMG="https://image.tmdb.org/t/p/w500";

let current=null;

/* FETCH */
async function getMovies(){
const res=await fetch(`${API}/movie/popular?api_key=${KEY}`);
return (await res.json()).results;
}

/* SHOW */
function show(list){
const box=document.getElementById("movies");
box.innerHTML="";

list.forEach(i=>{
if(!i.poster_path)return;

const img=document.createElement("img");
img.src=IMG+i.poster_path;

img.onclick=()=>{
current=i;

document.getElementById("details").style.display="block";
document.getElementById("title").innerText=i.title;
document.getElementById("desc").innerText=i.overview;

document.getElementById("trailer").src=
`https://www.youtube.com/embed?autoplay=1&mute=0`;
};

box.appendChild(img);
});
}

/* PLAYER */
function play(){
document.getElementById("details").style.display="none";
document.getElementById("player").style.display="block";

const src=`https://vidsrc.cc/v2/embed/movie/${current.id}?autoplay=1`;

document.getElementById("full").src=src;
}

/* FULLSCREEN */
function goFullscreen(){
const iframe=document.getElementById("full");
if(iframe.requestFullscreen) iframe.requestFullscreen();
}

/* CLOSE */
function closeDetails(){
document.getElementById("details").style.display="none";
document.getElementById("trailer").src="";
}

function closePlayer(){
document.getElementById("player").style.display="none";
document.getElementById("full").src="";
}

/* INIT */
async function init(){
const movies=await getMovies();
show(movies);

const hero=movies[0];
current=hero;

document.getElementById("hero-title").innerText=hero.title;
document.getElementById("heroVideo").src=
`https://www.youtube.com/embed?autoplay=1&mute=1`;
}

init();
</script>

</body>
</html>
