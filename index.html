<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix</title>

<style>
body{margin:0;background:#0b0b0b;color:white;font-family:Arial;}

/* NAVBAR */
.navbar{
position:fixed;width:100%;top:0;
background:rgba(0,0,0,0.8);
backdrop-filter:blur(10px);
padding:15px;display:flex;justify-content:space-between;z-index:1000;
}
.logo{color:red;font-weight:bold;}
.menu{display:flex;align-items:center;}
.menu a{color:white;margin-left:10px;text-decoration:none;}
#searchInput{margin-left:10px;padding:5px;border-radius:20px;border:none;}

/* BANNER */
#banner{
margin-top:60px;height:280px;background-size:cover;
display:flex;align-items:flex-end;padding:20px;position:relative;
}
#banner::after{
content:"";position:absolute;bottom:0;width:100%;height:60%;
background:linear-gradient(to top,#0b0b0b,transparent);
}
#watchBtn{background:red;border:none;padding:10px;border-radius:5px;color:white;}

/* LIST */
.list{display:flex;overflow-x:auto;gap:10px;padding:10px;}
.list::-webkit-scrollbar{display:none;}

/* CARD */
.card{min-width:140px;position:relative;transition:0.3s;}
.card img{width:100%;border-radius:10px;}
.card:hover{transform:scale(1.1);}

/* OVERLAY */
.overlay{
position:absolute;bottom:0;width:100%;
background:linear-gradient(to top,black,transparent);
padding:5px;opacity:0;transition:0.3s;
}
.card:hover .overlay{opacity:1;}

.title{font-size:12px;}
.desc{font-size:10px;color:gray;}
.rating{color:gold;font-size:11px;}

/* FAVORITE */
.fav{
position:absolute;top:5px;right:5px;
font-size:18px;cursor:pointer;
z-index:5;
}

/* TRAILER */
.preview{
position:absolute;
width:100%;height:100%;
top:0;left:0;
border-radius:10px;
display:none;
z-index:3;
}

/* MODAL */
#modal{
display:none;
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
top:0;
left:0;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9998;
}

/* VIDEO */
#modal-video{
width:95%;
height:250px;
border:none;
}

/* CLOSE BUTTON FIXED */
.close{
position:absolute;
top:20px;
right:20px;
font-size:30px;
color:white;
z-index:9999;
background:rgba(0,0,0,0.6);
padding:5px 10px;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">🎬 ShiedFlix</div>
<div class="menu">
<a href="#">Home</a>
<input id="searchInput" placeholder="Search...">
</div>
</div>

<div id="banner">
<div>
<h2 id="banner-title">Loading...</h2>
<button id="watchBtn">▶ Watch</button>
</div>
</div>

<h2 style="padding-left:15px;">🔥 Movies <span style="float:right;color:red;cursor:pointer;" onclick="viewAll()">View All</span></h2>
<div id="movies-list" class="list"></div>

<h2 style="padding-left:15px;">📺 TV Shows</h2>
<div id="tvshows-list" class="list"></div>

<h2 style="padding-left:15px;">🎌 Anime</h2>
<div id="anime-list" class="list"></div>

<h2 style="padding-left:15px;">❤️ Favorites</h2>
<div id="favorites-list" class="list"></div>

<!-- MODAL -->
<div id="modal">
<span class="close" onclick="closeModal()">✖</span>
<h3 id="modal-title"></h3>
<iframe id="modal-video" allowfullscreen></iframe>
</div>

<script>
const API="https://api.themoviedb.org/3";
const KEY="43c2413701b5c752d07b62acf8e57736";
const IMG="https://image.tmdb.org/t/p/w500";

let movies=[],tv=[],anime=[];
let isViewAll=false;

// FETCH
async function get(type){
const res=await fetch(`${API}/trending/${type}/week?api_key=${KEY}`);
const data=await res.json();
return data.results||[];
}

// TRAILER
async function getTrailer(id,type="movie"){
try{
const res=await fetch(`${API}/${type}/${id}/videos?api_key=${KEY}`);
const data=await res.json();
const t=data.results.find(v=>v.type==="Trailer");
if(t)return `https://www.youtube.com/embed/${t.key}?autoplay=1&mute=1`;
}catch{}
return null;
}

// CARD
function createCard(item){
const card=document.createElement("div");
card.className="card";

const img=document.createElement("img");
img.src=IMG+item.poster_path;

// FAVORITE
const fav=document.createElement("div");
fav.className="fav";
fav.innerText="❤️";
fav.onclick=(e)=>{
e.stopPropagation();
addFav(item);
};

// TRAILER
const video=document.createElement("iframe");
video.className="preview";

let tapped=false;
let trailer=null;

getTrailer(item.id,item.title?"movie":"tv").then(url=>{
trailer=url;
});

card.onclick=()=>{
if(!tapped && trailer){
video.src=trailer;
video.style.display="block";
tapped=true;
}else{
openPlayer(item);
}
};

// OVERLAY
const overlay=document.createElement("div");
overlay.className="overlay";

const title=document.createElement("div");
title.className="title";
title.innerText=item.title||item.name;

const rating=document.createElement("div");
rating.className="rating";
rating.innerText="⭐ "+(item.vote_average||"N/A");

const desc=document.createElement("div");
desc.className="desc";
desc.innerText=item.overview?item.overview.slice(0,40)+"...":"";

overlay.append(title,rating,desc);

card.append(img,video,overlay,fav);
return card;
}

// SHOW
function show(list,id){
const box=document.getElementById(id);
box.innerHTML="";
list.forEach(i=>{
if(i.poster_path) box.appendChild(createCard(i));
});
}

// PLAYER
function openPlayer(i){
document.getElementById("modal").style.display="flex";
document.getElementById("modal-title").innerText=i.title||i.name;

const src=i.title
?`https://vidsrc.cc/v2/embed/movie/${i.id}`
:`https://vidsrc.cc/v2/embed/tv/${i.id}/1/1`;

document.getElementById("modal-video").src=src;
}

// CLOSE
function closeModal(){
document.getElementById("modal").style.display="none";
document.getElementById("modal-video").src="";
}

// TAP OUTSIDE CLOSE
document.getElementById("modal").onclick = (e) => {
if (e.target.id === "modal") closeModal();
};

// FAVORITES
function addFav(item){
let favs=JSON.parse(localStorage.getItem("favs"))||[];
if(!favs.find(x=>x.id===item.id)){
favs.push(item);
localStorage.setItem("favs",JSON.stringify(favs));
loadFav();
}
}
function loadFav(){
const favs=JSON.parse(localStorage.getItem("favs"))||[];
show(favs,"favorites-list");
}

// BANNER
function banner(){
const valid=movies.filter(m=>m.backdrop_path);
if(valid.length===0)return;

setInterval(()=>{
const m=valid[Math.floor(Math.random()*valid.length)];
document.getElementById("banner").style.backgroundImage=
`url(https://image.tmdb.org/t/p/original${m.backdrop_path})`;
document.getElementById("banner-title").innerText=m.title;
document.getElementById("watchBtn").onclick=()=>openPlayer(m);
},3000);
}

// VIEW ALL
function viewAll(){
const box=document.getElementById("movies-list");
if(isViewAll){
isViewAll=false;
box.style.flexWrap="nowrap";
show(movies,"movies-list");
}else{
isViewAll=true;
box.style.flexWrap="wrap";
show(movies,"movies-list");
}
}

// SEARCH
document.getElementById("searchInput").addEventListener("input",async e=>{
const q=e.target.value;
if(!q){
show(movies,"movies-list");
show(tv,"tvshows-list");
show(anime,"anime-list");
return;
}
const res=await fetch(`${API}/search/multi?api_key=${KEY}&query=${q}`);
const data=await res.json();
show(data.results,"movies-list");
});

// INIT
async function init(){
movies=await get("movie");
tv=await get("tv");
anime=tv.filter(x=>x.original_language==="ja");

show(movies,"movies-list");
show(tv,"tvshows-list");
show(anime,"anime-list");

loadFav();
banner();
}
init();
</script>

</body>
</html>
