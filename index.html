<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix Premium</title>

<style>
body{
  margin:0;
  background:#0b0b0b;
  color:white;
  font-family:Arial;
  overflow-x:hidden;
}

/* NAVBAR */
.navbar{
  position:fixed;
  width:100%;
  top:0;
  background:rgba(0,0,0,0.9);
  padding:12px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:1000;
}
.logo{color:red;font-weight:bold;font-size:18px;}

/* SEARCH */
.search-box{position:relative;}
#searchInput{
  width:140px;
  padding:8px 15px;
  border-radius:20px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.1);
  color:white;
  transition:0.3s;
}
#searchInput:focus{
  width:220px;
  background:rgba(255,255,255,0.2);
}
@media (min-width:768px){
  #searchInput{width:200px;}
  #searchInput:focus{width:300px;}
}

/* BANNER */
#banner{
  margin-top:60px;
  height:55vh;
  min-height:220px;
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:flex-end;
  padding:20px;
  position:relative;
}
#banner::after{
  content:"";
  position:absolute;
  bottom:0;
  width:100%;
  height:60%;
  background:linear-gradient(to top,#0b0b0b,transparent);
}

/* HEADINGS */
h2{
  padding:0 15px;
  font-size:18px;
}

/* LIST */
.list{
  display:flex;
  gap:12px;
  padding:10px 15px;
  overflow-x:auto;
}
.list::-webkit-scrollbar{display:none;}

/* CARD */
.card{
  min-width:140px;
  position:relative;
  transition:0.3s;
}
.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:10px;
}
.card:hover{
  transform:scale(1.15);
  z-index:10;
}

/* DESKTOP */
@media (min-width:768px){
  .card{min-width:180px;}
  .card img{height:260px;}
}
@media (min-width:1024px){
  .card{min-width:220px;}
}

/* PLAY ICON */
.card::after{
  content:"▶";
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:30px;
  opacity:0;
}
.card:hover::after{opacity:1;}

/* OVERLAY */
.overlay{
  position:absolute;
  bottom:0;
  width:100%;
  background:linear-gradient(to top,black,transparent);
  padding:5px;
}
.title{font-size:12px;}
.desc{font-size:10px;color:gray;}
.rating{color:gold;font-size:11px;}

/* FAVORITE */
.fav{
  position:absolute;
  top:5px;
  right:5px;
  font-size:18px;
}

/* MODALS */
#modal,#detailsModal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  background:rgba(0,0,0,0.95);
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

.close{
  position:absolute;
  top:20px;
  right:20px;
  font-size:30px;
  cursor:pointer;
}

button{
  background:red;
  border:none;
  padding:10px 20px;
  color:white;
  border-radius:5px;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">🎬 ShiedFlix</div>
  <div class="search-box">
    <input id="searchInput" placeholder="Search movies...">
  </div>
</div>

<div id="banner">
  <div>
    <h2 id="banner-title">Loading...</h2>
    <button id="watchBtn">▶ Watch</button>
  </div>
</div>

<h2>🔥 Movies <span onclick="viewAll()" style="float:right;color:red;">View All</span></h2>
<div id="movies-list" class="list"></div>

<h2>▶ Continue Watching</h2>
<div id="continue-list" class="list"></div>

<h2>📺 TV Shows</h2>
<div id="tvshows-list" class="list"></div>

<h2>🎌 Anime</h2>
<div id="anime-list" class="list"></div>

<h2>❤️ Favorites</h2>
<div id="favorites-list" class="list"></div>

<!-- PLAYER -->
<div id="modal">
<span class="close" onclick="closeModal()">✖</span>
<h3 id="modal-title"></h3>
<iframe id="modal-video" style="width:95%;height:250px;"></iframe>
</div>

<!-- DETAILS -->
<div id="detailsModal">
<span class="close" onclick="closeDetails()">✖</span>

<div style="width:95%;max-width:500px;">
<iframe id="trailerFrame" style="width:100%;height:220px;"></iframe>
<h2 id="detailTitle"></h2>
<p id="detailDesc"></p>
<button id="playBtn">▶ Play Full Movie</button>
</div>
</div>

<script>
const API="https://api.themoviedb.org/3";
const KEY="43c2413701b5c752d07b62acf8e57736";
const IMG="https://image.tmdb.org/t/p/w500";

let movies=[],tv=[],anime=[];
let isViewAll=false;

async function get(type){
const res=await fetch(`${API}/trending/${type}/week?api_key=${KEY}`);
return (await res.json()).results;
}

async function getTrailer(id,type="movie"){
try{
const res=await fetch(`${API}/${type}/${id}/videos?api_key=${KEY}`);
const data=await res.json();
const t=data.results.find(v=>v.type==="Trailer");
if(t)return `https://www.youtube.com/embed/${t.key}?autoplay=1&mute=1`;
}catch{}
return "";
}

function createCard(item){
const card=document.createElement("div");
card.className="card";

const img=document.createElement("img");
img.src=IMG+item.poster_path;

const fav=document.createElement("div");
fav.className="fav";
fav.innerText="❤️";
fav.onclick=(e)=>{
e.stopPropagation();
toggleFav(item);
};

const overlay=document.createElement("div");
overlay.className="overlay";

overlay.innerHTML=`
<div class="title">${item.title||item.name}</div>
<div class="rating">⭐ ${item.vote_average}</div>
<div class="desc">${item.overview?.slice(0,40)}...</div>
`;

card.append(img,overlay,fav);
card.onclick=()=>openDetails(item);

return card;
}

function show(list,id){
const box=document.getElementById(id);
box.innerHTML="";
list.forEach(i=>i.poster_path && box.appendChild(createCard(i)));
}

function toggleFav(item){
let favs=JSON.parse(localStorage.getItem("favs"))||[];
favs=favs.find(x=>x.id===item.id)?favs.filter(x=>x.id!==item.id):[...favs,item];
localStorage.setItem("favs",JSON.stringify(favs));
show(favs,"favorites-list");
}

async function openDetails(item){
document.getElementById("detailsModal").style.display="flex";
document.getElementById("detailTitle").innerText=item.title||item.name;
document.getElementById("detailDesc").innerText=item.overview;

const trailer=await getTrailer(item.id,item.title?"movie":"tv");
document.getElementById("trailerFrame").src=trailer;

document.getElementById("playBtn").onclick=()=>{
closeDetails();
openPlayer(item);
};
}

function openPlayer(i){
document.getElementById("modal").style.display="flex";
document.getElementById("modal-title").innerText=i.title||i.name;

const src=i.title
?`https://vidsrc.cc/v2/embed/movie/${i.id}`
:`https://vidsrc.cc/v2/embed/tv/${i.id}/1/1`;

document.getElementById("modal-video").src=src;
}

function closeModal(){
document.getElementById("modal").style.display="none";
document.getElementById("modal-video").src="";
}

function closeDetails(){
document.getElementById("detailsModal").style.display="none";
document.getElementById("trailerFrame").src="";
}

function banner(){
setInterval(()=>{
const m=movies[Math.floor(Math.random()*movies.length)];
document.getElementById("banner").style.backgroundImage=
`url(https://image.tmdb.org/t/p/original${m.backdrop_path})`;
document.getElementById("banner-title").innerText=m.title;
document.getElementById("watchBtn").onclick=()=>openPlayer(m);
},3000);
}

function viewAll(){
const box=document.getElementById("movies-list");
isViewAll=!isViewAll;
box.style.flexWrap=isViewAll?"wrap":"nowrap";
}

document.getElementById("searchInput").addEventListener("input",async e=>{
const q=e.target.value;
if(!q)return show(movies,"movies-list");
const res=await fetch(`${API}/search/multi?api_key=${KEY}&query=${q}`);
show((await res.json()).results,"movies-list");
});

async function init(){
movies=await get("movie");
tv=await get("tv");
anime=tv.filter(x=>x.original_language==="ja");

show(movies,"movies-list");
show(tv,"tvshows-list");
show(anime,"anime-list");

banner();
}
init();
</script>

</body>
</html>
