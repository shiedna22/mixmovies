<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix Ultimate FIXED</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:white;font-family:Arial}

/* NAV */
.navbar{
position:fixed;width:100%;top:0;
padding:15px;
display:flex;justify-content:space-between;
background:rgba(0,0,0,0.9);
z-index:1000;
}
.logo{color:red;font-weight:bold}
#search{background:#222;border:none;color:white;padding:8px 15px;border-radius:20px}

/* HERO */
#hero{
height:55vh;
display:flex;
align-items:flex-end;
padding:20px;
margin-top:60px;
position:relative;
overflow:hidden;
}

#hero iframe{
position:absolute;
top:50%;
left:50%;
width:177.77vh;
height:100vh;
transform:translate(-50%,-50%);
opacity:0;
transition:0.5s;
pointer-events:none;
}

#hero iframe.active{opacity:0.4}

.hero-content{z-index:2}

/* ROW */
.row{margin-top:15px}
.row-posters{display:flex;overflow-x:auto;gap:10px;padding:10px}

/* CARD */
.card{min-width:130px;cursor:pointer}
.card img{
width:130px;height:190px;
border-radius:8px;
transition:0.3s;
}
.card img:hover{
transform:scale(1.1);
box-shadow:0 0 15px red;
}

/* PLAYER */
#player{
display:none;
position:fixed;
top:0;width:100%;height:100%;
background:black;
z-index:99999;
}
#player iframe{width:100%;height:100%}
.close{
position:absolute;right:20px;top:10px;
font-size:30px;cursor:pointer;
}

/* EPISODES */
#episodes{
position:absolute;
bottom:0;
background:rgba(0,0,0,0.8);
width:100%;
padding:10px;
display:flex;
overflow-x:auto;
gap:10px;
}
.ep{
background:#222;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
}
.ep:hover{background:red}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">ShiedFlix</div>
<input id="search" placeholder="Search...">
</div>

<!-- HERO -->
<div id="hero">
<iframe id="heroVideo" allow="autoplay; fullscreen"></iframe>

<div class="hero-content">
<h1 id="hero-title"></h1>
<p id="hero-desc"></p>
<button id="playHero">▶ Play</button>
</div>

<div id="episodes"></div>
</div>

<!-- SEARCH -->
<div class="row" id="searchRow" style="display:none;">
<h2>🔎 Results</h2>
<div id="searchResults" class="row-posters"></div>
</div>

<!-- ROWS -->
<div class="row"><h2>🔥 Trending</h2><div id="trending" class="row-posters"></div></div>

<!-- PLAYER -->
<div id="player">
<span class="close" onclick="closePlayer()">✖</span>
<iframe id="full"></iframe>
</div>

<script>
const API="https://api.themoviedb.org/3";
const KEY="43c2413701b5c752d07b62acf8e57736";
const IMG="https://image.tmdb.org/t/p/w500";

let current=null,currentType="movie";

/* FETCH */
async function fetchData(url){
const res=await fetch(url);
return (await res.json()).results;
}

/* TRAILER */
async function getTrailer(id,type){
try{
const res=await fetch(`${API}/${type}/${id}/videos?api_key=${KEY}`);
const data=await res.json();
const t=data.results.find(v=>v.site==="YouTube");
return t?`https://www.youtube.com/embed/${t.key}?autoplay=1&mute=1`:"";
}catch{return "";}
}

function title(i){return i.title||i.name||"No Title"}

/* HERO */
async function setHero(m){
current=m;
currentType=m.title?"movie":"tv";

document.getElementById("hero-title").innerText=title(m);
document.getElementById("hero-desc").innerText=m.overview||"No description";

const hero=document.getElementById("heroVideo");
const trailer=await getTrailer(m.id,currentType);

if(trailer){
hero.src=trailer;
hero.classList.add("active");
}else{
hero.src="";
}

document.getElementById("playHero").onclick=()=>openPlayer(m);

loadEpisodes(m);
}

/* EPISODES */
async function loadEpisodes(m){
const box=document.getElementById("episodes");
box.innerHTML="";

if(!m.name) return;

for(let i=1;i<=10;i++){
const ep=document.createElement("div");
ep.className="ep";
ep.innerText="EP "+i;

ep.onclick=()=>{
openEpisode(m.id,i);
};

box.appendChild(ep);
}
}

function openEpisode(id,ep){
document.getElementById("player").style.display="block";
document.getElementById("full").src=
`https://vidsrc.cc/v2/embed/tv/${id}/1/${ep}`;
}

/* PLAYER */
function openPlayer(i){
document.getElementById("player").style.display="block";

document.getElementById("full").src=i.title
?`https://vidsrc.cc/v2/embed/movie/${i.id}`
:`https://vidsrc.cc/v2/embed/tv/${i.id}/1/1`;
}

function closePlayer(){
document.getElementById("player").style.display="none";
document.getElementById("full").src="";
}

/* SHOW */
function show(list,id,type){
const box=document.getElementById(id);
box.innerHTML="";
list.forEach(i=>{
if(!i.poster_path)return;

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${IMG+i.poster_path}">
<div>${title(i)}</div>
`;

card.onclick=()=>setHero(i);
box.appendChild(card);
});
}

/* SEARCH */
document.getElementById("search").addEventListener("input",async(e)=>{
const v=e.target.value;
const row=document.getElementById("searchRow");
const box=document.getElementById("searchResults");

if(!v){
row.style.display="none";
return;
}

const res=await fetch(`${API}/search/multi?api_key=${KEY}&query=${v}`);
const data=await res.json();

row.style.display="block";
box.innerHTML="";

data.results.forEach(i=>{
if(!i.poster_path)return;
const card=document.createElement("div");
card.className="card";
card.innerHTML=`<img src="${IMG+i.poster_path}">`;
card.onclick=()=>setHero(i);
box.appendChild(card);
});
});

/* INIT */
async function init(){
const trending=await fetchData(`${API}/trending/all/week?api_key=${KEY}`);
show(trending,"trending","movie");
setHero(trending[0]);
}
init();
</script>

</body>
</html>
