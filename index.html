<!DOCTYPE html>
<html>
<head>
  <title>ShiedFlix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background:#0b0b0b;
  color:white;
  font-family:Arial;
  margin:0;
}

/* NAVBAR */
.navbar {
  position:sticky;
  top:0;
  background:black;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:1000;
}

.logo { color:red; font-weight:bold; }

.menu {
  display:flex;
  align-items:center;
}

.menu a {
  color:white;
  margin-left:10px;
  text-decoration:none;
}

.menu a:hover { color:red; }

/* SEARCH */
#searchInput {
  margin-left:10px;
  padding:6px;
  border-radius:20px;
  border:none;
}

/* BANNER */
#banner {
  height:250px;
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:flex-end;
  padding:20px;
  position:relative;
}

#banner::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

#banner div {
  position:relative;
  z-index:2;
}

#watchBtn {
  background:red;
  border:none;
  padding:10px;
  color:white;
  border-radius:5px;
}

/* LIST */
h2 { margin:15px; }

.list {
  display:flex;
  overflow-x:auto;
  padding:10px;
  gap:10px;
}

.list::-webkit-scrollbar {
  display:none;
}

img {
  width:120px;
  border-radius:10px;
  transition:0.3s;
}

img:hover {
  transform:scale(1.1);
  box-shadow:0 0 10px red;
}

/* MODAL */
#modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  top:0;
  left:0;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:2000;
}

/* VIDEO */
#modal-video {
  width:95%;
  height:250px;
}

/* 📱 PORTRAIT DRAMA */
#modal-video.portrait {
  width:60%;
  height:70vh;
  max-width:300px;
}

/* CLOSE BUTTON */
.close {
  position:absolute;
  top:20px;
  right:20px;
  font-size:25px;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:600px){
  #modal-video { height:220px; }
}

/* 🔥 ULTRA MODE FIXED */
#ultra-container {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  scroll-behavior: smooth;
}

#ultra-container::-webkit-scrollbar {
  display: none;
}

.ultra-item {
  height: 100vh;
  scroll-snap-align: start;
}

.ultra-video {
  position: relative;
  width: 100%;
  height: 100%;
}

.ultra-video iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* OVERLAY */
.ultra-overlay {
  position: absolute;
  bottom: 20px;
  left: 15px;
  color: white;
  z-index: 2;
}

.ultra-overlay button {
  background: red;
  border: none;
  padding: 8px;
  border-radius: 5px;
}

/* GRADIENT */
.ultra-video::after {
  content:"";
  position:absolute;
  bottom:0;
  width:100%;
  height:50%;
  background:linear-gradient(to top, black, transparent);
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">🎬 ShiedFlix</div>

  <div class="menu">
    <a href="#">Home</a>
    <a href="#movies">Movies</a>
    <a href="#tv">TV</a>
    <a href="#anime">Anime</a>
    <a href="#drama">Drama</a>
    <input id="searchInput" placeholder="Search...">
  </div>
</div>

<!-- BANNER -->
<div id="banner">
  <div>
    <h2 id="banner-title">Loading...</h2>
    <button id="watchBtn">▶ Watch</button>
  </div>
</div>

<h2 id="movies">🔥 Movies</h2>
<div id="movies-list" class="list"></div>

<h2 id="tv">📺 TV Shows</h2>
<div id="tvshows-list" class="list"></div>

<h2 id="anime">🎌 Anime</h2>
<div id="anime-list" class="list"></div>

<h2 id="drama">🎭 Drama Series</h2>
<div id="drama-list" class="list"></div>

<h2>❤️ Favorites</h2>
<div id="favorites-list" class="list"></div>

<h2>📱 Ultra Mode</h2>
<div id="ultra-container"></div>

<!-- MODAL -->
<div id="modal">
  <span class="close" onclick="closeModal()">✖</span>
  <h3 id="modal-title"></h3>
  <iframe id="modal-video" allow="autoplay; fullscreen" allowfullscreen></iframe>
</div>

<script src="home.js"></script>
</body>
</html>
