<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix ULTRA</title>

<style>
body{margin:0;background:#000;color:white;font-family:Arial}

/* NAV */
.navbar{
position:fixed;width:100%;top:0;
padding:15px;
display:flex;justify-content:space-between;
background:linear-gradient(to bottom,#000,transparent);
z-index:1000;
}
.logo{color:red;font-weight:bold}
#search{
background:#222;border:none;color:white;
padding:8px 15px;border-radius:20px;
}

/* HERO */
#hero{
height:70vh;
display:flex;
align-items:flex-end;
padding:20px;
position:relative;
overflow:hidden;
}
#hero iframe{
position:absolute;width:100%;height:100%;
top:0;left:0;
pointer-events:none;
filter:brightness(0.4);
}
.hero-content{z-index:2}

/* ROW */
.row{margin-top:10px}
.row h2{margin-left:10px}
.row-posters{
display:flex;overflow-x:auto;
gap:10px;padding:10px;
}
.row-posters img{
width:140px;border-radius:6px;
cursor:pointer;
}

/* DETAILS */
#details{
display:none;
position:fixed;
width:100%;height:100%;
top:0;background:black;
z-index:9999;
}
#details iframe{width:100%;height:220px}

/* PLAYER */
#player{
display:none;
position:fixed;
width:100%;height:100%;
top:0;background:black;
z-index:99999;
}
#player iframe{
width:100%;height:100%;
border:none;
}

/* PLAYER UI */
#overlay{
position:absolute;
width:100%;height:100%;
top:0;left:0;
z-index:100000;
}
#centerIcon{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
font-size:50px;
opacity:0;
}

/* CONTROLS */
#controls{
position:absolute;
bottom:0;
width:100%;
padding:10px;
background:linear-gradient(to top,black,transparent);
z-index:100001;
}

.close{
position:absolute;
right:20px;
top:10px;
font-size:30px;
cursor:pointer;
z-index:100001;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">ShiedFlix</div>
<input id="search" placeholder="Search...">
</div>

<!-- HERO -->
<div id="hero">
<iframe id="heroVideo"></iframe>
<div class="hero-content">
<h1 id="hero-title"></h1>
<p id="hero-desc"></p>
<button onclick="play()">▶ Play</button>
<button onclick="openDetails()">ℹ Info</button>
</div>
</div>

<!-- ROW -->
<div class="row">
<h2>🔥 Movies</h2>
<div id="movies" class="row-posters"></div>
</div>

<!-- DETAILS -->
<div id="details">
<span class="close" onclick="closeDetails()">✖</span>
<iframe id="trailer"></iframe>
<h2 id="title"></h2>
<p id="desc"></p>
<button onclick="play()">▶ Play</button>
</div>

<!-- PLAYER -->
<div id="player">

<div class="close" onclick="closePlayer()">✖</div>

<iframe id="full" allow="autoplay; fullscreen"></iframe>

<div id="overlay"></div>
<div id="centerIcon">▶</div>

<div id="controls">
<button onclick="play()">▶</button>
<button onclick="toggleMute()">🔊</button>
<button onclick="goFull()">⛶</button>
</div>

</div>

<script>
const API="https://api.themoviedb.org/3";
const KEY="43c2413701b5c752d07b62acf8e57736";
const IMG="https://image.tmdb.org/t/p/w500";

let current=null;
let muted=false;

/* FETCH */
async function getMovies(){
const res=await fetch(`${API}/movie/popular?api_key=${KEY}`);
return (await res.json()).results;
}

/* SHOW */
function show(list){
const box=document.getElementById("movies");
box.innerHTML="";

list.forEach(i=>{
if(!i.poster_path)return;

const img=document.createElement("img");
img.src=IMG+i.poster_path;

img.onclick=()=>{
current=i;
openDetails();
};

box.appendChild(img);
});
}

/* DETAILS */
function openDetails(){
document.getElementById("details").style.display="block";
document.getElementById("title").innerText=current.title;
document.getElementById("desc").innerText=current.overview;

document.getElementById("trailer").src=
`https://www.youtube.com/embed?autoplay=1&mute=0`;
}

function closeDetails(){
document.getElementById("details").style.display="none";
document.getElementById("trailer").src="";
}

/* PLAYER */
function play(){
document.getElementById("details").style.display="none";
document.getElementById("player").style.display="block";

document.getElementById("full").src=
`https://vidsrc.cc/v2/embed/movie/${current.id}?autoplay=1`;

goFull();
}

/* FULLSCREEN */
function goFull(){
const el=document.getElementById("player");
el.requestFullscreen?.();

screen.orientation?.lock("landscape").catch(()=>{});
}

function closePlayer(){
document.getElementById("player").style.display="none";
document.getElementById("full").src="";
document.exitFullscreen?.();
}

/* MUTE */
function toggleMute(){
muted=!muted;

let iframe=document.getElementById("full");
iframe.src = iframe.src.split("&mute")[0] + (muted?"&mute=1":"&mute=0");
}

/* GESTURES */
let lastTap=0,startX=0,startY=0;

const overlay=document.getElementById("overlay");

overlay.addEventListener("touchstart",(e)=>{
startX=e.touches[0].clientX;
startY=e.touches[0].clientY;
});

overlay.addEventListener("touchend",(e)=>{
let now=Date.now();
let x=e.changedTouches[0].clientX;

if(now-lastTap<300){
showIcon(x<window.innerWidth/2?"⏪":"⏩");
}
lastTap=now;
});

overlay.addEventListener("touchmove",(e)=>{
let y=e.touches[0].clientY;
let dy=y-startY;

if(startX<window.innerWidth/2){
document.body.style.filter=`brightness(${1-dy/300})`;
}else{
showIcon("🔊");
}
});

function showIcon(txt){
const el=document.getElementById("centerIcon");
el.innerText=txt;
el.style.opacity=1;
setTimeout(()=>el.style.opacity=0,400);
}

/* HERO */
function setHero(movie){
current=movie;
document.getElementById("hero-title").innerText=movie.title;
document.getElementById("hero-desc").innerText=movie.overview;
}

/* INIT */
async function init(){
const movies=await getMovies();
show(movies);
setHero(movies[0]);
}
init();
</script>

</body>
</html>
