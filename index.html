<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix Ultimate PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:white;font-family:Arial}
html{scroll-behavior:smooth}

/* NAV */
.navbar{
position:fixed;width:100%;top:0;
padding:15px;
display:flex;justify-content:space-between;
background:rgba(0,0,0,0.95);
z-index:1000;
backdrop-filter: blur(10px);
}
.logo{color:red;font-weight:bold;font-size:18px}
#search{
background:#222;border:none;color:white;
padding:8px 15px;border-radius:20px;
outline:none;
}

/* HERO */
#hero{
height:60vh;
display:flex;
align-items:flex-end;
padding:20px;
margin-top:60px;
position:relative;
overflow:hidden;
background:#000;
}

#hero iframe{
position:absolute;
top:50%;
left:50%;
width:177.77vh;
height:100vh;
transform:translate(-50%, -50%);
opacity:0.4;
pointer-events:none;
}

#hero::after{
content:"";
position:absolute;
bottom:0;
width:100%;
height:200px;
background:linear-gradient(to top,#000,transparent);
}

.hero-content{z-index:2;max-width:500px}
.hero-content h1{font-size:28px}
.hero-content p{font-size:14px;margin:10px 0;color:#ccc}

.hero-buttons button{
margin-right:10px;
padding:10px 15px;
border:none;border-radius:5px;
cursor:pointer;
font-weight:bold;
}
.play-btn{background:white;color:black}
.list-btn{background:rgba(255,255,255,0.2);color:white}

/* ROW */
.row{margin-top:15px}
.row h2{padding-left:10px;font-size:16px}
.row-posters{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
scroll-snap-type:x mandatory;
}
.row-posters::-webkit-scrollbar{display:none}

/* CARD */
.card{
min-width:140px;
display:flex;
flex-direction:column;
cursor:pointer;
transition:0.3s;
scroll-snap-align:start;
}
.card img{
width:140px;height:200px;
object-fit:cover;
border-radius:8px;
transition:0.3s;
}
.card:hover img{
transform:scale(1.1);
box-shadow:0 0 15px rgba(255,0,0,0.7);
}
.card div{
font-size:12px;
margin-top:5px;
color:#ccc;
}

/* PLAYER */
#player{
display:none;
position:fixed;
width:100%;height:100%;
top:0;background:black;
z-index:99999;
}
#player iframe{width:100%;height:100%}
.close{
position:absolute;
right:20px;
top:10px;
font-size:30px;
cursor:pointer;
}

/* SEARCH */
#searchRow{margin-top:20px}

/* MOBILE */
@media(max-width:600px){
.card img{width:110px;height:160px}
.hero-content h1{font-size:20px}
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">ShiedFlix</div>
<input id="search" placeholder="Search movies, anime...">
</div>

<!-- HERO -->
<div id="hero">
<iframe id="heroVideo"></iframe>
<div class="hero-content">
<h1 id="hero-title"></h1>
<p id="hero-desc"></p>

<div class="hero-buttons">
<button class="play-btn" id="playHero">▶ Play</button>
<button class="list-btn" onclick="toggleMyList()">+ My List</button>
</div>

</div>
</div>

<!-- ROWS -->
<div class="row"><h2>🔥 Trending</h2><div id="trending" class="row-posters"></div></div>
<div class="row"><h2>🎬 Movies</h2><div id="movies" class="row-posters"></div></div>
<div class="row"><h2>📺 TV Shows</h2><div id="tv" class="row-posters"></div></div>
<div class="row"><h2>🍥 Anime</h2><div id="anime" class="row-posters"></div></div>

<div class="row"><h2>▶ Continue Watching</h2><div id="continue" class="row-posters"></div></div>
<div class="row"><h2>❤️ My List</h2><div id="mylist" class="row-posters"></div></div>

<div class="row" id="searchRow" style="display:none;">
<h2>🔎 Results</h2>
<div id="searchResults" class="row-posters"></div>
</div>

<!-- PLAYER -->
<div id="player">
<span class="close" onclick="closePlayer()">✖</span>
<iframe id="full"></iframe>
</div>

<script>
const API="https://api.themoviedb.org/3";
const KEY="43c2413701b5c752d07b62acf8e57736";
const IMG="https://image.tmdb.org/t/p/w500";

let current=null,currentType="movie";
let continueList=JSON.parse(localStorage.getItem("continue"))||[];
let myList=JSON.parse(localStorage.getItem("myList"))||[];
let heroList=[],heroIndex=0;

/* FETCH */
async function fetchData(url){
const res=await fetch(url);
return (await res.json()).results;
}

/* TRAILER */
async function getTrailer(id,type){
try{
const res=await fetch(`${API}/${type}/${id}/videos?api_key=${KEY}`);
const data=await res.json();
const t=data.results.find(v=>v.site==="YouTube");
return t?`https://www.youtube.com/embed/${t.key}?autoplay=1&mute=1`:"";
}catch{return "";}
}

function title(i){return i.title||i.name||"No Title"}

/* CARD */
function createCard(i,type){
const card=document.createElement("div");
card.className="card";

const img=document.createElement("img");
img.src=i.poster_path?IMG+i.poster_path:"";

card.onclick=()=>{
current=i;
currentType=type;
openPlayer(i,type);
};

card.appendChild(img);
card.appendChild(document.createElement("div")).innerText=title(i);

return card;
}

/* SHOW */
function show(list,id,type){
const box=document.getElementById(id);
box.innerHTML="";
list.forEach(i=>{
if(!i.poster_path)return;
box.appendChild(createCard(i,type));
});
}

/* PLAYER */
function openPlayer(i,type){
const iframe=document.getElementById("full");

iframe.src = type==="movie"
?`https://vidsrc.cc/v2/embed/movie/${i.id}`
:`https://vidsrc.cc/v2/embed/tv/${i.id}/1/1`;

document.getElementById("player").style.display="block";
saveContinue(i,type);
}
function closePlayer(){
document.getElementById("player").style.display="none";
document.getElementById("full").src="";
}

/* CONTINUE */
function saveContinue(m,type){
continueList=continueList.filter(x=>x.id!==m.id);
continueList.unshift({...m,type});
localStorage.setItem("continue",JSON.stringify(continueList));
renderContinue();
}
function renderContinue(){
const box=document.getElementById("continue");
box.innerHTML="";
continueList.forEach(m=>{
box.appendChild(createCard(m,m.type||"movie"));
});
}

/* MY LIST */
function toggleMyList(){
if(!current)return;
let exist=myList.find(m=>m.id===current.id);
if(exist){myList=myList.filter(m=>m.id!==current.id);}
else{myList.push(current);}
localStorage.setItem("myList",JSON.stringify(myList));
renderMyList();
}
function renderMyList(){
const box=document.getElementById("mylist");
box.innerHTML="";
myList.forEach(m=>{
box.appendChild(createCard(m,"movie"));
});
}

/* HERO */
async function setHero(m){
current=m;
currentType=m.title?"movie":"tv";

document.getElementById("hero-title").innerText=title(m);
document.getElementById("hero-desc").innerText=(m.overview||"").slice(0,120)+"...";

const trailer=await getTrailer(m.id,currentType);
const hero=document.getElementById("heroVideo");

if(trailer){hero.src=trailer;}
else{hero.src="";}

document.getElementById("playHero").onclick=()=>openPlayer(m,currentType);
}

/* AUTO HERO */
setInterval(()=>{
heroIndex++;
if(heroIndex>=heroList.length)heroIndex=0;
setHero(heroList[heroIndex]);
},5000);

/* SEARCH */
let debounce;
document.getElementById("search").addEventListener("input",(e)=>{
clearTimeout(debounce);
debounce=setTimeout(async()=>{
const v=e.target.value.trim();
const row=document.getElementById("searchRow");
const box=document.getElementById("searchResults");

if(!v){row.style.display="none";return;}

const res=await fetch(`${API}/search/multi?api_key=${KEY}&query=${v}`);
const data=await res.json();

row.style.display="block";
box.innerHTML="";

data.results.forEach(i=>{
if(!i.poster_path)return;
box.appendChild(createCard(i,i.media_type));
});
},400);
});

/* INIT */
async function init(){
const trending=await fetchData(`${API}/trending/all/week?api_key=${KEY}`);
const movies=await fetchData(`${API}/movie/popular?api_key=${KEY}`);
const tv=await fetchData(`${API}/tv/popular?api_key=${KEY}`);
const anime=await fetchData(`${API}/discover/tv?api_key=${KEY}&with_genres=16`);

show(trending,"trending","movie");
show(movies,"movies","movie");
show(tv,"tv","tv");
show(anime,"anime","tv");

heroList=trending;
setHero(trending[0]);

renderContinue();
renderMyList();
}
init();
</script>

</body>
</html>
