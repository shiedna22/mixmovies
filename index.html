<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix Ultimate FIXED</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:white;font-family:Arial}
html{scroll-behavior:smooth}

/* NAV */
.navbar{
position:fixed;width:100%;top:0;
padding:15px;
display:flex;justify-content:space-between;
background:rgba(0,0,0,0.9);
z-index:1000;
}
.logo{color:red;font-weight:bold}
#search{
background:#222;border:none;color:white;
padding:8px 15px;border-radius:20px;
}

/* HERO */
#hero{
height:55vh;
display:flex;
align-items:flex-end;
padding:20px;
margin-top:60px;
position:relative;
background:black;
overflow:hidden;
}
#hero iframe{
position:absolute;
top:50%;left:50%;
width:177.77vh;height:100vh;
transform:translate(-50%,-50%);
opacity:0.4;
pointer-events:none;
}
.hero-content{z-index:2}

/* ROW */
.row{margin-top:15px}
.row h2{padding-left:10px}
.row-posters{
display:flex;overflow-x:auto;
gap:10px;padding:10px;
}

/* CARD */
.card{min-width:130px;cursor:pointer}
.card img{
width:130px;height:190px;
object-fit:cover;border-radius:8px;
transition:0.3s;
}
.card img:hover{
transform:scale(1.08);
box-shadow:0 0 15px red;
}
.card div{
font-size:12px;margin-top:5px;
}

/* PLAYER */
#player{
display:none;
position:fixed;
top:0;width:100%;height:100%;
background:black;
z-index:9999;
}
#player iframe{
width:100%;
height:70%;
}

/* CONTROLS */
.controls{
display:flex;
justify-content:center;
gap:10px;
padding:10px;
}
.controls button{
padding:10px;
background:#222;
border:none;color:white;
cursor:pointer;
}

/* EPISODES PANEL */
#episodes{
max-height:30%;
overflow:auto;
padding:10px;
}
.ep{
padding:8px;
background:#111;
margin:5px 0;
cursor:pointer;
border-radius:5px;
}
.ep:hover{background:red}

.close{
position:absolute;
right:20px;
top:10px;
font-size:30px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">ShiedFlix+</div>
<input id="search" placeholder="Search...">
</div>

<!-- HERO -->
<div id="hero">
<iframe id="heroVideo"></iframe>
<div class="hero-content">
<h1 id="hero-title"></h1>
<p id="hero-desc"></p>
<button id="playHero">▶ Play</button>
</div>
</div>

<!-- ROWS -->
<div class="row"><h2>🔥 Trending</h2><div id="trending" class="row-posters"></div></div>
<div class="row"><h2>🎬 Movies</h2><div id="movies" class="row-posters"></div></div>
<div class="row"><h2>📺 TV Shows</h2><div id="tv" class="row-posters"></div></div>

<!-- PLAYER -->
<div id="player">
<span class="close" onclick="closePlayer()">✖</span>
<iframe id="full"></iframe>

<div class="controls">
<button onclick="seek(-10)">⏪ 10s</button>
<button onclick="seek(10)">⏩ 10s</button>
<button onclick="goFull()">⛶ Fullscreen</button>
</div>

<div id="episodes"></div>
</div>

<script>
const API="https://api.themoviedb.org/3";
const KEY="43c2413701b5c752d07b62acf8e57736";
const IMG="https://image.tmdb.org/t/p/w500";

let current=null;
let currentType="movie";
let season=1;

/* YEAR */
function year(i){
return (i.release_date||i.first_air_date||"").slice(0,4);
}

/* CARD */
function createCard(i,type){
const card=document.createElement("div");
card.className="card";

const img=document.createElement("img");
img.src=i.poster_path?IMG+i.poster_path:"";

const label=document.createElement("div");
label.innerText=`${i.title||i.name} (${year(i)})`;

card.onclick=()=>{
current=i;
currentType=type;
openPlayer(i);
};

card.appendChild(img);
card.appendChild(label);
return card;
}

/* SHOW */
function show(list,id,type){
const box=document.getElementById(id);
box.innerHTML="";
list.forEach(i=>{
if(!i.poster_path)return;
box.appendChild(createCard(i,type));
});
}

/* PLAYER */
async function openPlayer(i){
const iframe=document.getElementById("full");

iframe.src = currentType==="movie"
?`https://vidsrc.cc/v2/embed/movie/${i.id}`
:`https://vidsrc.cc/v2/embed/tv/${i.id}/1/1`;

document.getElementById("player").style.display="block";

/* LOAD EPISODES (REAL NETFLIX STYLE) */
if(currentType==="tv"){
const res=await fetch(`${API}/tv/${i.id}?api_key=${KEY}`);
const data=await res.json();

let html="<h3>Episodes</h3>";

data.seasons.forEach(s=>{
if(s.season_number===0)return;

html+=`<h4>Season ${s.season_number}</h4>`;

for(let e=1;e<=s.episode_count;e++){
html+=`<div class="ep" onclick="playEpisode(${i.id},${s.season_number},${e})">
Episode ${e}
</div>`;
}
});

document.getElementById("episodes").innerHTML=html;
}else{
document.getElementById("episodes").innerHTML="";
}
}

function playEpisode(id,s,e){
document.getElementById("full").src=
`https://vidsrc.cc/v2/embed/tv/${id}/${s}/${e}`;
}

/* CONTROLS */
function seek(x){
alert("Depends on player server (limit ng vidsrc)");
}

function goFull(){
document.getElementById("full").requestFullscreen();
}

function closePlayer(){
document.getElementById("player").style.display="none";
document.getElementById("full").src="";
}

/* FETCH */
async function fetchData(url){
const res=await fetch(url);
return (await res.json()).results;
}

/* INIT */
async function init(){
const trending=await fetchData(`${API}/trending/all/week?api_key=${KEY}`);
const movies=await fetchData(`${API}/movie/popular?api_key=${KEY}`);
const tv=await fetchData(`${API}/tv/popular?api_key=${KEY}`);

show(trending,"trending","movie");
show(movies,"movies","movie");
show(tv,"tv","tv");

/* HERO FIX */
const h=trending[0];
document.getElementById("hero-title").innerText=h.title||h.name;
document.getElementById("hero-desc").innerText=(h.overview||"").slice(0,100);
document.getElementById("playHero").onclick=()=>openPlayer(h);
}

init();
</script>

</body>
</html>
