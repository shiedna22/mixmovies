<!DOCTYPE html>
<html>
<head>
  <title>ShiedFlix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
html { scroll-behavior: smooth; }

body {
  background:#0b0b0b;
  color:white;
  font-family:Arial;
  margin:0;
}

/* NAVBAR */
.navbar {
  position:sticky;
  top:0;
  background:black;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:1000;
}

.logo { color:red; font-size:22px; font-weight:bold; }

.menu {
  display:flex;
  align-items:center;
  gap:10px;
}

.menu a {
  color:white;
  text-decoration:none;
}

.menu a:hover { color:red; }

#searchInput {
  padding:6px;
  border-radius:6px;
  border:none;
}

/* BANNER */
#banner {
  position:relative;
  height:320px;
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:flex-end;
  padding:20px;
  transition:opacity 0.5s ease, transform 5s ease;
  overflow:hidden;
}

#banner:hover { transform: scale(1.03); }

#banner::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(to right, rgba(0,0,0,0.6), transparent);
  top:0; left:0;
}

.banner-content {
  position:relative;
  z-index:2;
}

#watchBtn {
  margin-top:10px;
  padding:10px 18px;
  border:none;
  background:red;
  color:white;
  cursor:pointer;
  border-radius:6px;
  font-weight:bold;
  box-shadow:0 0 10px red;
}

/* LIST */
h2 { margin:20px; }

.list {
  display:flex;
  overflow-x:auto;
  padding:10px;
}

#search-results {
  display:flex;
  flex-wrap:wrap;
  padding:10px;
}

/* CARDS */
.list div { position:relative; }

img {
  width:120px;
  margin-right:10px;
  border-radius:10px;
  transition:0.3s;
}

img:hover {
  transform:scale(1.1);
  box-shadow:0 0 15px red;
}

/* FAVORITE BTN */
.list button {
  position:absolute;
  top:5px;
  right:5px;
  background:rgba(0,0,0,0.6);
  border:none;
  color:white;
  cursor:pointer;
}

/* MODAL */
#modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

iframe { width:95%; height:300px; }

.close {
  position:absolute;
  right:20px;
  top:20px;
  font-size:30px;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:600px){
  img { width:110px; }
  iframe { height:220px; }
}

#season-container {
  margin-top: 10px;
}

#season-container button {
  margin: 5px;
  padding: 6px 12px;
  background: #111;
  color: white;
  border: 1px solid red;
  border-radius: 5px;
}

#season-container button:hover {
  background: red;
}

#episodes {
  margin-top: 10px;
  display: flex;
  flex-wrap: wrap;
}

#episodes button {
  margin: 5px;
  padding: 6px 10px;
  background: #222;
  color: white;
  border: 1px solid #555;
  border-radius: 5px;
}

#episodes button:hover {
  background: red;
}
  </style>
</head>

<body>

<div class="navbar">
  <div class="logo">🎬 ShiedFlix</div>

  <div class="menu">
    <a href="#">Home</a>
    <a href="#movies">Movies</a>
    <a href="#tv">TV</a>
    <a href="#anime">Anime</a>
    <a href="favorites.html">Favorites</a>
    <input type="text" id="searchInput" placeholder="Search...">
  </div>
</div>

<!-- BANNER -->
<div id="banner">
  <div class="banner-content">
    <h1 id="banner-title">Loading...</h1>
    <button id="watchBtn">▶ Watch Now</button>
  </div>
</div>

<!-- SEARCH -->
<div id="search-results"></div>

<!-- MOVIES -->
<h2 id="movies">🔥 Trending Movies</h2>
<div id="movies-list" class="list"></div>

<!-- ADS -->
<div style="text-align:center;margin:20px;">
  <!-- ADS CODE HERE -->
</div>

<!-- TV -->
<h2 id="tv">📺 TV Shows</h2>
<div id="tvshows-list" class="list"></div>

<!-- ANIME -->
<h2 id="anime">🎌 Anime</h2>
<div id="anime-list" class="list"></div>

<!-- MODAL -->
<div id="modal">
  <span class="close" onclick="closeModal()">✖</span>

  <h2 id="modal-title"></h2>

  <!-- VIDEO PLAYER -->
  <iframe id="modal-video" frameborder="0" allowfullscreen></iframe>

  <!-- SEASON SELECT -->
  <div id="season-container"></div>

  <!-- EPISODES -->
  <div id="episodes"></div>
</div>

<script src="home.js"></script>
</body>
</html>
