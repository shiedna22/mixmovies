<!DOCTYPE html>
<html>
<head>
  <title>My Movie Site</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
body {
  background: #0b0b0b;
  color: white;
  font-family: Arial;
  margin:0;
}
.navbar {
  position: sticky;
  top: 0;
  background: black;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
}
#searchInput {
  margin-left: 15px;
  padding: 5px;
  border-radius: 5px;
  border: none;
    }

.logo {
  color: red;
  font-size: 22px;
  font-weight: bold;
}

.menu a {
  color: white;
  margin-left: 15px;
  text-decoration: none;
}

.menu a:hover {
  color: red;
}

h2 {
  margin: 20px;
}

.list {
  display: flex;
  overflow-x: auto;
  padding: 10px;
}

img {
  width: 140px;
  margin-right: 10px;
  border-radius: 10px;
  transition: 0.3s;
}

img:hover {
  transform: scale(1.1);
}

#modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

iframe {
  width:90%;
  height:300px;
}

.close {
  position:absolute;
  right:20px;
  top:20px;
  font-size:30px;
  cursor:pointer;
}
  </style>
    
</head>

<body>
<div class="navbar">
  <div class="logo">🎬 ShīedFlix</div>

  <div class="menu">
  <a href="#">Home</a>
  <a href="#movies">Movies</a>
<a href="#tv">TV Shows</a>
<a href="#anime">Anime</a>
  <input type="text" placeholder="Search..." id="searchInput">
  </div>
</div>

<h2 id="movies">🔥 Trending Movies</h2>
<div id="movies-list" class="list"></div>

<h2 id="tv">📺 Trending TV Shows</h2>
<div id="tvshows-list" class="list"></div>

<h2 id="anime">🎌 Anime</h2>
<div id="anime-list" class="list"></div>
<!-- MODAL -->
<div id="modal">
  <span class="close" onclick="closeModal()">✖</span>
  <h2 id="modal-title"></h2>
  <iframe id="modal-video" frameborder="0" allowfullscreen></iframe>
</div>

<script src="home.js"></script>

</body>
</html>
