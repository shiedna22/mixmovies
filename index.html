<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix Ultra FIXED</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:white;font-family:Arial}

/* NAV */
.navbar{
position:fixed;width:100%;top:0;
padding:15px;display:flex;justify-content:space-between;
background:#000;z-index:1000;
}
.logo{color:red;font-weight:bold}
#search{background:#222;border:none;color:white;padding:8px 15px;border-radius:20px}

/* HERO */
#hero{
height:55vh;
display:flex;
align-items:flex-end;
padding:20px;
margin-top:60px;
position:relative;
background:black;
}

.hero-content{z-index:2}
.hero-buttons{margin-top:10px;display:flex;gap:10px}
.hero-buttons button{
padding:8px 15px;border:none;border-radius:5px;
cursor:pointer;font-weight:bold;
}
.play-btn{background:white;color:black}
.trailer-btn{background:red;color:white}
.list-btn{background:#333;color:white}

/* ROW */
.row{margin-top:15px}
.row h2{padding-left:10px}
.row-posters{
display:flex;overflow-x:auto;
gap:10px;padding:10px;
}

/* CARD */
.card{min-width:130px}
.card img{
width:130px;height:190px;
border-radius:8px;
}
.card div{font-size:12px;color:#ccc;margin-top:5px}

/* PLAYER */
#player{
display:none;position:fixed;
top:0;width:100%;height:100%;
background:black;z-index:9999;
}
#player iframe{width:100%;height:100%}
.close{
position:absolute;right:20px;top:10px;
font-size:30px;cursor:pointer;
}

/* PREVIEW */
#previewModal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:black;
z-index:9998;
padding:20px;
}
#previewVideo{width:100%;height:250px;border-radius:10px}

</style>
</head>

<body>

<div class="navbar">
<div class="logo">ShiedFlix</div>
<input id="search" placeholder="Search...">
</div>

<div id="hero">
<div class="hero-content">
<h1 id="hero-title"></h1>
<p id="hero-desc"></p>

<div class="hero-buttons">
<button class="play-btn" id="playHero">▶ Play</button>
<button class="trailer-btn" id="watchTrailer">🎬 Trailer</button>
<button class="list-btn" onclick="toggleMyList()">❤️ My List</button>
</div>
</div>
</div>

<div class="row"><h2>🔥 Trending</h2><div id="trending" class="row-posters"></div></div>
<div class="row"><h2>🎬 Movies</h2><div id="movies" class="row-posters"></div></div>
<div class="row"><h2>📺 TV</h2><div id="tv" class="row-posters"></div></div>

<!-- PLAYER -->
<div id="player">
<span class="close" onclick="closePlayer()">✖</span>
<iframe id="full" allowfullscreen></iframe>
</div>

<!-- PREVIEW -->
<div id="previewModal">
<span onclick="closePreview()" style="position:absolute;right:20px;font-size:30px;">✖</span>
<iframe id="previewVideo"></iframe>
<h2 id="previewTitle"></h2>
<p id="previewDesc"></p>
<button onclick="playFromPreview()">▶ Play</button>
</div>

<script>
const API="https://api.themoviedb.org/3";
const KEY="43c2413701b5c752d07b62acf8e57736";
const IMG="https://image.tmdb.org/t/p/w500";

let previewItem=null,currentType="movie";

/* FETCH */
async function fetchData(url){
const res=await fetch(url);
return (await res.json()).results;
}

/* TRAILER */
async function getTrailer(id,type){
try{
const res=await fetch(`${API}/${type}/${id}/videos?api_key=${KEY}`);
const data=await res.json();
if(!data.results) return "";
const t=data.results.find(v=>v.site==="YouTube");
return t?`https://www.youtube.com/embed/${t.key}`:"";
}catch{return "";}
}

function title(i){
let name=i.title||i.name;
let year=(i.release_date||i.first_air_date||"").slice(0,4);
return year?`${name} (${year})`:name;
}

/* CARD */
function createCard(i,type){
const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${IMG+i.poster_path}">
<div>${title(i)}</div>
`;

card.onclick=()=>openPreview(i,type);

return card;
}

/* SHOW */
function show(list,id,type){
const box=document.getElementById(id);
box.innerHTML="";
list.forEach(i=>{
if(!i.poster_path)return;
box.appendChild(createCard(i,type));
});
}

/* PREVIEW */
async function openPreview(i,type){
previewItem=i;
currentType=type;

document.getElementById("previewModal").style.display="block";
document.getElementById("previewTitle").innerText=title(i);
document.getElementById("previewDesc").innerText=i.overview||"";

let t=await getTrailer(i.id,type);
document.getElementById("previewVideo").src=t;
}

function closePreview(){
document.getElementById("previewModal").style.display="none";
document.getElementById("previewVideo").src="";
}

function playFromPreview(){
closePreview();
openPlayer(previewItem,true);
}

/* PLAYER */
function openPlayer(i){
document.getElementById("player").style.display="block";
document.getElementById("full").src=`https://vidsrc.me/embed/movie/${i.id}`;
}
function closePlayer(){
document.getElementById("player").style.display="none";
document.getElementById("full").src="";
}

/* INIT */
async function init(){
const trending=await fetchData(`${API}/trending/all/week?api_key=${KEY}`);
const movies=await fetchData(`${API}/movie/popular?api_key=${KEY}`);
const tv=await fetchData(`${API}/tv/popular?api_key=${KEY}`);

// FIX TRENDING
const clean=trending.filter(i=>i.media_type==="movie"||i.media_type==="tv");

const box=document.getElementById("trending");
box.innerHTML="";
clean.forEach(i=>{
box.appendChild(createCard(i,i.media_type));
});

show(movies,"movies","movie");
show(tv,"tv","tv");

// HERO
let m=clean[0];
document.getElementById("hero-title").innerText=title(m);
document.getElementById("hero-desc").innerText=m.overview||"";
document.getElementById("playHero").onclick=()=>openPlayer(m);
}

init();
</script>

</body>
</html>
