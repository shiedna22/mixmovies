<!DOCTYPE html>
<html>
<head>
  <title>ShiedFlix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html { scroll-behavior:smooth; }

body {
  background:#0b0b0b;
  color:white;
  font-family:Arial;
  margin:0;
}

/* NAVBAR */
.navbar {
  position:sticky;
  top:0;
  background:black;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:1000;
}

.logo { color:red; font-size:22px; font-weight:bold; }

.menu a {
  color:white;
  margin-left:15px;
  text-decoration:none;
}

.menu a:hover { color:red; }

#searchInput {
  margin-left:15px;
  padding:6px;
  border-radius:5px;
  border:none;
}

/* LIST */
h2 { margin:20px; }

.list {
  display:flex;
  overflow-x:auto;
  padding:10px;
}

img {
  width:140px;
  margin-right:10px;
  border-radius:10px;
  transition:0.3s;
}

img:hover {
  transform:scale(1.1);
  box-shadow:0 0 15px red;
}

/* MODAL */
#modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

iframe { width:90%; height:300px; }

.close {
  position:absolute;
  right:20px;
  top:20px;
  font-size:30px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">🎬 ShiedFlix</div>
  <div class="menu">
    <a href="#">Home</a>
    <a href="#movies">Movies</a>
    <a href="#tv">TV</a>
    <a href="#anime">Anime</a>
    <a href="#drama">Drama</a>
    <input id="searchInput" placeholder="Search...">
  </div>
</div>

<h2 id="movies">🔥 Movies</h2>
<div id="movies-list" class="list"></div>

<h2 id="tv">📺 TV Shows</h2>
<div id="tvshows-list" class="list"></div>

<h2 id="anime">🎌 Anime</h2>
<div id="anime-list" class="list"></div>

<h2 id="drama">🎭 Drama Series</h2>
<div id="drama-list" class="list"></div>

<div id="modal">
  <span class="close" onclick="closeModal()">✖</span>
  <h2 id="modal-title"></h2>
  <iframe id="modal-video" allowfullscreen></iframe>
</div>

<script src="home.js"></script>
</body>
</html>
