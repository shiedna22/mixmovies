<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix Gesture Player FIXED</title>

<style>
body{margin:0;background:#000;color:white;font-family:Arial}

/* START BUTTON */
.start{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:15px 25px;
font-size:18px;
background:red;
border:none;
border-radius:8px;
color:white;
z-index:999;
}

/* PLAYER */
#player{
display:none;
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
background:black;
z-index:99999;
}

/* VIDEO */
#player iframe{
width:100%;
height:100%;
border:none;
pointer-events:auto;
}

/* OVERLAY */
#overlay{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
z-index:100000;
}

/* ICON */
#centerIcon{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:50px;
opacity:0;
transition:0.3s;
}

/* TOP BAR */
.top{
position:absolute;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:10px;
z-index:100001;
}

/* BUTTON */
.btn{
background:rgba(0,0,0,0.7);
color:white;
border:none;
padding:8px 12px;
border-radius:5px;
}

/* FULL BTN */
.full{
position:absolute;
bottom:20px;
right:20px;
z-index:100001;
}

/* LOADING */
#loading{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<button class="start" onclick="start()">▶ Start Player</button>

<div id="player">

<div class="top">
<button class="btn" onclick="exitPlayer()">←</button>
<button class="btn" onclick="exitFullscreen()">Exit</button>
</div>

<div id="loading">Loading...</div>

<iframe id="full"
allow="autoplay; fullscreen; encrypted-media"
allowfullscreen></iframe>

<div id="overlay"></div>
<div id="centerIcon">▶</div>

<button class="btn full" onclick="goFull()">⛶</button>

</div>

<script>
let current = {id:550};
let lastTap = 0;

const overlay = document.getElementById("overlay");

/* START */
function start(){
document.querySelector(".start").style.display="none";

const player=document.getElementById("player");
player.style.display="block";

const iframe=document.getElementById("full");

/* autoplay FIX */
iframe.src = `https://vidsrc.cc/v2/embed/movie/${current.id}?autoplay=1&mute=0`;

iframe.onload = ()=>{
document.getElementById("loading").style.display="none";
};
}

/* FULLSCREEN */
function goFull(){
const el=document.getElementById("player");

if(el.requestFullscreen){
el.requestFullscreen();
}else if(el.webkitRequestFullscreen){
el.webkitRequestFullscreen();
}

/* orientation fix */
if(screen.orientation && screen.orientation.lock){
screen.orientation.lock("landscape").catch(()=>{});
}
}

/* EXIT FULL */
function exitFullscreen(){
if(document.exitFullscreen){
document.exitFullscreen();
}

if(screen.orientation && screen.orientation.lock){
screen.orientation.lock("portrait").catch(()=>{});
}
}

/* EXIT PLAYER */
function exitPlayer(){
exitFullscreen();

document.getElementById("player").style.display="none";
document.getElementById("full").src="";

document.querySelector(".start").style.display="block";
}

/* ICON */
function showIcon(txt){
const el=document.getElementById("centerIcon");
el.innerText=txt;
el.style.opacity=1;

setTimeout(()=>{el.style.opacity=0},400);
}

/* TOUCH */
let startX=0,startY=0;

if(overlay){

overlay.addEventListener("touchstart",(e)=>{
startX=e.touches[0].clientX;
startY=e.touches[0].clientY;
});

/* DOUBLE TAP */
overlay.addEventListener("touchend",(e)=>{
let now=Date.now();
let x=e.changedTouches[0].clientX;

if(now-lastTap<300){
if(x < window.innerWidth/2){
showIcon("⏪");
}else{
showIcon("⏩");
}
}
lastTap=now;
});

/* SWIPE */
overlay.addEventListener("touchmove",(e)=>{
let y=e.touches[0].clientY;
let dy=y-startY;

/* brightness */
if(startX < window.innerWidth/2){
document.body.style.filter =
`brightness(${Math.max(0.3, 1 - dy/300)})`;
}
/* volume visual */
else{
showIcon("🔊");
}
});

}
</script>

</body>
</html>
