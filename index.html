<!DOCTYPE html>
<html>
<head>
  <title>ShiedFlix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html { scroll-behavior:smooth; }

body {
  background:#0b0b0b;
  color:white;
  font-family:Arial;
  margin:0;
}

/* NAVBAR */
.navbar {
  position:sticky;
  top:0;
  background:black;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo { color:red; font-size:22px; font-weight:bold; }

.menu a {
  color:white;
  margin-left:15px;
  text-decoration:none;
}

.menu a:hover { color:red; }

#searchInput {
  margin-left:15px;
  padding:6px;
  border-radius:5px;
  border:none;
}

/* BANNER */
#banner {
  height:320px;
  display:flex;
  align-items:center;
  justify-content:center;
}

#watchBtn {
  background:red;
  padding:12px 25px;
  border:none;
  border-radius:8px;
  color:white;
  font-size:16px;
}

/* LIST */
h2 { margin:20px; }

.list {
  display:flex;
  overflow-x:auto;
  padding:10px;
}

img {
  width:140px;
  margin-right:10px;
  border-radius:10px;
}

/* MODAL */
#modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

iframe {
  width:90%;
  height:300px;
}

.close {
  position:absolute;
  right:20px;
  top:20px;
  font-size:30px;
  cursor:pointer;
}

@media(max-width:600px){
  iframe { height:220px; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">🎬 ShiedFlix</div>

  <div class="menu">
    <a href="#">Home</a>
    <a href="#movies">Movies</a>
    <a href="#tv">TV</a>
    <a href="#anime">Anime</a>
    <input id="searchInput" placeholder="Search...">
  </div>
</div>

<!-- BANNER -->
<div id="banner">
  <button id="watchBtn" onclick="openModal()">▶ Watch Full Movie</button>
</div>

<!-- MOVIES -->
<h2 id="movies">🔥 Movies</h2>
<div id="movies-list" class="list"></div>

<!-- TV -->
<h2 id="tv">📺 TV Shows</h2>
<div id="tvshows-list" class="list"></div>

<!-- ANIME -->
<h2 id="anime">🎌 Anime</h2>
<div id="anime-list" class="list"></div>

<!-- MODAL -->
<div id="modal">
  <span class="close" onclick="closeModal()">✖</span>

  <h2>🎬 Full Drama Movie</h2>

  <button id="playNow" style="padding:10px 20px;background:red;border:none;color:white;border-radius:5px;">
    ▶ Play Now
  </button>

  <iframe id="modal-video" style="display:none;" allowfullscreen></iframe>
</div>

<script>
// 🎬 GOOGLE DRIVE VIDEO ID
const videoId = "1b4lWCUHE7EQS3HXqBrGSQoT9r1jgW7bq";

// OPEN MODAL
function openModal(){
  document.getElementById("modal").style.display = "flex";

  document.getElementById("modal-video").style.display = "none";
  document.getElementById("modal-video").src = "";
  document.getElementById("playNow").style.display = "block";
}

// CLOSE
function closeModal(){
  document.getElementById("modal").style.display = "none";
  document.getElementById("modal-video").src = "";
}

// PLAY VIDEO
document.getElementById("playNow").onclick = function () {
  const iframe = document.getElementById("modal-video");

  iframe.src = "https://drive.google.com/file/d/" + videoId + "/preview";
  iframe.style.display = "block";

  this.style.display = "none";
};
</script>

</body>
</html>
