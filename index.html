<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix Ultimate</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:Arial}

/* NAV */
.navbar{
position:fixed;top:0;width:100%;
padding:15px;display:flex;gap:10px;
background:rgba(0,0,0,0.9);z-index:1000;
}
.logo{color:red;font-weight:bold}
#search{
flex:1;background:#222;border:none;
color:#fff;padding:8px 15px;border-radius:20px;
}

/* SUGGESTIONS */
#suggestions{
position:absolute;top:60px;left:15px;
background:#111;border-radius:10px;
width:250px;display:none;z-index:999;
}
#suggestions div{padding:10px;border-bottom:1px solid #333;cursor:pointer}
#suggestions div:hover{background:#222}
mark{background:red;color:white}

/* HERO */
#hero{
height:70vh;display:flex;
align-items:flex-end;padding:20px;position:relative;
}
#hero iframe{
position:absolute;width:100%;height:100%;
top:0;left:0;filter:brightness(.4);
pointer-events:none;
}
#hero::after{
content:"";position:absolute;bottom:0;
width:100%;height:120px;
background:linear-gradient(to top,#000,transparent);
}
.hero-content{z-index:2}

/* ROW */
.row{margin-top:25px}
.row h2{padding-left:10px}
.row-posters{
display:flex;overflow-x:auto;
gap:10px;padding:10px;
}
.row-posters img{
width:150px;height:220px;
border-radius:8px;cursor:pointer;
object-fit:cover;
}

/* DETAILS */
#details{
display:none;position:fixed;
width:100%;height:100%;
top:0;background:#000;z-index:9999;
overflow:auto;
}
#details iframe{width:100%;height:220px}
#details button{
margin:10px;padding:10px;
background:red;color:#fff;border:none;
border-radius:5px;
}

/* PLAYER */
#player{
display:none;position:fixed;
width:100%;height:100%;
top:0;background:#000;z-index:99999;
}
#player iframe{width:100%;height:100%}

.close{
position:absolute;right:20px;top:10px;
font-size:30px;cursor:pointer;
}

/* EPISODES */
#episodes{padding:10px}
#episodes button{
margin:5px;padding:8px;
background:#111;color:#fff;border:none;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">ShiedFlix</div>
<input id="search" placeholder="Search...">
<button onclick="startVoice()">🎤</button>
<div id="suggestions"></div>
</div>

<!-- HERO -->
<div id="hero">
<iframe id="heroVideo"></iframe>
<div class="hero-content">
<h1 id="hero-title"></h1>
<p id="hero-desc"></p>
<button onclick="play()">▶ Play</button>
</div>
</div>

<!-- CONTINUE -->
<div class="row">
<h2>▶ Continue Watching</h2>
<div id="continue" class="row-posters"></div>
</div>

<!-- MY LIST -->
<div class="row">
<h2>❤️ My List</h2>
<div id="mylist" class="row-posters"></div>
</div>

<!-- SEARCH -->
<div class="row" id="searchRow" style="display:none;">
<h2>🔎 Results</h2>
<div id="searchResults" class="row-posters"></div>
</div>

<!-- TRENDING -->
<div class="row">
<h2>🔥 Trending</h2>
<div id="trending" class="row-posters"></div>
</div>

<!-- DETAILS -->
<div id="details">
<span class="close" onclick="closeDetails()">✖</span>
<iframe id="trailer"></iframe>
<h2 id="title"></h2>
<p id="desc"></p>
<div id="episodes"></div>

<button onclick="play()">▶ Play</button>
<button onclick="toggleMyList()">❤️ My List</button>
</div>

<!-- PLAYER -->
<div id="player">
<span class="close" onclick="closePlayer()">✖</span>
<iframe id="full"></iframe>
</div>

<script>
const API="https://api.themoviedb.org/3";
const KEY="43c2413701b5c752d07b62acf8e57736";
const IMG="https://image.tmdb.org/t/p/w500";

let allMovies=[],current,currentType="movie";
let continueList=JSON.parse(localStorage.getItem("continue"))||[];
let myList=JSON.parse(localStorage.getItem("myList"))||[];

/* FETCH */
async function init(){
const res=await fetch(`${API}/trending/all/week?api_key=${KEY}`);
const data=await res.json();

allMovies=data.results;
show(data.results);
setHero(data.results[0]);
renderContinue();
renderMyList();
}

/* SHOW */
function show(list){
const box=document.getElementById("trending");
box.innerHTML="";
list.forEach(i=>{
if(!i.poster_path)return;
const img=document.createElement("img");
img.src=IMG+i.poster_path;
img.onclick=()=>openDetails(i);
box.appendChild(img);
});
}

/* HERO */
async function setHero(m){
current=m;
document.getElementById("hero-title").innerText=m.title||m.name;
document.getElementById("hero-desc").innerText=(m.overview||"").slice(0,100);

const res=await fetch(`${API}/movie/${m.id}/videos?api_key=${KEY}`);
const data=await res.json();
if(data.results[0]){
document.getElementById("heroVideo").src=
`https://www.youtube.com/embed/${data.results[0].key}?autoplay=1&mute=1`;
}
}

/* SMART SEARCH */
function similarity(a,b){
let same=0;
for(let i=0;i<b.length;i++){
if(a.includes(b[i])) same++;
}
return same/a.length;
}

search.oninput=(e)=>{
let val=e.target.value.toLowerCase().trim();
if(!val){
searchRow.style.display="none";
suggestions.style.display="none";
return;
}

let results=allMovies.filter(m=>{
let t=(m.title||m.name||"").toLowerCase();
return t.includes(val)||similarity(t,val)>0.5;
});

searchRow.style.display="block";
searchResults.innerHTML="";

results.slice(0,20).forEach(i=>{
let img=document.createElement("img");
img.src=IMG+i.poster_path;
img.onclick=()=>openDetails(i);
searchResults.appendChild(img);
});

/* suggestions */
suggestions.innerHTML="";
suggestions.style.display="block";

results.slice(0,5).forEach(i=>{
let t=i.title||i.name;
let d=document.createElement("div");
d.innerHTML=t.replace(new RegExp(val,"gi"),m=>`<mark>${m}</mark>`);
d.onclick=()=>{
search.value=t;
suggestions.style.display="none";
};
suggestions.appendChild(d);
});
};

/* VOICE */
function startVoice(){
if(!('webkitSpeechRecognition'in window)) return alert("Not supported");
let rec=new webkitSpeechRecognition();
rec.onresult=(e)=>{
search.value=e.results[0][0].transcript;
search.dispatchEvent(new Event("input"));
};
rec.start();
}

/* DETAILS */
async function openDetails(i){
current=i;
currentType=i.title?"movie":"tv";

document.getElementById("details").style.display="block";
title.innerText=i.title||i.name;
desc.innerText=i.overview||"";

const res=await fetch(`${API}/${currentType}/${i.id}/videos?api_key=${KEY}`);
const data=await res.json();
if(data.results[0]){
trailer.src=`https://www.youtube.com/embed/${data.results[0].key}`;
}

if(currentType==="tv") loadEpisodes(i.id);
else episodes.innerHTML="";
}

/* EPISODES */
async function loadEpisodes(id){
let html="";
for(let e=1;e<=5;e++){
html+=`<button onclick="playEpisode(${id},1,${e})">Ep ${e}</button>`;
}
episodes.innerHTML=html;
}

function playEpisode(id,s,e){
player.style.display="block";
full.src=`https://vidsrc.cc/v2/embed/tv/${id}/${s}/${e}`;
saveContinue(current);
}

/* PLAYER */
function play(){
player.style.display="block";
full.src=currentType==="movie"
?`https://vidsrc.cc/v2/embed/movie/${current.id}`
:`https://vidsrc.cc/v2/embed/tv/${current.id}/1/1`;
saveContinue(current);
}

/* CONTINUE */
function saveContinue(m){
continueList=continueList.filter(x=>x.id!==m.id);
continueList.unshift(m);
localStorage.setItem("continue",JSON.stringify(continueList));
renderContinue();
}
function renderContinue(){
continue.innerHTML="";
continueList.forEach(m=>{
let img=document.createElement("img");
img.src=IMG+m.poster_path;
img.onclick=()=>openDetails(m);
continue.appendChild(img);
});
}

/* MY LIST */
function toggleMyList(){
if(myList.find(m=>m.id===current.id)){
myList=myList.filter(m=>m.id!==current.id);
}else{
myList.push(current);
}
localStorage.setItem("myList",JSON.stringify(myList));
renderMyList();
}
function renderMyList(){
mylist.innerHTML="";
myList.forEach(m=>{
let img=document.createElement("img");
img.src=IMG+m.poster_path;
img.onclick=()=>openDetails(m);
mylist.appendChild(img);
});
}

/* CLOSE */
function closeDetails(){details.style.display="none";trailer.src=""}
function closePlayer(){player.style.display="none";full.src=""}

init();
</script>

</body>
</html>
