<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiedFlix Ultimate</title>

<style>
body{margin:0;background:#000;color:white;font-family:Arial}

/* NAV */
.navbar{
position:fixed;width:100%;top:0;
padding:15px;
display:flex;justify-content:space-between;
background:linear-gradient(to bottom,#000,transparent);
z-index:1000;
}
.logo{color:red;font-weight:bold}
#search{
background:#222;border:none;color:white;
padding:8px 15px;border-radius:20px;
}

/* HERO */
#hero{
height:70vh;
display:flex;
align-items:flex-end;
padding:20px;
position:relative;
overflow:hidden;
}
#hero iframe{
position:absolute;width:100%;height:100%;
top:0;left:0;
pointer-events:none;
filter:brightness(0.4);
}
.hero-content{z-index:2}

/* ROW */
.row{margin-top:10px}
.row-posters{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
}
.row-posters img{
width:140px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}
.row-posters img:hover{transform:scale(1.1)}
.row-posters::-webkit-scrollbar{display:none}

/* DETAILS */
#details{
display:none;
position:fixed;
width:100%;height:100%;
top:0;background:black;
z-index:9999;
overflow:auto;
}
#details iframe{
width:100%;
height:220px;
border:none;
}

/* PLAYER */
#player{
display:none;
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
background:black;
z-index:99999;
overflow:hidden;
}
#player iframe{
width:100%;
height:100%;
border:none;
}

/* CLOSE */
.close{
position:absolute;
right:20px;
top:10px;
font-size:30px;
cursor:pointer;
z-index:100000;
}

/* EPISODES */
#episodes button{
margin:5px;
padding:8px;
background:#111;
color:white;
border:none;
border-radius:5px;
}

/* OVERLAY */
#overlay{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
z-index:100000;
pointer-events:auto;
}

/* CENTER ICON */
#centerIcon{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:40px;
opacity:0;
transition:0.3s;
z-index:100001;
}

/* SKIP INTRO */
#skipIntro{
position:absolute;
bottom:80px;
right:20px;
padding:10px;
background:black;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
z-index:100001;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
<div class="logo">ShiedFlix</div>
<input id="searchInput" placeholder="Search...">
</div>

<!-- HERO -->
<div id="hero">
<iframe id="heroVideo"></iframe>
<div class="hero-content">
<h1 id="hero-title"></h1>
<p id="hero-desc"></p>
<button id="playHero">▶ Play</button>
<button id="infoHero">ℹ Info</button>
</div>
</div>

<!-- CONTINUE -->
<div class="row">
<h2>▶ Continue Watching</h2>
<div id="continue" class="row-posters"></div>
</div>

<!-- ROWS -->
<div class="row"><h2>🔥 Movies</h2><div id="movies-list" class="row-posters"></div></div>
<div class="row"><h2>📺 TV Shows</h2><div id="tvshows-list" class="row-posters"></div></div>
<div class="row"><h2>🍥 Anime</h2><div id="anime-list" class="row-posters"></div></div>

<!-- DETAILS -->
<div id="details">
<span class="close" onclick="closeDetails()">✖</span>

<iframe id="trailer"></iframe>

<h2 id="title"></h2>
<p id="desc"></p>

<div id="episodes"></div>

<button onclick="play()">▶ Play Full</button>
</div>

<!-- PLAYER -->
<div id="player">
<span class="close" onclick="closePlayer()">✖</span>

<iframe id="full" allow="autoplay; fullscreen"></iframe>

<div id="overlay"></div>
<div id="centerIcon">▶</div>
<button id="skipIntro" onclick="skipIntro()">⏩ Skip Intro</button>

</div>

<!-- JS -->
<script src="home.js"></script>

</body>
</html>
