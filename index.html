<!DOCTYPE html>
<html>
<head>
  <title>ShiedFlix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background:#0b0b0b;
  color:white;
  font-family:Arial;
  margin:0;
}

/* NAVBAR */
.navbar {
  position:sticky;
  top:0;
  background:black;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.logo { color:red; font-weight:bold; }

.menu a {
  color:white;
  margin-left:10px;
  text-decoration:none;
}

/* BANNER */
#banner {
  height:250px;
  background-size:cover;
  display:flex;
  align-items:flex-end;
  padding:20px;
}

#watchBtn {
  background:red;
  border:none;
  padding:10px;
  color:white;
}

/* LIST */
h2 { margin:15px; }

.list {
  display:flex;
  overflow-x:auto;
  padding:10px;
}

img {
  width:120px;
  margin-right:10px;
  border-radius:10px;
}

/* MODAL */
#modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  top:0;
  left:0;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

iframe {
  width:95%;
  height:250px;
}

.close {
  position:absolute;
  top:20px;
  right:20px;
  font-size:25px;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">🎬 ShiedFlix</div>
  <div class="menu">
    <a href="#">Home</a>
    <a href="#movies">Movies</a>
    <a href="#tv">TV</a>
    <a href="#anime">Anime</a>
    <a href="#drama">Drama</a>
  </div>
</div>

<!-- BANNER -->
<div id="banner">
  <div>
    <h2 id="banner-title">Loading...</h2>
    <button id="watchBtn">▶ Watch</button>
  </div>
</div>

<h2 id="movies">🔥 Movies</h2>
<div id="movies-list" class="list"></div>

<h2 id="tv">📺 TV Shows</h2>
<div id="tvshows-list" class="list"></div>

<h2 id="anime">🎌 Anime</h2>
<div id="anime-list" class="list"></div>

<h2 id="drama">🎭 Drama Series</h2>
<div id="drama-list" class="list"></div>

<!-- PLAYER -->
<div id="modal">
  <span class="close" onclick="closeModal()">✖</span>
  <h3 id="modal-title"></h3>
  <iframe id="modal-video" allow="autoplay; fullscreen" allowfullscreen></iframe>
</div>

<script src="home.js"></script>
</body>
</html>
